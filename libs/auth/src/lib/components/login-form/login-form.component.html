<div
  class="page-content"
  fxLayout="column"
  fxLayoutAlign="center center"
  fxFlexFill
>
  <div class="login-container rectangle w-100">
    <div class="costar-site-toolbar-left pt-5">
      <div class="branding"></div>
      <div class="costar-app-name">REAL ESTATE MANAGER</div>
    </div>
  </div>
</div>

<div class="login-form-square"></div>
<section class="min-vh-100">
  <div id="cover-caption">
    <div class="container">
      <div class="row text-white">
        <div
          class="col-xl-5 col-lg-6 col-md-8 col-sm-10 mx-auto text-center form p-4"
        >
          <div
            class="login-to-co-star-real display-4 py-2 text-truncate text-center"
          >
            Login to CoStar Real Estate Manager
          </div>
          <div class="px-2">
            <form
              [formGroup]="authForm"
              (ngSubmit)="
                login({
                  emailAddress: emailAddress.value,
                  password: password.value
                })
              "
            >
              <fieldset [disabled]="isSubmitting">
                <fieldset class="form-group">
                  <input
                    #emailAddress
                    formControlName="emailAddress"
                    placeholder="Email"
                    class="form-control"
                    type="text"
                  />
                </fieldset>
                <fieldset class="form-group">
                  <input
                    #password
                    formControlName="password"
                    placeholder="Password"
                    class="form-control"
                    type="password"
                  />
                </fieldset>
                <button
                  class="btn btn-lg btn-primary button-primary-normal"
                  [disabled]="!authForm.valid"
                  type="submit"
                >
                  Log In
                </button>
                <br />
              </fieldset>
            </form>
          </div>
        </div>
      </div>
      <mango-list-errors [errors]="errors"></mango-list-errors>
    </div>
  </div>
</section>
