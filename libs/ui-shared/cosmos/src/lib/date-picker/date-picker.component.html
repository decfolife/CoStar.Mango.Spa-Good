<mat-form-field appearance="outline">
  <mat-input [matDatepicker]="picker">
    <mat-datepicker #picker placeholder="Start date"></mat-datepicker>

    <cs-icon
      icon="calendar"
      fill="#000"
      mat-datepicker-toggle
      matSuffix
      [for]="picker"
    ></cs-icon>
  </mat-input>
</mat-form-field>
