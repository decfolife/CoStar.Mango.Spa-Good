
<div [id]="'chip'+id" [style.max-width]="'200px'" [matTooltip]="matTooltipContent"
[matTooltipClass]="'milestone_tooltip'"
 class="dx-field">
  <div class="dx-field-value-static">
      <div class="primary chip" [ngClass]="chipColor">
        <!-- /*ng-content used here to allow for non-text-based content like icons or badges*/ -->
        <ng-content select="'[chipContent]'"></ng-content>
      </div>
  </div>
</div>
