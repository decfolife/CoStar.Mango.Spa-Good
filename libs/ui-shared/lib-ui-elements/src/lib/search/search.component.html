<div *ngIf="showLabel" class="input-label">
  <span>{{ label }}</span>
  <span *ngIf="optional" class="input-optional">(optional)</span>
  <span *ngIf="required" class="input-required">*</span>
</div>
<mat-form-field appearance="outline" [class.disabled]="disabled">
  <mat-icon [fill]="'#a3a3a3'" class="icon-brand-search icon-brand-search-dims" svgIcon="brandsearch"></mat-icon>
  <input
    matInput
    #search
    type="search"
    [placeholder]="placeholder"
    [value]="value"
    (input)="outputSearchText($event)"
    [disabled]="disabled"
  />
  <mat-icon svgIcon="brandclose" class="icon-brand-close icon-brand-close-dims" *ngIf="value" [fill]="'#a3a3a3'" (click)="handleClear()" matSuffix></mat-icon>
  <mat-hint *ngIf="hint">{{ hint }}</mat-hint>
</mat-form-field>
