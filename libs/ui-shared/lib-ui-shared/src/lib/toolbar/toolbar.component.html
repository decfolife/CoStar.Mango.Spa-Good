<mat-toolbar
  [class.costar-unified-top-menu]="!isCostarStyle"
  [class.costar-unified-second-menu]="isCostarStyle"
>
  <mat-toolbar-row
    class="main-menu"
    [class.costar-top-menu]="!isCostarStyle"
    [class.costar-second-menu]="isCostarStyle"
  >

    <!-- Main navigation Links -->
    <ul class="modules nav nav-pills">
      <li class="nav-item" *ngFor="let link of moduleLinks" [ngClass]="activeLink === link.name ? link.name + ' active' : link.name">
        <a
          [id]="'toolbar__' + link?.moduleID + '-' + link?.moduleDisplayName?.toLowerCase()?.replace(' ', '-')"
          class="nav-link"
          [routerLink]="[link.spaurl]"
          [routerLinkActive]="['active']">
            <span>{{link.moduleDisplayName}}</span>
        </a>
      </li>
    </ul>

    <!-- CREM Environment Chip -->
    <div class="environment">
      <crem-env-info-chip
        [id]="id"
        [chipStyle]="chipStyle"
        [chipContent]="chipContent"
        [popoverContent]="popoverContent"
      ></crem-env-info-chip>
    </div>

    <!-- Bookmark Link -->
    <ul class="bookmark nav nav-pills">
      <li class="nav-item">
        <a
          class="nav-link clickable"
          (click)="raiseToggleBookmarkDrawerEvent()"
        >Bookmarks</a>
      </li>
      <li>
      </li>
    </ul>

  </mat-toolbar-row>
</mat-toolbar>
