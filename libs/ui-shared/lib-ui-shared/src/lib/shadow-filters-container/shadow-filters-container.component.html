<div class="filterAndUsercontrols">
	<div class="filterWrapper">
		
		<div class="filterElement" *ngFor="let item of dummyCount">
			<ngx-skeleton-loader class="crem-dropdown-shadow" [theme]="{height: '32px', width: '200px'}"></ngx-skeleton-loader>
		</div>
		<ngx-skeleton-loader class="crem-button-shadow" [theme]="{height: '32px', width: '60px'}"></ngx-skeleton-loader>
	</div>

	<div class="actionButtons">
		<ngx-skeleton-loader class="crem-button-shadow"  [theme]="{height: '32px', width: '44px'}"></ngx-skeleton-loader>
		<ngx-skeleton-loader class="crem-button-shadow"  [theme]="{height: '32px', width: '34px'}"></ngx-skeleton-loader>
	</div>
</div>
