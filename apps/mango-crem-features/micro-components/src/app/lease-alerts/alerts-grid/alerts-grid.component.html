<dx-data-grid #leaseAlertsGrid *ngIf="!isInitialLoading"
  class="list-page-data-grid"
  [dataSource]="gridData"
  keyExpr="leaseAlertID"
  [showColumnLines]="false"
  [columnAutoWidth]="true"
  [columnMinWidth]="32"
  [wordWrapEnabled]="true"
  columnResizingMode="widget"
  [filterSyncEnabled]="true"
  [allowColumnResizing]="true"
  [allowColumnReordering]="true"
  [rowAlternationEnabled]="true"
  [headerFilter]="{ visible: true }"
  [height]="'100%'"
  [width]="'100%'"
  (onSelectionChanged)="onGridSelectionChanged($event)"
  (filterValueChange)="updateFilterCount($event)"
  (onContentReady)="contentReady($event)"
  (onRowClick)="redirectToLeaseAbstract($event)"
  (onCellPrepared)="setSelectionControlState($event)"
>
  <dxo-filter-builder-popup [width]="600"
    [height]="600"
    [(visible)]="filterBuilderVisible"
  ></dxo-filter-builder-popup>

  <dxo-column-chooser [allowSearch]="true"
    [sortOrder]="'asc'"
    [width]="400"
    [height]="500"
  ></dxo-column-chooser>

  <dxo-selection *ngIf="!(isPopupView && isArchived)"
    [mode]="userCanEdit ? 'multiple' : 'none'"
    [showCheckBoxesMode]="'always'"
    [selectAllMode]="'allPages'"
  ></dxo-selection>

  <dxo-paging [pageSize]="25"></dxo-paging>

  <dxo-pager [visible]="true"
    [allowedPageSizes]="[25,50,100]"
    [showInfo]="true"
    [showNavigationButtons]="true"
    [showPageSizeSelector]="true"
  ></dxo-pager>

  <dxo-column-fixing [enabled]="true"></dxo-column-fixing>

  <dxo-sorting mode="multiple"></dxo-sorting>

  <dxo-grouping [contextMenuEnabled]="true"
    expandMode="rowClick"
    [autoExpandAll]="isAllExpanded"
  ></dxo-grouping>

  <dxo-summary>
    <dxi-group-item summaryType="count"
      displayFormat="{0}"></dxi-group-item>
  </dxo-summary>

  <dxo-state-storing [enabled]="true"
    type="sessionStorage"
    storageKey="leaseAlertsGridState"
    *ngIf="!isPopupView"
  ></dxo-state-storing>

  <dxi-column dataField="leaseAlertID"

  <dxi-column dataField="leaseAbstractID"

    [allowFixing]="false"
    [minWidth]="110"
    [allowHiding]="false"
  ></dxi-column>

  <div *dxTemplate="let d of 'dismissButtonTemplate'">
    <button *ngIf="d.data.isDismissed"
      class="btn btn-primary lease-alerts-undismiss-button w-100"
      (click)="toggleAlert(d.data); $event.stopPropagation()"
      [disabled]="isLoadingData"
    >Un-Dismiss</button>

    <dx-drop-down-button *ngIf="!d.data.isDismissed"
      [elementAttr]="{
        class: 'btn btn-primary add-hint color-light border-none w-100',
      }"
      text="Dismiss"
      [hint]="getButtonDisabledReason(d.data)"
      [disabled]="isLoadingData || !isAlertDismissable(d.data)"
      [items]="dismissReasons"
      [splitButton]="!isDismissReasonRequired"
      (onItemClick)="toggleAlert(d.data, $event)"
      (onButtonClick)="toggleAlert(d.data, $event, true)"
      class="lease-alerts-dismiss-button"
    ></dx-drop-down-button>
  </div>

<dx-popup #dismissPopup
  title="Dismiss Reason"
  [closeOnOutsideClick]="false"
  [dragEnabled]="false"
  [showCloseButton]="false"
  [width]="400"
  [height]="300"
  [(visible)]="showDismissPopup"
>
  <dxi-toolbar-item widget="dxButton"
    class="btn btn-primary"
    toolbar="bottom"
    location="after"
    [options]="dismissButtonOptions"
  ></dxi-toolbar-item>

  <dxi-toolbar-item widget="dxButton"
    class="btn"
    toolbar="bottom"
    location="after"
    [options]="cancelButtonOptions"
  ></dxi-toolbar-item>

  <div *dxTemplate="let data of 'content'">
    <dx-text-area [(value)]="dismissReasonText"
      class="w-100 h-100"
    ></dx-text-area>
  </div>
</dx-popup>

<dx-popup #dismissTogglePopup
  title="Dismiss Reason"
  [closeOnOutsideClick]="false"
  [dragEnabled]="false"
  [showCloseButton]="false"
  [width]="400"
  [height]="300"
  [(visible)]="showDismissTogglePopup"
>
  <dxi-toolbar-item widget="dxButton"
    toolbar="bottom"
    location="after"
    [options]="dismissToggleButtonOptions"
  ></dxi-toolbar-item>

  <dxi-toolbar-item widget="dxButton"
    toolbar="bottom"
    location="after"
    [options]="cancelButtonOptions"
  ></dxi-toolbar-item>

  <div *dxTemplate="let data of 'content'">
    <dx-drop-down-box placeholder="Select Dismiss Reason"
      [dataSource]="dismissReasons"
      [(value)]="selectedDismissToggleReason"
      [(opened)]="isDismissToggleDropdownOpen"
    >
      <dx-list [dataSource]="dismissReasons"
        selectionMode="single"
        [(selectedItemKeys)]="selectedKeys"
        (onSelectionChanged)="dismissToggleReasonChanged($event)"
      ></dx-list>
    </dx-drop-down-box>

    <dx-text-area [(value)]="dismissToggleReasonText"
      *ngIf="dismissToggleReasonIsCustom"
      class="custom-dx-text-area w-100"
    ></dx-text-area>
  </div>
</dx-popup>
