<dx-popup
	#ProjectTypePopup
    width="1080"
    height="800"
    [showTitle]="true"
    [title]="title"
    [dragEnabled]="true"
    [closeOnOutsideClick]="false"
    [visible]="isVisible"
    (onHidden)="close($event)">
    <div *dxTemplate="let data of 'content'" class="popup-no-padding">
    	<project-type-dialog [projectType]="projectType" (closed)="close($event)" (saved)="projectTypeSaved($event)"></project-type-dialog>    
    </div>
</dx-popup>
