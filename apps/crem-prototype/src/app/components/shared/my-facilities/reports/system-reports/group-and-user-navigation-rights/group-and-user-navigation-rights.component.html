<div class="list-page">
	<div class="list-page-controls-wrapper">
		<div class="controls-left">
			<h5 class="dbl-right-margin">Group And User Navigation Rights</h5>	
            <costar-search (changed)="searchDataGrid($event)"></costar-search>
            <costar-dropdown *ngIf="moduleDropdownData"
                [dropdownData]="moduleDropdownData"
                (changed)="onModuleDropdownChange($event)"
            >
            </costar-dropdown>
            <costar-dropdown *ngIf="userDropdownData"
                [dropdownData]="userDropdownData"
                (changed)="onUserDropdownChange($event)"
            >
            </costar-dropdown>
            <costar-dropdown *ngIf="groupDropdownData"
                [dropdownData]="groupDropdownData"
                (changed)="onGroupDropdownChange($event)"
            >
            </costar-dropdown>
            <button class="btn btn-default" (click)="apply()" [disabled]="(selectedUsers && !selectedUsers.length) || ((selectedGroups && !selectedGroups.length) && (selectedModules && !selectedModules.length))">Apply</button>
		</div>
		<div class="controls-right">
            <button class="btn btn-primary" (click)="exportDynamicGrids($event)">Export</button> 
        </div>

    </div>
    <div *ngIf="isApplied">
        <div *ngFor="let tab of tabs">
            <div style="padding:8px;">
                {{tab.title}}
            </div>
                <div class="list-page-data-grid-wrapper">
                    <dx-data-grid class="readOnly"
                        #reportDataGrid
                        [dataSource]="filteredNavigationRightsData[tab.id]"
                        [showColumnLines]="false"
                        [showRowLines]="false"
                        [showBorders]="false"
                        [rowAlternationEnabled]="true" 
                        [allowColumnResizing]="true"
                        [allowColumnReordering]="true"
                        [columnAutoWidth]="true"
                        [filterSyncEnabled]="true"
                        [columnMinWidth]="10"	
                        (onCellPrepared)="onCellPrepared($event)"
                    >
                        <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
                        <dxo-grouping #expand [autoExpandAll]="true" [contextMenuEnabled]="true"></dxo-grouping>
                        <dxo-sorting mode="multiple"></dxo-sorting>
                        <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
                        <dxo-column-chooser [allowSearch]="true" mode="select">
                        </dxo-column-chooser>
                        <dxo-paging [pageSize]="100"></dxo-paging>
                        <dxo-pager 
                            [showPageSizeSelector]="true"
                            [allowedPageSizes]="[50, 100, 200, 500]"
                            [showInfo]="true"
                            [showNavigationButtons]="true">
                        </dxo-pager>
                        <dxi-column *ngFor="let col of reportcolumns[tab.id]" 
                            [dataField]="col.dataField" 
                            [alignment]="col.alignment"
                            [visible]="col.visible"
                            [groupIndex]="col.groupIndex"
                            [dataType]="col.dataType"
                            [caption]="col.caption"
                            [fixed]="col.fixed"
                            [allowEditing]="col.allowEditing"
                            [cellTemplate]="col.cellTemplate"
                            >
                            <dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
                        </dxi-column>
                    </dx-data-grid>

            </div>
