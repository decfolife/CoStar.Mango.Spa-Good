<dx-popup
	#ShareReportPopup
    [width]="600"
    [height]="470"
    [showTitle]="true"
    [title]="title"
    [dragEnabled]="true"
    [closeOnOutsideClick]="false"
    [(visible)]="isVisible"
    (onHidden)="close()">
    <div *dxTemplate="let data of 'content'" class="popup-no-padding">
    	<costar-popup>
            <popup-content>		
            </popup-content>
            <popup-footer>		
                <popup-footer-right>
                    <button class="btn btn-default" (click)="close()">Close</button> 
                    <button class="btn btn-primary" (click)="save()">Save</button> 
                </popup-footer-right>
            </popup-footer>
        </costar-popup>
    </div>
</dx-popup>
