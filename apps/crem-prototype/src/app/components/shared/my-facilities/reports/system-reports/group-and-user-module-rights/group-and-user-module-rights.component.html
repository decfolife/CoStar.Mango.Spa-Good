<div class="list-page">
	<div class="list-page-controls-wrapper">
		<div class="controls-left">
			<h5 class="dbl-right-margin">Group and User Module Rights</h5>	
            <costar-search (changed)="searchDataGrid($event)"></costar-search>
            <costar-dropdown *ngIf="dropdownData"
                [dropdownData]="dropdownData"
                (changed)="syncTreeViewSelection($event)"
            >

            </costar-dropdown>
            <!-- <dx-drop-down-box class="list-view-dropdown"
                [(value)]="selectedModuleNames"
                valueExpr="id"
                displayExpr="name"
                placeholder="Module"
                [showClearButton]="true"
                [dataSource]="treeDataSource"
                (onValueChanged)="syncTreeViewSelection(null)"
            >
                <div *dxTemplate="let data of 'content'">
                    <dx-tree-view
                        id="simple-treeview"
                        [items]="treeDataSource"
                        showCheckBoxesMode="normal"
                        [selectNodesRecursive]="false"
                        [selectByClick]="true"
                        displayExpr="name"
                        keyExpr="id"
                        selectionMode="multiple"
                        (onContentReady)="syncTreeViewSelection($event)"
                        (onItemSelectionChanged)="onTreeViewClick($event)"
                    ></dx-tree-view>
                </div>
            </dx-drop-down-box> -->
            <button class="btn btn-default" (click)="apply()" [disabled]="selectedModuleNames && !selectedModuleNames.length">Apply</button>
		</div>
		<div class="controls-right">
            <button class="btn btn-primary" (click)="exportGrids($event)">Export</button> 
        </div>

    </div>
    <dx-tab-panel *ngIf="isApplied"
        [dataSource]="tabs"
        [deferRendering]="false"
        [selectedIndex]=0>  
        <div *dxTemplate="let company of 'userRights'">  
            <div class="list-page-data-grid-wrapper">
                <dx-data-grid class="readOnly"
                    #userDataGrid
                    [dataSource]="userData"
                    [showColumnLines]="false"
                    [showRowLines]="false"
                    [showBorders]="false"
                    [rowAlternationEnabled]="true" 
                    [allowColumnResizing]="true"
                    [allowColumnReordering]="true"
                    [columnAutoWidth]="true"
                    [filterSyncEnabled]="true"
                    (onContentReady)="onContentReady($event)"
                    [columnMinWidth]="10"	
                    (onCellPrepared)="onCellPrepared($event)"
                >
                    <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
                    <dxo-grouping #expand [autoExpandAll]="true" [contextMenuEnabled]="true"></dxo-grouping>
                    <dxo-sorting mode="multiple"></dxo-sorting>
                    <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
                    <dxo-column-chooser [allowSearch]="true" mode="select">
                    </dxo-column-chooser>
                    <dxo-paging [pageSize]="100"></dxo-paging>
                    <dxo-pager 
                        [showPageSizeSelector]="true"
                        [allowedPageSizes]="[50, 100, 200, 500]"
                        [showInfo]="true"
                        [showNavigationButtons]="true">
                    </dxo-pager>
                    <dxi-column *ngFor="let col of userColumns" 
                        [dataField]="col.dataField" 
                        [alignment]="col.alignment"
                        [visible]="col.visible"
                        [groupIndex]="col.groupIndex"
                        [dataType]="col.dataType"
                        [caption]="col.caption"
                        [fixed]="col.fixed"
                        [allowEditing]="col.allowEditing"
                        [cellTemplate]="col.cellTemplate"
                        >
                        <dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
                    </dxi-column>
                </dx-data-grid>
            </div>
        </div>  
        <div *dxTemplate="let company of 'groupRights'">  
            <div class="list-page-data-grid-wrapper">
                <dx-data-grid class="readOnly"
                    #groupDataGrid
                    [dataSource]="groupData"
                    [showColumnLines]="false"
                    [showRowLines]="false"
                    [showBorders]="false"
                    [rowAlternationEnabled]="true" 
                    [allowColumnResizing]="true"
                    [allowColumnReordering]="true"
                    [columnAutoWidth]="true"
                    [filterSyncEnabled]="true"
                    (onContentReady)="onContentReady($event)"
                    [columnMinWidth]="10"
                    (onCellPrepared)="onCellPrepared($event)"
                >
                    <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
                    <dxo-grouping #expand [autoExpandAll]="true" [contextMenuEnabled]="true"></dxo-grouping>
                    <dxo-sorting mode="multiple"></dxo-sorting>
                    <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
                    <dxo-column-chooser [allowSearch]="true" mode="select">
                    </dxo-column-chooser>
                    <dxo-paging [pageSize]="100"></dxo-paging>
                    <dxo-pager 
                        [showPageSizeSelector]="true"
                        [allowedPageSizes]="[50, 100, 200, 500]"
                        [showInfo]="true"
                        [showNavigationButtons]="true">
                    </dxo-pager>
                    <dxi-column *ngFor="let col of groupColumns" 
                        [dataField]="col.dataField" 
                        [alignment]="col.alignment"
                        [visible]="col.visible"
                        [groupIndex]="col.groupIndex"
                        [dataType]="col.dataType"
                        [caption]="col.caption"
                        [fixed]="col.fixed"
                        [allowEditing]="col.allowEditing"
                        [cellTemplate]="col.cellTemplate"
                        >
                        <dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
                    </dxi-column>
                </dx-data-grid>
            </div>
        </div>
        <div *dxTemplate="let company of 'moduleDescription'">
            WIP
        </div>
    </dx-tab-panel>
</div>


<dx-data-grid class="readOnly" stype="display:none"
    #filterDataGrid
    [dataSource]="[]"
    [columnAutoWidth]="true"
    [filterSyncEnabled]="true"
    [columnMinWidth]="10"	
>
</dx-data-grid>
