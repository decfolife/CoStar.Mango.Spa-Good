<mat-card class="dashboard-card">
  <mat-card-header>
    <mat-card-title>Lease Alerts</mat-card-title>

    <div class="mat-card-header-toolbar">
      <button class="btn btn-default btn-sm"
        [matMenuTriggerFor]="cardMenu"
      ><mat-icon>more_horiz</mat-icon></button>

      <mat-menu #cardMenu="matMenu">
        <button mat-menu-item
          (click)="showFieldChooser()"
        >Show Field Chooser</button>

        <button mat-menu-item>Toggle Selected</button>

        <button mat-menu-item (click)="showDismissed = !showDismissed"
        >{{ showDismissed ? 'Hide' : 'Show'}} Dismissed
        </button>

        <button mat-menu-item>Export</button>
        <button mat-menu-item><em>Etc.</em></button>
      </mat-menu>
    </div>
    </mat-card-header>

  <mat-card-content class="no-padding" style="height: 400px;">
    <dx-pivot-grid #alertsGrid
      [dataSource]="gridDataSource"
      [showColumnGrandTotals]="true"
      [showRowGrandTotals]="true"
      [showColumnTotals]="false"
      [showRowTotals]="true"
      [fieldChooser]="{ enabled: false }"
      (onCellPrepared)="onCellPrepared($event)"
    ></dx-pivot-grid>
  </mat-card-content>
</mat-card>
