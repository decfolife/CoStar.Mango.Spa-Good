<div class="list-page">
	<div class="list-page-controls-wrapper">
		<div class="controls-left">
			<h5 class="dbl-right-margin">Portfolio Hierarchy Maintenance</h5>	
			<costar-search (changed)="searchTreeList($event)"></costar-search>
		</div>
		<div class="controls-right">
			<button class="btn btn-primary" (click)="add()">Add</button>
            <button class="btn btn-default" (click)="toggleExpanded()"><span *ngIf="isExpanded">Collapse All</span><span *ngIf="!isExpanded">Expand All</span></button>
			<button class="btn btn-default" (click)="exportTreeList()">Export</button>			
		</div>
	</div>
	<div class="list-page-data-grid-wrapper">
		<dx-tree-list
            #TreeList
            [dataSource]="hierarchies"
            [rootValue]="0"
            keyExpr="id"
            parentIdExpr="parentId"
            [columnAutoWidth]="true"
            [wordWrapEnabled]="true"
            [showBorders]="false"
            [rowAlternationEnabled]="true" 
            [autoExpandAll]="isExpanded">
            <dxo-editing
                mode="form"></dxo-editing>
            <dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
            <dxi-column dataField="name"></dxi-column>
            <dxi-column dataField="id" caption="ID" width="100"></dxi-column>                        
            <dxi-column caption="Portfolio" width="100" cellTemplate="portfolioTemplate" alignment="center" [allowHeaderFiltering]="false" [allowSorting]="false"></dxi-column>
            <div *dxTemplate="let group of 'portfolioTemplate'">
                <mat-icon *ngIf="group.data.parentId == 0">folder_outline</mat-icon>
            </div>            
                      
            <dxi-column type="buttons" width="48">
		    	<dxi-button
		    		template="moreMenuTemplate"   		
		    	>
		    		<div *dxTemplate="let group of 'moreMenuTemplate'">
		    			<button class="btn btn-link" (click)="$event.stopPropagation()" [matMenuTriggerFor]="UserMoreMenu"><mat-icon>more_horiz</mat-icon></button>
		    			<mat-menu #UserMoreMenu="matMenu">
				    		<ul>                        
		                        <li *ngIf="group.data.parentId == 0" (click)="editPortfolio(group.data.id)">Edit</li>
                                <li *ngIf="group.data.parentId != 0" (click)="editHierarchy(group.rowIndex)">Edit</li>
		                        <li (click)="addSubGroup(group.data.id)">Add Sub Hierarchy</li>                        
		                        <li>Associated Building and Leases</li>
                                <li *ngIf="group.data.parentId == 0">Exchange Rates</li>    
                                <li *ngIf="group.data.parentId == 0">View Contacts in Group</li>    
                                <li *ngIf="group.data.parentId != 0">Delete</li>                    
                                <li *ngIf="group.data.parentId == 0">Archive Portfolio</li>
		                    </ul>
				    	</mat-menu>
		    		</div>
		    	</dxi-button>		    	
		    </dxi-column>	
        </dx-tree-list>
		
	</div>
	
</div>
