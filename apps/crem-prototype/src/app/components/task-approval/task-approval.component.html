<costar-popup>
	<popup-content>
		<div>
			<dx-text-area
			    [height]="90"
			    [(value)]="task.note"
			    placeholder="Enter note...">
			</dx-text-area>
		</div>
	</popup-content>
	<popup-footer>		
		<popup-footer-right>
			<button class="btn btn-default" (click)="close()">Cancel</button> 
			<button class="btn btn-primary" (click)="save()">{{mode}}</button> 
		</popup-footer-right>
	</popup-footer>
</costar-popup>
