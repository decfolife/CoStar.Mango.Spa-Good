<mat-card class="dashboard-card project-dash-card broker-deal-count-card">
	<mat-card-header>				
		<mat-card-title>Active Deal Count by Broker</mat-card-title>							
	</mat-card-header>
	<mat-card-content class="no-padding">						
		<dx-data-grid class="list-page-data-grid"
			#DealCountByBrokerDataGrid
			id="DealCountByBrokerDataGrid"
			[dataSource]="dealsByBroker"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 							
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
		>
			<dxo-scrolling mode="virtual"></dxo-scrolling>							
			<dxo-scrolling mode="virtual"></dxo-scrolling>	
			<dxi-column dataField="broker"></dxi-column>									
			<dxi-column dataField="dealCount"></dxi-column>
			<dxi-column dataField="totalLeaseValue" dataType="number" format="currency"></dxi-column>
			<dxi-column dataField="targetSf" caption="Target SF">
				<dxo-format type="fixedPoint" [precision]="0"></dxo-format>
			</dxi-column>
			<dxi-column dataField="totalEstCommission" dataType="number" format="currency"></dxi-column>
			<dxo-summary>					
				<dxi-total-item
				    column="dealCount"
				    summaryType="sum"
				    [customizeText]="customizeSumInteger">
				</dxi-total-item>
				<dxi-total-item
				    column="totalLeaseValue"
				    summaryType="sum"
				    [customizeText]="customizeSumCurrency">
				</dxi-total-item>
				<dxi-total-item
				    column="targetSf"
				    summaryType="sum"
				    [customizeText]="customizeSumInteger">
				</dxi-total-item>
				<dxi-total-item
				    column="totalEstCommission"
				    summaryType="sum"
				    [customizeText]="customizeSumCurrency">
				</dxi-total-item>									
			</dxo-summary>						
			
		</dx-data-grid>					
	</mat-card-content>
</mat-card>
