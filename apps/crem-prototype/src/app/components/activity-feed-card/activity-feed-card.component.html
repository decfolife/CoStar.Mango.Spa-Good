<mat-card class="activity-feed">
	<mat-card-header>				
		<mat-card-title>Activity Feed</mat-card-title>		
		<mat-card-subtitle>(last 30 days)</mat-card-subtitle>	
		<div class="mat-card-header-toolbar">
			<button class="btn btn-default btn-sm" [matMenuTriggerFor]="cardMenu"><mat-icon>more_horiz</mat-icon></button>
			<mat-menu #cardMenu="matMenu">								
				<button mat-menu-item (click)="toggleExpanded()"><span *ngIf="isExpanded">Collapse All</span><span *ngIf="!isExpanded">Expand All</span></button>      
				<button mat-menu-item (click)="exportDataGrid()">Export</button>				
			</mat-menu>
		</div>			
	</mat-card-header>
	<mat-card-content class="no-padding">
		<dx-data-grid 
			*ngIf="mode == 'projects'"
			class="list-page-data-grid"
			#ActivityDataGrid
			[dataSource]="activities"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 							
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
		>
			<dxo-scrolling mode="virtual"></dxo-scrolling>	
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>  
			<dxo-grouping #expand [autoExpandAll]="isExpanded" [contextMenuEnabled]="true"></dxo-grouping>
			<dxi-column dataField="description" caption="Description" cellTemplate="descriptionTemplate" [allowFiltering]="false"></dxi-column>  						
			<dxi-column dataField="activityType" caption="Activity"></dxi-column>
			<dxi-column dataField="projectName" caption="Project Name"></dxi-column>
			<dxi-column dataField="projectType" caption="Project Type"></dxi-column>
			<dxi-column dataField="performedBy" caption="User"></dxi-column>
			<dxi-column dataField="performedDate" caption="When"></dxi-column>	
			<div *dxTemplate="let a of 'descriptionTemplate'">
				<b>{{a.data.performedBy}}</b> {{a.data.description}}		
			</div>	
		</dx-data-grid>		

		<dx-data-grid 
			*ngIf="mode == 'portfolio'"
			class="list-page-data-grid"
			#ActivityDataGrid
			[dataSource]="activities"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 							
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
		>
			<dxo-scrolling mode="virtual"></dxo-scrolling>	
			<dxo-header-filter [visible]="true"></dxo-header-filter>  
			<dxo-grouping #expand [autoExpandAll]="isExpanded" [contextMenuEnabled]="true"></dxo-grouping>
			<dxi-column dataField="objectType" caption="Type"></dxi-column>
			<dxi-column dataField="subType" caption="Template"></dxi-column>  						
			<dxi-column dataField="objectName" caption="Type"></dxi-column>  						
			<dxi-column dataField="activityType" caption="Activity"></dxi-column>
			<dxi-column dataField="description" ></dxi-column>  							
			<dxi-column dataField="performedBy" caption="User"></dxi-column>
			<dxi-column dataField="performedDate" caption="When"></dxi-column>		
		</dx-data-grid>	
	</mat-card-content>
</mat-card>
