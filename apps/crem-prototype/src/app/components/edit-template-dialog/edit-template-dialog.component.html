<h1 mat-dialog-title>Edit Template - {{data.name}}</h1>
<div mat-dialog-content>
	<div class="row dynamic-form">
		<div class="col-md-12">
			<mat-card>
				<mat-card-header>
					<mat-card-title>Template Details</mat-card-title>
				</mat-card-header>
				<mat-card-content>
					<div class="row">
						<div class="col-md-6">
							<mat-form-field appearance="outline">
								<mat-label>Template ID</mat-label>
								<input matInput [value]="data.id" disabled>
							</mat-form-field>
							<mat-form-field appearance="outline">
								<mat-label>Template Name</mat-label>
								<input matInput [value]="data.name">
							</mat-form-field>
							<mat-form-field appearance="outline">
								<mat-label>Object Type</mat-label>
								<input matInput [value]="data.objectType" disabled>
							</mat-form-field>
							<mat-form-field appearance="outline">
								<mat-label>Billing Type</mat-label>
								<input matInput [value]="data.billingType">
							</mat-form-field>
						</div>
						<div class="col-md-6">
							<mat-slide-toggle [checked]="data.addSecurityRightsOnCreation">Add Security Rights on Creation</mat-slide-toggle>
							<mat-slide-toggle [checked]="data.useInQuickSearch">Use in Quick Search</mat-slide-toggle>
							<mat-slide-toggle [checked]="data.isActive">Is Active</mat-slide-toggle>
							<!-- <mat-form-field appearance="outline">
								<mat-label>Add Security Rights on Creation</mat-label>
								<input matInput [value]="data.addSecurityRightsOnCreation">
							</mat-form-field> -->
						</div>
					</div>
				</mat-card-content>
			</mat-card>
		</div>		
	</div>
</div>
<div mat-dialog-actions [align]="'end'">
	<button class="btn btn-default dbl-right-margin" (click)="onNoClick()">Cancel</button>  
	<button class="btn btn-primary" (click)="onNoClick()">Save</button>  	
</div>
