<mat-card class="dashboard-card" [class.project-dash-card]="isProject">
	<mat-card-header>				
		<mat-card-title>My Reports</mat-card-title>						
	</mat-card-header>
	<mat-card-content class="no-padding">
		<dx-data-grid class="list-page-data-grid"
			#MyReportsDataGrid
			id="MyReportsDataGrid"
			[dataSource]="myReports"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 							
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="false"
		>
			<dxo-scrolling mode="virtual"></dxo-scrolling>
			<dxi-column dataField="name" caption="Report Name"></dxi-column>								
		</dx-data-grid>		
	</mat-card-content>
</mat-card>
