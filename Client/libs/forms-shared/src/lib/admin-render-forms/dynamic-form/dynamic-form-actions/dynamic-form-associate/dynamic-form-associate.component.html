<div *ngIf="isAssociateLoading" class="df-associate-loader">
  <crem-loader></crem-loader>
</div>

<crem-modal
  modalId="associate_modal"
  modalTitleId="associate_modal_modalTitleId"
  [modalTitle]="modalTitle"
  closeIconVisible="true"
  [customFooter]="true"
  *ngIf="!isAssociateLoading"
>
  <div modalContent class="body-content">
    <form
      crem-form
      layout="vertical"
      [formGroup]="associateForm"
      class="add-associate-form"
    >
      <crem-form-item
        [id]="getId(componentName, 'BuildingCountry', 'form-item')"
      >
        <crem-form-label
          [id]="getId(componentName, 'BuildingCountry', 'label')"
          [required]="true"
          >Building Country
        </crem-form-label>

        <crem-form-control>
          <crem-dropdown
            #countryDropdown
            [id]="getId(componentName, 'BuildingCountry', 'dropdown')"
            [dataSource]="countryDropdownItem"
            [showClearButton]="true"
            required="true"
            [customRequireValidation]="false"
            [showColumnHeader]="false"
            [allowSearch]="true"
            hoverText="Select Country"
            (selectedItems)="onCountryValueChange($event)"
            [containerized]="false"
            [displayExpr]="'value'"
            [valueExpr]="'name'"
            [initialSelectedValue]="selectedCountry"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item [id]="getId(componentName, 'BuildingState', 'form-item')">
        <crem-form-label
          [id]="getId(componentName, 'BuildingState', 'label')"
          [required]="true"
          >State/Prov
        </crem-form-label>

        <crem-form-control>
          <crem-dropdown
            #stateDropdown
            [id]="getId(componentName, 'BuildingState', 'dropdown')"
            [dataSource]="stateDropdownItem"
            [showClearButton]="true"
            required="true"
            [customRequireValidation]="false"
            [showColumnHeader]="false"
            [allowSearch]="true"
            hoverText="Select State"
            (selectedItems)="onStateValueChange($event)"
            [containerized]="false"
            [displayExpr]="'value'"
            [valueExpr]="'name'"
            [initialSelectedValue]="selectedState"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item [id]="getId(componentName, 'Building', 'form-item')">
        <crem-form-label
          [id]="getId(componentName, 'Building', 'label')"
          [required]="true"
          >Building:
        </crem-form-label>

        <crem-form-control>
          <crem-dropdown
            #buildingDropdown
            [id]="getId(componentName, 'Building', 'dropdown')"
            [dataSource]="buildingDropdownItem"
            [showClearButton]="true"
            required="true"
            [customRequireValidation]="false"
            [showColumnHeader]="false"
            [allowSearch]="true"
            hoverText="Select Building"
            (selectedItems)="onBuildingValueChange($event)"
            [containerized]="false"
            [displayExpr]="'buildingName'"
            [valueExpr]="'buildingID'"
            [initialSelectedValue]="selectedBuildingID"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item
        *ngIf="associateType == 'lease' && !hidePremise"
        [id]="getId(componentName, 'Premise', 'form-item')"
      >
        <crem-form-label
          [id]="getId(componentName, 'Premise', 'label')"
          [required]="true"
          >Premise
        </crem-form-label>

        <crem-form-control>
          <crem-dropdown
            #premiseDropdown
            [id]="getId(componentName, 'Premise', 'dropdown')"
            [dataSource]="premiseDropdownItem"
            [showClearButton]="true"
            required="true"
            [customRequireValidation]="false"
            [showColumnHeader]="false"
            [allowSearch]="true"
            hoverText="Select Premise"
            (selectedItems)="onPremiseValueChange($event)"
            [containerized]="false"
            [displayExpr]="'premiseDescText'"
            [valueExpr]="'premiseID'"
            [initialSelectedValue]="selectedPremiseID"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item
        *ngIf="associateType == 'lease'"
        [id]="getId(componentName, 'Lease', 'form-item')"
      >
        <crem-form-label
          [id]="getId(componentName, 'Lease', 'label')"
          [required]="true"
          >Lease
        </crem-form-label>

        <crem-form-control>
          <crem-dropdown
            #leaseDropdown
            [id]="getId(componentName, 'Lease', 'dropdown')"
            [dataSource]="leaseDropdownItem"
            [showClearButton]="true"
            required="true"
            [customRequireValidation]="false"
            [showColumnHeader]="false"
            [allowSearch]="true"
            hoverText="Select Lease"
            (selectedItems)="onLeaseValueChange($event)"
            [containerized]="false"
            [displayExpr]="'leaseName'"
            [valueExpr]="'leaseAbstractID'"
            [initialSelectedValue]="selectedLeaseID"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item
        [id]="getId(componentName, 'RemoveAssociation', 'form-item')"
      >
        <crem-form-control>
          <crem-check-box
            #removeAssociationCheckbox
            [id]="getId(componentName, 'RemoveAssociation', 'checkbox')"
            (changeEvent)="removeAssociationChanged($event)"
          >
            Remove Association
          </crem-check-box>
        </crem-form-control>
      </crem-form-item>
    </form>
  </div>

  <div modalFooter class="addAssociateFooter">
    <crem-button
      [id]="'cancel-associate-id'"
      type="secondary"
      (click)="close()"
    >
      Cancel
    </crem-button>

    <crem-button
      [id]="'save-associate-id'"
      type="primary"
      (click)="save()"
      [icon]="saveClicked ? 'faSpinner' : ''"
      [iconPack]="saveClicked ? 'solid' : ''"
      [iconAnimation]="saveClicked ? 'spin' : ''"
      [disabled]="disableSaveButton"
    >
      <span>
        {{ saveClicked ? 'Saving' : 'Save' }}
      </span>
    </crem-button>
  </div>
</crem-modal>
