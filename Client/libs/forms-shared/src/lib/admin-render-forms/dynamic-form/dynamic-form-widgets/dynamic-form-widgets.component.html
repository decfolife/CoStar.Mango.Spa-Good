<div *ngIf="!isLoading">
  <div *ngIf="selectWidget$ | async as widget">
    <dx-data-grid *ngIf="widget" [showBorders]="true" [rowAlternationEnabled]="true" [noDataText]="isRenderForm ? 'No Data' : 'Data Here'"

      [dataSource]="widget.renderFormWidgetData">
      <dxo-load-panel [enabled]="true"></dxo-load-panel>
      <ng-container *ngFor="let columnField of widget.columnGroup?.columnFields">
        <ng-container *ngIf="columnField.showInListView">
          <dxi-column [alignment]="'left'" [caption]="columnField.columnHeader"
            [dataField]="columnField.dataFieldTableField.toLowerCase()"></dxi-column>
        </ng-container>
      </ng-container>
      <dxo-sorting mode="none"></dxo-sorting>
      <dxo-paging [enabled]="false"></dxo-paging>
      <dxo-header-filter [visible]="false"></dxo-header-filter>
    </dx-data-grid>
  </div>
</div>
<div *ngIf="isLoading">
  <ngx-skeleton-loader  class="crem-button-shadow" [theme]="{ height: '100px', width: '100%' }"></ngx-skeleton-loader>
</div>
