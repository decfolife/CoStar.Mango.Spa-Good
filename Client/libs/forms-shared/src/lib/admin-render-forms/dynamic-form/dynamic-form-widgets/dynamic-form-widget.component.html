<div *ngIf="!isLoading && !errorLoading">
  <div *ngIf="selectWidget$ | async as widget">
    <div actions class="controls-right">
      <crem-button
        *ngIf="widget.allowExcelExport && showDownloadButton"
        color="secondary"
        icon="faDownload"
        iconPack="solid"
        [btnStyle]="stroked"
        className="send-to-excel"
        ariaLabel="Download as an Excel file"
        title="Download as an Excel file"
        (buttonClick)="exportExcel()"
      ></crem-button>

      <crem-button
        class="action-buttons"
        type="secondary"
        *ngIf="
          (widget.allowCreation && objTypeList.includes(widget.objectTypeID)) ||
          (editMode && widget.allowCreation)
        "
        (click)="onAddWidget(widget)"
        >Add</crem-button
      >
      <crem-button
        class="action-buttons"
        type="secondary"
        *ngIf="editMode && widget.allowImport"
        (click)="onImport()"
        >Import
      </crem-button>
      <crem-button
        class="action-buttons"
        type="secondary"
        *ngIf="editMode && widget.allowComparison"
        (click)="onCompare()"
        >Compare
      </crem-button>
    </div>
    <dx-data-grid
      *ngIf="widget"
      #widgetDataGrid
      [showBorders]="true"
      [rowAlternationEnabled]="true"
      [noDataText]="isRenderForm ? 'No Data' : 'Data Here'"
      [dataSource]="widget.renderFormWidgetData"
    >
      <dxo-load-panel [enabled]="true"></dxo-load-panel>
      <ng-container
        *ngFor="let columnField of widget.columnGroup?.columnFields"
      >
        <ng-container *ngIf="columnField.showInListView">
          <dxi-column
            *ngIf="columnField.dataFieldDataType === DATE_COL_ID"
            [alignment]="'left'"
            [caption]="columnField.columnHeader"
            [dataField]="columnField.dataFieldTableField.toLowerCase()"
            [format]="dateFormat"
          >
          </dxi-column>
          <dxi-column
            *ngIf="columnField.dataFieldDataType !== DATE_COL_ID"
            [alignment]="'left'"
            [caption]="columnField.columnHeader"
            [dataField]="columnField.dataFieldTableField.toLowerCase()"
            [format]="columnField.dataTypeFormatString"
          >
          </dxi-column>
        </ng-container>
      </ng-container>
      <dxi-column
        caption="Actions"
        type="buttons"
        *ngIf="showActionColumn"
        [visibleIndex]="widget.buttonAlignment === 'Left' ? 0 : ''"
      >
        <dxi-button
          *ngIf="showFileIcon"
          hint="Open File"
          icon="cremOpenFile"
          [onClick]="onOpenFileClick.bind(this)"
        ></dxi-button>
        <dxi-button
          *ngIf="editMode && widget.allowEdits"
          hint="Edit"
          [onClick]="onEditClick"
          icon="cremEdit"
        ></dxi-button>
        <dxi-button
          *ngIf="editMode"
          hint="Delete"
          icon="cremDelete"
          [onClick]="onDeleteClick"
        ></dxi-button>
        <dxi-button
          hint="Go"
          icon="cremGoTo"
          label="Go"
          [onClick]="onGoClick"
        ></dxi-button>
        <dxi-button
          hint="View History"
          icon="cremHistory"
          [onClick]="onHistoryClick"
        ></dxi-button>
      </dxi-column>
      <dxo-sorting mode="none"></dxo-sorting>
      <dxo-paging [enabled]="false"></dxo-paging>
      <dxo-header-filter [visible]="false"></dxo-header-filter>
    </dx-data-grid>
  </div>
</div>

<div *ngIf="isLoading" class="p-4">
  <crem-skeleton [instances]="_skeletonInstances" type="form"></crem-skeleton>
</div>

<div *ngIf="errorLoading">
  <div class="center" style="margin-top: 20px">
    <h2>Cannot load Widget</h2>
    <section>
      <div class="well">
        <h3>{{ userMessage }}</h3>
      </div>
    </section>
  </div>
</div>
