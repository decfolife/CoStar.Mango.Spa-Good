<crem-skeleton
  *ngIf="isLoading || isActionLoading"
  [instances]="_skeletonInstances"
  type="card"
></crem-skeleton>

<div
  *ngIf="(!errorLoading && !reload) || renderFormError"
  id="df-formContainer-formContainer"
>
  <div id="scroll-to-top-div"></div>
  <form [formGroup]="form" [ngClass]="{ 'df-editModeOn': editMode }">
    <div id="dynamic-forms-container">
      <div *ngIf="!isLoading" class="page-header">
        <crem-page-header
          [tabTitle]="tabTitle"
          [pageTitle]="pageTitle"
          [showListOrMapViewButtons]="false"
          [showSettingsButton]="!isRenderForm"
          [customActions]="true"
          [customFilters]="false"
          [statusPill]="statusPillInfo"
        >
          <div actions class="page-header__actions" *ngIf="!errorLoading">
            <!-- View Legacy Page -->
            <a
              class="legacy-page-link color-primary font-size-eyebrow"
              id="df-legacyLink"
              target="_blank"
              [href]="externalCremLink"
              rel="noopener"
              [attr.title]="'Visit Legacy Page'"
              >View Legacy Page ↗</a
            >

            <!-- Alerts Buttons -->
            <mango-alerts-root
              [leaseAbstractId]="objectId"
              id="df-leaseAlertsBtn"
              [cremDataId]
              *ngIf="
                isRenderForm &&
                form.get('objectType').value.toLowerCase().trim() === 'lease'
              "
            >
            </mango-alerts-root>

            <!-- Design Mode -->
            <crem-button
              [dataId]
              *ngIf="isRenderForm && false"
              [id]="'dynamic-forms-design-btn'"
              [text]="'Design Mode'"
              [btnStyle]="'flat'"
              [color]="'secondary'"
              (click)="designModeClicked(); $event.preventDefault()"
              [class]="'df-design-mode'"
            >
            </crem-button>

            <!-- Add Section -->
            <crem-button
              *ngIf="!isRenderForm"
              [id]="'dynamic-forms-add-section-btn'"
              [type]="'secondary'"
              [matMenuTriggerFor]="AddSectionMenu"
              >Add Section</crem-button
            >
            <mat-menu #AddSectionMenu="matMenu">
              <button
                mat-menu-item
                [matMenuTriggerFor]="ExistingSectionMenu"
                id="df-menu-existingSection"
              >
                Existing Section
              </button>
              <button
                mat-menu-item
                [matMenuTriggerFor]="NewSectionMenu"
                id="df-menu-newSection"
              >
                New Section
              </button>
            </mat-menu>
            <mat-menu #NewSectionMenu="matMenu" id="df-newSectionMenu">
              <button
                mat-menu-item
                (click)="createNewSection(1)"
                id="df-newSecMenu-oneCol"
              >
                1 Column
              </button>
              <button
                mat-menu-item
                (click)="createNewSection(2)"
                id="df-newSecMenu-twoCol"
              >
                2 Columns
              </button>
              <button
                mat-menu-item
                (click)="createNewSection(0)"
                id="df-newSecMenu-widget"
              >
                Widget
              </button>
            </mat-menu>
            <mat-menu
              id="df-existingSectionMenu"
              class="existing-section-menu"
              #ExistingSectionMenu="matMenu"
              (click)="$event.stopPropagation()"
            >
              <form (click)="$event.stopPropagation()">
                <cs-search
                  [id]="df - existingMenu - search"
                  class="df-search"
                  #SearchBox
                  [placeholder]="'Search...'"
                  (changed)="searchAvailableSectionsDataGrid($event)"
                ></cs-search>
                <dx-data-grid
                  #availableSectionsGrid
                  id="availableSectionsContainer"
                  [dataSource]="selectAvailableFormSections$ | async"
                  [showColumnLines]="false"
                  [showRowLines]="true"
                  [showBorders]="true"
                  [rowAlternationEnabled]="true"
                  keyExpr="formSectionID"
                >
                  <dxo-load-panel [enabled]="true"></dxo-load-panel>
                  <dxo-selection
                    [selectAllMode]="'true'"
                    [showCheckBoxesMode]="'false'"
                    mode="multiple"
                  ></dxo-selection>
                  <dxi-column
                    caption="Section Name"
                    dataField="formSectionName"
                    [alignment]="'left'"
                  ></dxi-column>
                </dx-data-grid>
                <crem-button type="primary" (click)="addSections()"
                  >Add Sections</crem-button
                >
              </form>
            </mat-menu>

            <!-- Actions Dropdown -->
            <div class="dfActions">
              <crem-button
                [disabled]="disableSaveAndApply"
                [type]="'secondary'"
                class="df-actionsButton"
                id="df-actionsBtn"
                [matMenuTriggerFor]="dfActionsMenu"
                (click)="$event.preventDefault()"
              >
                <span class="df-actionsBtn-text">Actions</span>
                <mat-icon
                  aria-label="Dynamic Forms Actions Menu"
                  class="df-actionsBtn-arrow"
                  >arrow_drop_down</mat-icon
                >
              </crem-button>

              <mat-menu #dfActionsMenu="matMenu" class="df-actionsMenu">
                <ng-container
                  *ngFor="
                    let action of dropdownFormActions$ | async;
                    let i = index
                  "
                >
                  <button
                    type="button"
                    mat-menu-item
                    class="df-actionsMenuBtn"
                    id="{{ 'df-actionsMenuBtn-' + i }}"
                    (click)="performFormAction(action)"
                  >
                    <span>{{ action.formActionLabel }}</span>
                  </button>
                </ng-container>
                <hr />
                <button
                  type="button"
                  mat-menu-item
                  class="df-actionsMenuBtn"
                  id="pt-expand-all"
                  (click)="toggleAllCards(true)"
                >
                  <span>Expand All</span>
                </button>
                <button
                  mat-menu-item
                  type="button"
                  class="df-actionsMenuBtn"
                  id="pt-expand-all"
                  (click)="toggleAllCards(false)"
                >
                  <span>Collapse All</span>
                </button>
              </mat-menu>
            </div>

            <!-- RenderForm buttons -->
            <span *ngFor="let actionButton of buttonFormActions$ | async">
              <crem-button
                *ngIf="
                  isRenderForm &&
                  ((objectTypeId != 11 && objectTypeId != 5) ||
                    (objectTypeId == 11 && companyModuleUser.hasAddRights) ||
                    (objectTypeId == 5 && contactModuleUser.hasAddRights))
                "
                class="df-headerActionsButton"
                [id]="actionButton.id"
                [text]="actionButton.text"
                [icon]="
                  ((actionButton.text | lowercase) == 'save' ||
                    (actionButton.text | lowercase) == 'apply') &&
                  disableSaveAndApply &&
                  actionButtonText == actionButton.text
                    ? 'faSpinner'
                    : ''
                "
                [iconAnimation]="
                  ((actionButton.text | lowercase) == 'save' ||
                    (actionButton.text | lowercase) == 'apply') &&
                  disableSaveAndApply &&
                  actionButtonText == actionButton.text
                    ? 'spin'
                    : ''
                "
                [btnStyle]="'flat'"
                [color]="actionButton.color"
                (click)="onActionButtonClick(actionButton.text)"
                [disabled]="disableSaveAndApply"
              ></crem-button>
            </span>

            <!-- Design mode buttons -->
            <ng-container *ngIf="!isRenderForm && editMode">
              <crem-button
                [id]="'dynamic-forms-cancel-btn'"
                [text]="'Cancel'"
                [btnStyle]="'flat'"
                [color]="'secondary'"
                (click)="toggleEditViewMode(); $event.preventDefault()"
              ></crem-button>
              <crem-button
                [id]="'dynamic-forms-apply-btn'"
                [text]="'Apply'"
                [btnStyle]="'flat'"
                [color]="'secondary'"
              ></crem-button>
              <crem-button
                [id]="'dynamic-forms-edit-btn'"
                [text]="'Edit'"
                [btnStyle]="'flat'"
                [color]="'primary'"
                (click)="toggleEditViewMode(); $event.preventDefault()"
              ></crem-button>
              <crem-button
                [id]="'dynamic-forms-save-btn'"
                [text]="'Save'"
                [btnStyle]="'flat'"
                [color]="'primary'"
                [disabled]="!form.dirty"
                (click)="saveForm(); $event.preventDefault()"
              ></crem-button>
            </ng-container>
            <!-- End Design mode buttons -->

            <!-- Bookmark -->
            <crem-button
              [dataId]
              *ngIf="allowedObjectTypes.includes(objectTypeId)"
              id="df-bookMarkBtn"
              [icon]="'faBookmark'"
              [iconPack]="'solid'"
              (click)="addBookmark(); $event.preventDefault()"
              [color]="'secondary'"
              [title]="'Click to create bookmark.'"
              [ariaLabel]="'Click to create bookmark.'"
            ></crem-button>
          </div>
        </crem-page-header>
      </div>
      <span class="df-anchor-ref-spacer-heading" id="{{ getFormId() }}"></span>
      <div
        class="dynamic-form-content"
        #dynamicFormContent
        *ngIf="!renderFormError"
      >
        <div class="row">
          <div
            *ngFor="
              let section of sectionsVisible;
              let i = index;
              trackBy: trackBySection
            "
            class="col-md-12"
          >
            <span
              class="df-anchor-ref-spacer-heading"
              id="{{ getFormSectionId(section) }}"
            ></span>
            <mango-dynamic-form-section
              [id]="'df-formSection-' + section.formSectionID"
              [section]="section"
              [form]="form"
              [formGroupName]="'section' + section.formSectionID"
              [editMode]="editMode"
              [isRenderForm]="isRenderForm"
              [hidePremise]="hidePremise"
              [hasParentObjectLinker]="hasParentObjectLinker"
              [isSuperUser]="isSuperUser"
              [canLoadMap]="canLoadMap"
              [allFormItemsKeys]="allFormItemsKeys"
              (hasParentObjectLinkerChange)="
                handleHasParentObjectLinkerChange($event)
              "
              (loadNextSections)="loadNextSections()"
              [isExpanded]="section.formSectionDisplayHeading && expandAll"
            ></mango-dynamic-form-section>
            <div
              appAmIVisible
              [id]="'df-getMoreSectionsafter-' + section.formSectionID"
              (elementVisible)="getMoreSections($event, section.id)"
              [isTargetElement]="section.id === sectionsVisible.length"
            ></div>
          </div>
        </div>
      </div>
    </div>
  </form>

  <crem-button
    *ngIf="!isLoading"
    [id]="'df-scrollToTopBtn'"
    class="scroll-to-top-button"
    type="primary"
    (click)="scrollToTop(); $event.preventDefault()"
  >
    <span>Scroll to Top</span>
  </crem-button>
</div>

<div *ngIf="errorLoading">
  <div class="center">
    <h2 *ngIf="showCannotLoadForm">Cannot load form</h2>
    <section>
      <div class="well">
        <h3>{{ userMessage }}</h3>
      </div>
    </section>
  </div>
</div>
