<div class="doc-sec-page">
  <div [formGroup]="formGroup" class="df-clauseEleGroup">
    <div
      class="section-clause-description"
      [ngClass]="{ 'add-bottom-margin': isEditMode }"
    >
      <div class="clause-text-label-field field-content">
        <crem-input
          *ngIf="isEditMode"
          class="df-clauseMainText"
          [id]="
            'df-textAreaId-' +
            fieldData?.name?.clauseTypeID +
            fieldData?.dataField
          "
          [inputType]="'textarea'"
          [ariaLabel]="fieldData?.name?.formItemSectionDetail?.formItemLabel"
          [maxLengthField]="7000"
          [required]="fieldData.name.formItemMandatory == '1' ? true : false"
          [formControlName]="fieldData?.dataField"
        >
        </crem-input>
        <crem-input-label
          class="text-area-label"
          *ngIf="isViewMode"
          [label]="fieldData?.name?.formItemAnswer"
        >
        </crem-input-label>
      </div>

              fieldData?.dataField,
              fieldData?.name?.clauseTypeID
            )
          "

            openClasueBankPopup(
              fieldData?.dataField,
              fieldData?.name?.clauseTypeID
            )
          "

            openClasueBankPopup(
              fieldData?.dataField,
              fieldData?.name?.clauseTypeID

      </div>
    </div>

    <div
      class="section-clause-details-label-field field-content"
      [ngClass]="{ 'df-clauseEditMode': isEditMode }"
    >
      <div
        *ngIf="showDocView || showDocEdit"
        class="clause-details-label-field df-clauseDocument"
      >
        <crem-input-label
          class="detail-label df-clauseDocLabel"
          [label]="'Document:'"
          [required]="docFieldRequired"
        ></crem-input-label>
        <crem-input
          class="df-clauseDocValue"
          [id]="'df-inputDoc-' + fieldData?.dataField"
          *ngIf="showDocEdit"
          [ariaLabel]="'Document'"
          [inputType]="'text'"
          [maxLengthField]="100"
          [formControlName]="fieldData?.dataField + '_Document'"
        >
        </crem-input>
        <crem-input-label
          *ngIf="showDocView"
          [label]="fieldData?.name?.sourceDocument"
        ></crem-input-label>
      </div>

      <div
        *ngIf="showSecView || showSecEdit"
        class="clause-details-label-field df-clauseSection"
      >
        <crem-input-label
          class="detail-label df-clauseSecLabel"
          [label]="'Section:'"
          [required]="secFieldRequired"
        ></crem-input-label>
        <crem-input
          class="df-clauseSecValue"
          [id]="'df-inputSec-' + fieldData?.dataField"
          *ngIf="showSecEdit"
          [inputType]="'text'"
          [maxLengthField]="50"
          [ariaLabel]="'Section'"
          [formControlName]="fieldData?.dataField + '_Section'"
        >
        </crem-input>
        <crem-input-label
          *ngIf="showSecView"
          [label]="fieldData?.name?.sourceSection"
        ></crem-input-label>
      </div>

      <div
        *ngIf="showPageView || showPageEdit"
        class="clause-details-label-field df-clausePage"
      >
        <crem-input-label
          class="detail-label df-clausePageLabel"
          [label]="'Page:'"
          [required]="pageFieldRequired"
        ></crem-input-label>
        <crem-input
          class="df-clausePageValue"
          [id]="'df-inputPage-' + fieldData?.dataField"
          *ngIf="showPageEdit"
          [inputType]="'text'"
          [ariaLabel]="'Page'"
          [maxLengthField]="50"
          [formControlName]="fieldData?.dataField + '_Page'"
        >
        </crem-input>
        <crem-input-label
          *ngIf="showPageView"
          [label]="fieldData?.name?.sourcePage"
        ></crem-input-label>
      </div>

      <div
        *ngIf="showDateView || showDateEdit"
        class="clause-details-label-field df-clauseDate"
      >
        <crem-input-label
          class="detail-label df-clauseDateLabel"
          [label]="'Date:'"
          [required]="dateFieldRequired"
        ></crem-input-label>
        <crem-date-picker
          class="df-clauseDateValue"
          [id]="'df-inputDate-' + fieldData?.dataField"
          *ngIf="showDateEdit"
          use-dynamic-form-field-config
          [dateFormat]="dateFormat"
          [useMaskBehavior]="false"
          [formControlName]="fieldData?.dataField + '_Date'"
        >
        </crem-date-picker>
        <crem-input-label
          *ngIf="showDateView"
          [label]="fieldData?.name?.sourceDateView"
        ></crem-input-label>
      </div>
    </div>
  </div>
</div>
