<mat-card
  class="ai-form-section df-sectionCard view-mode"
  [class.edit-mode]="editMode"
  [class.view-mode]="!editMode"
>
  <mat-card-header class="df-sectionHeader" (click)="toggleExpanded()">
    <mat-card-title
      #menuTrigger="matMenuTrigger"
      [matMenuTriggerFor]="sectionLabelMenu"
      (mouseenter)="openSectionLabelMenu()"
      (mouseleave)="closeSectionLabelMenu()"
      >{{ section.title }}</mat-card-title
    >

    <mat-menu #sectionLabelMenu="matMenu" [hasBackdrop]="false">
      <div
        (mouseenter)="sectionLabelMenuEntered = true"
        (mouseleave)="sectionLabelMenuLeave()"
        class="df-sectionLabelMenu"
      >
        <a mat-menu-item>Section Edit</a>
        <a mat-menu-item>Form Item Details</a>
        <a mat-menu-item>Behaviors</a>
      </div>
    </mat-menu>

    <button
      type="button"
      mat-icon-button
      class="btn-expand"
      (click)="toggleExpanded(); $event.stopPropagation()"
    >
      <mat-icon>{{ isExpanded ? 'expand_less' : 'expand_more' }}</mat-icon>
    </button>
  </mat-card-header>

  <mat-card-content
    class="df-sectionContent"
    *ngIf="isExpanded"
    [formGroup]="formGroup"
  >
    <!-- Fields List -->
    <div
      class="df-formSection-columnList"
      [style.grid-template-columns]="getColumnTemplate()"
    >
      <div
        class="field-container df-formSection-field"
        *ngFor="let field of section.fields"
      >
        <!-- Label container: history icon + label text -->
        <div class="df-formSection-labelContainer">
          <div class="df-infoHistoryData">
            <crem-field-history
              [helpTextID]="'ai-helpText-' + field.key"
              [visible]="false"
              dateFormat="MM/dd/yyyy"
              [dataSource]="null"
              [displayIcon]="'infoHistoryIcon'"
              [showFieldName]="false"
            ></crem-field-history>
          </div>
          <crem-input-label
            class="df-formSection-fieldLabel"
            [label]="field.label"
          ></crem-input-label>
        </div>

        <!-- Field content -->
        <div class="field-content df-formSection-fieldContent">
          <!-- View mode -->
          <crem-input-label
            *ngIf="!editMode"
            [label]="formatDisplayValue(field)"
          ></crem-input-label>

          <!-- Edit mode: dropdown -->
          <crem-dropdown
            *ngIf="editMode && field.type === 'dropdown'"
            [id]="'ai-form-dropdown-' + field.key"
            [dataSource]="field.dropdownItems || []"
            [showClearButton]="true"
            [showColumnHeader]="false"
            [displayExpr]="getDropdownDisplayExpr(field)"
            [valueExpr]="getDropdownValueExpr(field)"
            [allowSearch]="true"
            [useSelectBox]="true"
            [containerized]="true"
            [searchMode]="'contains'"
            [formControlName]="field.key"
            [initialSelectedValue]="getFieldControl(field.key)?.value"
            (selectedItems)="onDropdownSelected(field, $event)"
          ></crem-dropdown>

          <!-- Edit mode: text / number / currency / percent -->
          <crem-input
            *ngIf="
              editMode &&
              field.type !== 'boolean' &&
              field.type !== 'date' &&
              field.type !== 'dropdown'
            "
            [inputType]="
              field.type === 'number' ||
              field.type === 'currency' ||
              field.type === 'percent'
                ? 'number'
                : 'text'
            "
            [formControlName]="field.key"
          ></crem-input>

          <!-- Edit mode: date -->
          <crem-date-picker
            *ngIf="editMode && field.type === 'date'"
            [formControlName]="field.key"
            dateFormat="MM/dd/yyyy"
            [useMaskBehavior]="false"
          ></crem-date-picker>

          <!-- Edit mode: boolean -->
          <mat-checkbox
            *ngIf="editMode && field.type === 'boolean'"
            [formControlName]="field.key"
          ></mat-checkbox>

          <!-- Citation -->
          <div *ngIf="field.citation" class="ai-citation">
            <crem-icon icon="faQuoteLeft" size="xs"></crem-icon>
            <span>{{ field.citation }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Rent Schedule Sub-table -->
    <ng-container *ngIf="rentSchedule">
      <div class="ai-subtable-header">Base Rent Schedule</div>
      <dx-data-grid
        class="ai-subtable"
        [dataSource]="rentSchedule.scheduleItems"
        [showBorders]="true"
        [showColumnLines]="false"
        [showRowLines]="true"
        [rowAlternationEnabled]="true"
        [wordWrapEnabled]="false"
      >
        <dxo-load-panel [enabled]="false"></dxo-load-panel>
        <dxo-paging [enabled]="false"></dxo-paging>
        <ng-container *ngFor="let col of rentScheduleColumns">
          <dxi-column
            [dataField]="col.dataField"
            [caption]="col.caption"
            [dataType]="col.dataType"
            [format]="col.format"
            [width]="col.width"
          ></dxi-column>
        </ng-container>
      </dx-data-grid>

      <ng-container *ngIf="hasAbatements()">
        <div class="ai-subtable-header">Rent Abatements</div>
        <dx-data-grid
          class="ai-subtable"
          [dataSource]="rentSchedule.abatementItems"
          [showBorders]="true"
          [showColumnLines]="false"
          [showRowLines]="true"
          [rowAlternationEnabled]="true"
        >
          <dxo-load-panel [enabled]="false"></dxo-load-panel>
          <dxo-paging [enabled]="false"></dxo-paging>
          <ng-container *ngFor="let col of abatementColumns">
            <dxi-column
              [dataField]="col.dataField"
              [caption]="col.caption"
              [dataType]="col.dataType"
              [format]="col.format"
              [width]="col.width"
            ></dxi-column>
          </ng-container>
        </dx-data-grid>
      </ng-container>
    </ng-container>
  </mat-card-content>
</mat-card>
