<div class="ai-document-page">
  <header class="ai-document-page__header">
    <div>
      <div class="ai-document-page__eyebrow">AI Abstraction</div>
      <h1 class="ai-document-page__title">Document Viewer</h1>
    </div>

    <div class="ai-document-page__controls" *ngIf="documentOptions.length">
      <label
        class="ai-document-page__label"
        for="ai-document-page-document-select"
      >
        Request Documents
      </label>
      <crem-dropdown
        id="ai-document-page-document-select"
        inputId="ai-document-page-document-select"
        placeholder="Select a document"
        [useSelectBox]="true"
        [allowSearch]="true"
        [showClearButton]="false"
        [dataSource]="documentOptions"
        [displayExpr]="'displayLabel'"
        [valueExpr]="'key'"
        [selectBoxValue]="selectedDocumentKey"
        [dropDownContainerCustomClass]="'ai-document-page-dropdown'"
        [searchExpr]="['displayLabel', 'fileName', 'artifactType']"
        (selectedItems)="onDocumentDropdownChange($event)"
      ></crem-dropdown>
      <div
        *ngIf="selectedDocument"
        class="ai-document-page__document-summary"
      >
        <div class="ai-document-page__document-meta">
          <span
            *ngIf="selectedDocument.artifactType"
            class="ai-document-page__document-chip"
          >
            Type:
            {{ selectedDocument.artifactType }}
          </span>
          <span class="ai-document-page__document-chip">
            File Status:
            {{ selectedDocument.externalStatus || 'Unavailable' }}
          </span>
          <span class="ai-document-page__document-chip">
            Abstraction Status:
            {{ selectedDocument.externalAbstractionStatus || 'Unavailable' }}
          </span>
        </div>
      </div>
    </div>
  </header>

  <div *ngIf="isLoading" class="ai-document-page__state">
    Loading document...
  </div>

  <div *ngIf="errorMessage" class="ai-document-page__state ai-document-page__state--error">
    {{ errorMessage }}
  </div>

  <div class="ai-document-page__viewer" *ngIf="!errorMessage">
    <mango-ai-document-viewer
      [src]="documentSource"
      [filename]="documentFileName || undefined"
      [textContent]="selectedDocumentContent || undefined"
      [initialBookmarks]="currentBookmarks"
      (bookmarksChange)="onBookmarksChange($event)"
    ></mango-ai-document-viewer>
  </div>
</div>
