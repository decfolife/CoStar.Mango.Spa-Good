<crem-skeleton *ngIf="isLoading" type="card" [instances]="4"></crem-skeleton>

<div *ngIf="!isLoading" class="ai-list-page">
  <div class="actions-container">
    <div class="menu-section">
      <cs-search
        class="ai-list-page__search"
        [value]="searchText"
        [placeholder]="'Search...'"
        [disabled]="isLoading"
        (changed)="onSearchChanged($event)"
      ></cs-search>
      <crem-dropdown
        class="crem-dropdown-list-pages ai-list-page__portfolio"
        [id]="'page-header-portfolio'"
        [dataSource]="portfolioOptions"
        displayExpr="name"
        valueExpr="id"
        selectMode="single"
        placeholder="Portfolio"
        [allowSearch]="true"
        [showColumnHeader]="false"
        [showClearButton]="true"
        [initialSelectedValue]="selectedPortfolioId"
        (selectedItems)="onPortfolioChanged($event)"
      >
      </crem-dropdown>
    </div>
    <div class="menu-section btns-right">
      <crem-button
        [id]="'page-header-clear'"
        text="Clear Filters"
        color="secondary"
        [disabled]="isLoading"
        (buttonClick)="clearFilters()"
      >
      </crem-button>
      <crem-button
        [id]="'page-header-export'"
        text="Export"
        color="primary"
        [disabled]="isLoading"
        (buttonClick)="exportToExcel()"
      >
      </crem-button>
    </div>
  </div>

  <div *ngIf="errorMessage" class="ai-list-page__error">
    <p>{{ errorMessage }}</p>
  </div>

  <div *ngIf="!errorMessage" class="list-page-data-grid-wrapper">
    <dx-data-grid
      id="aiLeaseListGrid"
      class="list-page-data-grid"
      [dataSource]="filteredLeases"
      [showBorders]="false"
      [showColumnLines]="false"
      [showRowLines]="true"
      [rowAlternationEnabled]="true"
      [hoverStateEnabled]="true"
      [wordWrapEnabled]="false"
      [allowColumnReordering]="true"
      [allowColumnResizing]="true"
      columnResizingMode="widget"
      [columnAutoWidth]="true"
      [height]="'100%'"
      keyExpr="id"
      (onRowClick)="onRowClick($event)"
    >
      <dxo-load-panel [enabled]="false"></dxo-load-panel>
      <dxo-paging [pageSize]="25"></dxo-paging>
      <dxo-pager
        [showPageSizeSelector]="true"
        [allowedPageSizes]="[10, 25, 50, 100]"
        [showInfo]="true"
        [showNavigationButtons]="true"
      ></dxo-pager>
      <dxo-header-filter
        [visible]="true"
        [allowSearch]="true"
      ></dxo-header-filter>
      <dxo-sorting mode="multiple"></dxo-sorting>

      <dxi-column
        dataField="id"
        caption="AI Abstraction ID"
        [width]="140"
      ></dxi-column>

      <dxi-column
        dataField="portfolioName"
        caption="Portfolio"
        [minWidth]="160"
      ></dxi-column>

      <dxi-column
        dataField="buildingName"
        caption="Building"
        [minWidth]="160"
      ></dxi-column>

      <dxi-column
        dataField="formName"
        caption="Form"
        [minWidth]="180"
      ></dxi-column>

      <dxi-column
        dataField="aiTenant"
        caption="Tenant"
        [minWidth]="150"
        cellTemplate="tenantLinkTemplate"
      ></dxi-column>

      <dxi-column
        dataField="status"
        caption="Status"
        [width]="130"
        cellTemplate="statusTemplate"
      ></dxi-column>

      <dxi-column
        dataField="aiLeaseEndDate"
        caption="Lease End Date"
        dataType="date"
        format="MM/dd/yyyy"
        [width]="140"
      ></dxi-column>

      <dxi-column
        dataField="createdDate"
        caption="Submitted"
        dataType="date"
        format="MM/dd/yyyy"
        [width]="120"
        [sortOrder]="'desc'"
      ></dxi-column>

      <dxi-column
        dataField="lastModifiedDate"
        caption="Last Updated"
        dataType="date"
        format="MM/dd/yyyy"
        [width]="130"
      ></dxi-column>

      <div *dxTemplate="let cell of 'tenantLinkTemplate'">
        <a class="grid-link">{{ cell.data.aiTenant || '—' }}</a>
      </div>

      <div *dxTemplate="let cell of 'statusTemplate'">
        <span
          class="status-badge status-badge--{{ cell.data.status | lowercase }}"
          [class.status-badge--active]="isCreatedRow(cell.data)"
        >
          <span
            *ngIf="isProcessing(cell.data.status)"
            class="status-spinner"
            aria-hidden="true"
          ></span>
          {{ cell.data.status }}
        </span>
      </div>
    </dx-data-grid>
  </div>
</div>
