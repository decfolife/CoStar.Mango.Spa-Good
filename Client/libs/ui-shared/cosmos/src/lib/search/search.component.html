<div *ngIf="showLabel" class="input-label">
  <span>{{ label }}</span>
  <span *ngIf="optional" class="input-optional">(optional)</span>
  <span *ngIf="required" class="input-required">*</span>
</div>
<mat-form-field
  appearance="outline"
  [class.disabled]="disabled"
  subscriptSizing="dynamic"
>
  <mat-icon
    class="icon-brand-search icon-brand-search-dims"
    svgIcon="brandsearch"
    aria-label="Search"
  ></mat-icon>
  <input class="search__input"
    matInput
    #search
    type="search"
    [placeholder]="placeholder"
    [value]="value"
    (input)="outputSearchText($event.target.value)"
    [disabled]="disabled"
    title="Search"
    aria-label="Search"
  />
  <mat-icon svgIcon="brandclose"
    class="icon-brand-close icon-brand-close-dims"
    *ngIf="value"
    role="button"
    (keydown.enter)="handleClear()"
    (click)="handleClear()"
    (keydown.space)="handleClear()"
    matSuffix
    aria-hidden="false"
    tabindex="0"
    aria-label="Clear Search Field"
  ></mat-icon>
  <mat-hint *ngIf="hint">{{ hint }}</mat-hint>
</mat-form-field>
