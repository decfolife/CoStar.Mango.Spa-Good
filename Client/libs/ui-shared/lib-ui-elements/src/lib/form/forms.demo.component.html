<div *ngIf="formExample === 'registration'">
  <div class="demo-box">
    <div class="demo-box-title">Demo Registration Form</div>
    <div class="demo-box-content">
      <div class="form-wrapper">
        <form crem-form [formGroup]="registerForm" layout='horizontal'>

          <crem-form-item>
            <crem-form-label [required]="true">Full Name</crem-form-label>
            <crem-form-control>
              <crem-input [showHint]="false" [showLabel]="false" [showInfo]="false" [inputType]="'text'" [value]="''"
                [name]="''" [placeholder]="'Full Name'" [required]="false" formControlName='fullName'></crem-input>
            </crem-form-control>
          </crem-form-item>

          <crem-form-item>
            <crem-form-label [required]="true">Email</crem-form-label>
            <crem-form-control>
              <crem-input [showHint]="false" [showLabel]="false" [showInfo]="false" [inputType]="'text'" [value]="''"
                [name]="''" [placeholder]="'Email'" [required]="false" formControlName='email'></crem-input>
            </crem-form-control>
          </crem-form-item>

          <crem-form-item>
            <crem-form-label>Password</crem-form-label>
            <crem-form-control>
              <crem-input [showHint]="false" [showLabel]="false" [showInfo]="false" [inputType]="'password'"
                [value]="''" [name]="''" [placeholder]="'******'" [required]="false"
                formControlName='password'></crem-input>
            </crem-form-control>
          </crem-form-item>

          <crem-form-item>
            <crem-form-label>Confirm Password</crem-form-label>
            <crem-form-control hint="The confirmation has to match the password entered">
              <crem-input [showHint]="false" [showLabel]="false" [showInfo]="false" [inputType]="'password'"
                [value]="''" [name]="''" [placeholder]="'******'" [required]="false"
                formControlName='confirmPassword'></crem-input>
            </crem-form-control>
          </crem-form-item>

          <crem-form-item>
            <crem-form-label>Phone Number</crem-form-label>
            <crem-form-control>
              <crem-input [showHint]="false" [showLabel]="false" [showInfo]="false" [inputType]="'text'" [value]="''"
                [name]="''" [placeholder]="'+1 (404) 000 0000'" [required]="false" formControlName='phoneNumber'></crem-input>
            </crem-form-control>
          </crem-form-item>

          <crem-form-item>
            <crem-form-label>Date of birth</crem-form-label>
            <crem-form-control>
              <crem-date-picker value="01/01/2024" [dateFormat]="'MM/dd/yyyy'" [invalidDateMessage]="'Invalid date'"
                [useMaskBehavior]="false" [showClearButton]="true" [isRequired]="false" [inputId]="'date-picker'"
                [min]="null" [max]="null" [disabled]="false" [showDefaultValidationTooltip]="true" formControlName="dateOfBirth"></crem-date-picker>
            </crem-form-control>
          </crem-form-item>

          <crem-form-item>
            <crem-form-label>Country</crem-form-label>
            <crem-form-control>
              <crem-dropdown
              [id]="'dropdown'"
              [initialSelectedValue]="null"
              [placeholder]="'Select a country...'"
              [label]="'Label'"
              [isSearchable]="true"
              [selectMode]="'single'"
              [required]="false"
              [readOnly]="false"
              formControlName="country"
              [dataSource]="[{displayKey: 'United States', valueKey: 'United States'}, {displayKey: 'Canada', valueKey: 'Canada'}, {displayKey: 'France', valueKey: 'France'}, {displayKey: 'China', valueKey: 'China'}, {displayKey: 'Mexico', valueKey: 'Mexico'}]"
              [allowSearch]="true"
            ></crem-dropdown>
            </crem-form-control>
          </crem-form-item>

          <crem-form-item>
            <crem-form-control>
              <crem-button type="submit" [id]="'button1'" [text]="'Register'" [btnStyle]="'flat'" [color]="'primary'"
                [size]="'medium'" (buttonClick)="registerFormSubmit()"></crem-button>
            </crem-form-control>
          </crem-form-item>


        </form>
      </div>
    </div>
  </div>
</div>
