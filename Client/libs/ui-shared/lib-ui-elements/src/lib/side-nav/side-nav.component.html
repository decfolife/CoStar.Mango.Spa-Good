<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened>
    <div class='sidenavTop'>
      <ul class="navList" >
        <li class="listItem"  *ngFor="let link of links">
          <a *ngIf="!link.style" mat-list-item [href]="link.href"> {{ link.text }} </a>
          <a *ngIf="link.style" mat-list-item [ngStyle]="link.style" [href]="link.href"> {{ link.text }} </a>
        </li>
      </ul>
    </div>
    <hr id="sidenavLine" />
  </mat-sidenav>
  <mat-sidenav-content>
   <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
