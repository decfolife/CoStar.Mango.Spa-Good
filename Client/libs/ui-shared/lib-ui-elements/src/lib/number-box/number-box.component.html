<dx-number-box [ngClass]="{red_border: showRedBorder}"
    class="cremNumberBox"
    #DxTextBoxComponent
    [(value)]="value"
    [inputAttr]="{ 'id': inputId, 'aria-label': inputLabel }"
    (onValueChanged)="onValueChanged($event)"
    (onInitialized)="onInitialized($event)"
    [disabled]="disabled"
    [placeholder]="inputPlaceHolder"
    [format]="numberFormat"
>
    <dx-validator #NumberBoxValidator>
        <dxi-validation-rule *ngIf="isRequired"
            type="required"
            [message]="''"
        ></dxi-validation-rule>
    </dx-validator>
</dx-number-box>
