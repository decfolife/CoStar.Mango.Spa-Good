<div *ngIf="loading" [ngClass]="getCssClasses()" aria-label="Loading App">
    <div *ngIf="showLogo" class="logo"></div>
    <div *ngIf="tagline" class="tagline">{{tagline}}</div>
    <div *ngIf="text" class="text">{{text}}</div>
    <div *ngIf="showSpinner" class="spinner-3">
      <mat-spinner></mat-spinner>
    </div>
  </div>
