<dx-date-box
  class="date-box"
  [(value)]="value"
  [displayFormat]="dateFormat"
  [inputAttr]="{
    id: inputId,
    'aria-controls': 'dateBoxPopupWrapper',
    title: 'Press Space to open the calendar'
  }"
  [invalidDateMessage]="invalidDateMessage || 'Value must be a date'"
  (onContentReady)="onContentReady($event)"
  (onValueChanged)="onValueChanged($event)"
  (onInitialized)="onInitialized($event)"
  (onKeyDown)="onKeyDown($event)"
  (onOpened)="onCalendarOpened()"
  (onClosed)="onCalendarClosed()"
  (onBlur)="onBlur($event)"
  [showClearButton]="showClearButton"
  [useMaskBehavior]="useMaskBehavior"
  [placeholder]="placeholderText"
  [min]="min"
  [max]="max"
  [disabled]="disabled"
  [valueChangeEvent]="valueChangeEvent"
>
  <dxo-drop-down-options
    [wrapperAttr]="{ id: 'dateBoxPopupWrapper', class: inputWrapperClass }"
  >
  </dxo-drop-down-options>
  <dx-validator #DateBoxValidator>
    <ng-container
      *ngIf="
        showDefaultValidationTooltip;
        then DefaultValidationTooltip;
        else NoDefaultValidationTooltip
      "
    ></ng-container>
    <ng-template #DefaultValidationTooltip>
      <dxi-validation-rule
        *ngIf="isRequired"
        type="required"
      ></dxi-validation-rule>
    </ng-template>
    <ng-template #NoDefaultValidationTooltip>
      <dxi-validation-rule
        *ngIf="isRequired"
        type="required"
        [message]="''"
      ></dxi-validation-rule>
    </ng-template>
    <dxi-validation-rule
      *ngIf="status !== 'default' && statusMessage"
      type="custom"
      [validationCallback]="cremSharedComponentValidator"
      [message]="statusMessage"
    >
    </dxi-validation-rule>
  </dx-validator>
</dx-date-box>
