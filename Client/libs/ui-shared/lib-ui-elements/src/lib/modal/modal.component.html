<div
  #modalHost
  [ngClass]="{
		'cremModal': true,
		'has-footer': primaryFooterButtonText || closeOrCancelButtonText || customFooter,
	}"
  [class]="className"
  [id]="modalId"
  role="dialog"
  [attr.aria-labelledby]="modalTitleId ?? ''"
  [attr.aria-modal]="true"
  [cremDataId]="dataId"
>
  <!-- Header -->
  <div
    class="modalHeader"
    cdkDrag
    cdkDragRootElement=".cdk-overlay-pane"
    [cdkDragFreeDragPosition]="dragPosition"
    (cdkDragEnded)="dragEndEvent($event)"
    cdkDragHandle
  >
    <ng-container *ngIf="loading?.show && loading.headerLoading">
      <crem-skeleton type="header"></crem-skeleton>
      <button
        *ngIf="closeIconVisible"
        (click)="closeDialog()"
        class="btn-close btn-none modalCloseButton"
        color="secondary"
        aria-label="Close"
        [cremDataId]="{
          prefix: 'modal',
          dataId: 'close',
          generateId: false
        }"
      >
        <mat-icon class="closeIcon">close</mat-icon>
      </button>
    </ng-container>

    <ng-container *ngIf="!loading?.show">
      <!-- Custom Header -->
      <ng-content
        *ngIf="customHeader"
        select="'[modalHeader]'"
        [cremDataId]="{
          prefix: 'modal',
          dataId: 'drag_drop',
          generateId: false
        }"
      ></ng-content>

      <!-- Default Header -->
      <ng-container *ngIf="!customHeader">
        <h2
          [id]="modalTitleId ?? ''"
          class="modal-title"
          [cremDataId]="{
            prefix: 'modal',
            dataId: 'drag_drop',
            generateId: !!modalTitleId,
          }"
        >
          {{ modalTitle }}
        </h2>

        <crem-tooltip
          *ngIf="showTooltip"
          [helpTextData]="tooltipText"
          [cremDataId]="{
            prefix: 'modal',
            dataId: 'info',
            generateId: false,
          }"
        ></crem-tooltip>
        <button
          *ngIf="closeIconVisible"
          (click)="closeDialog()"
          class="btn-close btn-none modalCloseButton"
          color="secondary"
          aria-label="Close"
          [cremDataId]="{
            prefix: 'modal',
          }"
        >
          <mat-icon class="closeIcon">close</mat-icon>
        </button>
      </ng-container>
    </ng-container>

    <!-- Loading Indicator -->
  </div>

  <!-- Main Content -->
  <div
    class="modalContent"
    [ngClass]="{
		 'scroll-container': scrollbar === 'auto-hide',
		 'vertical':  scrollbar === 'auto-hide',
		}"
  >
    <!-- Main Content -->
    <ng-content *ngIf="!loading?.show" select="'[modalContent]'"></ng-content>

    <!-- Main Content: Loading Indicator -->
    <ng-container *ngIf="loading?.show">
      <ng-container [ngSwitch]="loading.type">
        <ng-container *ngSwitchCase="'form'">
          <crem-skeleton
            type="form"
            [instances]="loading.instances"
          ></crem-skeleton>
        </ng-container>

        <dx-load-panel
          [shading]="true"
          [showPane]="true"
          [showIndicator]="true"
          *ngSwitchCase="'spinner'"
          [visible]="loading?.show"
          [closeOnOutsideClick]="false"
        ></dx-load-panel>
      </ng-container>
    </ng-container>
  </div>

  <!-- Footer -->
  <div
    class="modalFooter"
    *ngIf="primaryFooterButtonText || closeOrCancelButtonText || customFooter"
  >
    <!-- Custom Footer -->
    <ng-container *ngIf="customFooter">
      <!-- Footer with separated controls -->
      <ng-container *ngIf="hasCustomControls; else simpleCustom">
        <ng-content select="[footerLeftControls]"></ng-content>
        <ng-content select="[footerRightControls]"></ng-content>
      </ng-container>
    </ng-container>

    <!-- Simple Footer -->
    <ng-template #simpleCustom>
      <ng-content select="[modalFooter]"></ng-content>
    </ng-template>

    <!-- Default Footer -->
    <div *ngIf="!customFooter" class="footerLeftControls"></div>
    <div
      *ngIf="!customFooter"
      id="'buttonTemplate'"
      class="footerRightControls"
    >
      <crem-button
        *ngIf="closeOrCancelButtonText"
        type="secondary"
        id="close-btn"
        (click)="closeDialog()"
        [dataId]="{
          prefix: 'modal',
          dataId: 'cancel',
        }"
        >{{ closeOrCancelButtonText }}</crem-button
      >

      <crem-button
        *ngIf="primaryFooterButtonText"
        id="footer-primary-btn"
        [disabled]="primaryFooterButtonEnabledDisabled"
        type="primary"
        (click)="primaryEvent($event)"
        [dataId]="{
          prefix: 'modal',
        }"
        >{{ primaryFooterButtonText }}</crem-button
      >
    </div>
  </div>
</div>
