<div class="cremModal" [id]="modalId">
	<div class="modalHeader" cdkDrag cdkDragRootElement=".cdk-overlay-pane" cdkDragHandle>
		<div [id]="modalTitleId"class="modal-title"> {{ modalTitle }}</div>
		<crem-button
      *ngIf="closeIconVisible"
      (click)="closeDialog()"
      class="btn-none"
      color="secondary"
      btnStyle="basic"
      ariaLabel="Close"
      icon="cremXMark"
      iconPack="crem"
    ></crem-button>
	</div>
	<div class="modalContent">
   	 <ng-content select="'[modalContent]'"></ng-content>
	</div>
	<div class="modalFooter" *ngIf="primaryFooterButtonText || closeOrCancelButtonText || customFooter">
		<ng-content *ngIf="customFooter" select="'[modalFooter]'"></ng-content>
		<div *ngIf="!customFooter" id="'buttonTemplate'" class="footerRightControls">
			<crem-button *ngIf="closeOrCancelButtonText" type="secondary" id="close-btn" (click)="closeDialog()">{{closeOrCancelButtonText}}</crem-button>
			<crem-button *ngIf="primaryFooterButtonText" [disabled]="primaryFooterButtonEnabledDisabled" type="primary" (click)="primaryEvent($event)"> {{primaryFooterButtonText}} </crem-button>
		</div>
	</div>
</div>
