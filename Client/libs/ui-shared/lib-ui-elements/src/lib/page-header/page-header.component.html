<div class="page-header">
  <div class="page-header__body">
    <div class="body__tab-title">
      <crem-input-label [label]="tabTitle" [name]="pageTitle">
      </crem-input-label>
    </div>
    <div class="body__page-title">
      <crem-input-label
        [label]="pageTitle"
        [name]="pageTitle"
        [required]="false"
      >
      </crem-input-label>
    </div>
    <div class="body__filters">
      <ng-content *ngIf="customFilters" select="[filters]"></ng-content>
    </div>
  </div>
  <div *ngIf="(statusPill | json) !== '{}'" class="page-header__status-pill">
    <crem-pill
      [text]="statusPill.text"
      [type]="statusPill.type"
      [titleOnHover]="statusPill.titleOnHover ? statusPill.titleOnHover : ''"
      [displayLockIcon]="statusPill.displayLockIcon"
      [lockedMessage]="statusPill.lockedMessage"
    ></crem-pill>
  </div>
  <div class="page-header__bookmark" *ngIf="showBookmarkButton">
    <crem-icon
      icon="faStar"
      library="fontAwesome"
      [pack]="isBookmarked ? 'solid' : 'regular'"
      [color]="isBookmarked ? 'warning' : 'dark'"
      (click)="toggleBookmark()"
    ></crem-icon>
  </div>
  <div class="page-header__actions">
    <div class="actions__custom" *ngIf="customActions">
      <ng-content select="[actions]"></ng-content>
    </div>
    <div class="page-header__settings">
      <div
        *ngIf="showListOrMapViewButtons"
        class="page-header__settings__list-map-view"
      >
        <crem-button
          *ngIf="listView"
          [ariaLabel]="'list-view'"
          [type]="'secondary'"
          [btnStyle]="'basic'"
          [icon]="'faList'"
          (buttonClick)="showListOrMapView('list-view')"
        >
        </crem-button>
        <crem-button
          *ngIf="!listView"
          [type]="'secondary'"
          [btnStyle]="'basic'"
          [icon]="'faMap'"
          (buttonClick)="showListOrMapView('map-view')"
        >
        </crem-button>
      </div>
      <ng-content *ngIf="customSettings" select="[settings]"></ng-content>
      <crem-icon
        class="actions__cog-button"
        *ngIf="showSettingsButton"
        [icon]="'faGear'"
        [color]="'dark'"
      ></crem-icon>
    </div>
  </div>
</div>
