<ul class="tabs-nav" role="tablist" aria-label="Search results">
  <li
    role="tab"
    tabindex="0"
    class="tab-item__link"
    *ngFor="let tab of tabs"
    (click)="selectTab(tab)"
    (keydown)="onKeyDownEvent($event, tab)"
    [class.active]="tab.active"
    [class.disabled]="tab.disabled"
    [attr.id]="tab.id || null"
    [attr.aria-selected]="tab.active"
    [attr.aria-controls]="'tabpanel-' + (tab.id || i)"
  >
    <a>{{ tab.title }}</a>
  </li>
</ul>
<ng-content></ng-content>
