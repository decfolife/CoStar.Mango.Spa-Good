<dx-select-box *ngIf="useSelectBox && !loading"
  [id]="id"
  [(opened)]="isDropDownBoxOpened"
  [ngClass]="{red_border: showRedBorder}"
  [placeholder]="placeholder"
  [dataSource]="dataSource"
  [valueExpr]="valueExpr"
  [displayExpr]="displayExpr"
  [disabled]="isDisabled"
  [visible]="isVisible"
  [showClearButton]="showClearButton"
  (onValueChanged)="dropdownOnValueChanged($event)"
  (onKeyDown)="onKeyDown($event, cell)"
  [searchEnabled]="allowSearch"
  [grouped]="grouped"
  [groupTemplate]="useCustomGroupTemplate ? 'selectBoxCustomGroupTemplate' : 'group'"
  [value]="selectBoxValue"
  searchMode="startswith"
  [deferRendering]="false"
  [readOnly]="readOnly"
  (onOpened)="openDropdown($event)"
  [itemTemplate]="itemTemplate ? itemTemplate: 'default'"
  [inputAttr]="{ title: hoverText ? hoverText : placeholder, 'aria-controls': id, 'aria-label': hoverText ? hoverText : placeholder}"
>
  <!-- Dropdown's header options -->
  <div *dxTemplate="let data of 'selectBoxCustomGroupTemplate'">
    <ng-template  *ngTemplateOutlet="customHeaderTemplate; context: { fieldData : data }"
    ></ng-template>
  </div>

  <!-- Validators -->
  <dx-validator #SelectBoxValidator>
    <ng-container *ngIf="showDefaultValidationTooltip; then DefaultValidationTooltip else NoDefaultValidationTooltip"></ng-container>
    <ng-template #DefaultValidationTooltip>
      <dxi-validation-rule *ngIf="required && !customRequireValidation"
          type="required"
      ></dxi-validation-rule>
    </ng-template>
    <ng-template #NoDefaultValidationTooltip>
      <dxi-validation-rule *ngIf="required && !customRequireValidation"
          type="required"
          [message]="''"
      ></dxi-validation-rule>
    </ng-template>
  </dx-validator>

  <!-- Dropdown's Input -->
  <dxo-drop-down-options
    [container]="containerized ? id : undefined"
    [hideOnParentScroll]="false"
    [wrapperAttr]="selectBoxWrapperAttr"
  ></dxo-drop-down-options>

  <!-- Template: Default -->
  <ng-container *dxTemplate="let item of 'default'">
    {{ item.name || item.displayValue || item.value || item[displayExpr]}}
  </ng-container>

  <!-- Template: With Item's Menu -->
  <div class="item" *dxTemplate="let item of 'withMenu'">
    <div class="item-name" title="">
      {{ item.name || item.displayValue || item.value || item[displayExpr]}}
      <span *ngIf="item.secondaryText" class="item-secondary">{{item.secondaryText}}</span><!-- Secondary Option Text, often used for the "(Default)" tag  -->
    </div>
    <!-- More Menu -->
    <ng-container *ngIf="item.moreMenu">
      <div class="item-menu" title="More Options">
        <crem-button
          btnStyle="basic"
          color="secondary"
          size="small"
          className="icon"
          icon="faEllipsisH"
          iconPack="solid"
          (click)="$event.stopPropagation(); $event.preventDefault(); moreMenuDropdownClick(item)"
          [matMenuTriggerFor]="ItemViewMore"
        ></crem-button>

        <!-- More Menu Options -->
        <mat-menu #ItemViewMore="matMenu" class="item-more-dropdown">
          <ng-container *ngFor="let option of item.moreMenu">
            <ng-container [ngSwitch]="option.type">
              <!-- Menu Item -->
              <button *ngSwitchDefault
                mat-menu-item
                [class]="'mat-menu-child-button ' + (option.class ? option.class : '')"
                (click)="option.action(); option.stopPropagation ? $event.stopPropagation() : null"
                [disabled]="option.disabled ? option.disabled : false"
                [title]="option.title ?? ''"
              >{{option.name}}</button>
              <!-- Separator -->
              <hr *ngSwitchCase="'separator'" />
            </ng-container>
          </ng-container>
        </mat-menu>
        <!-- End More Menu Options -->
      </div>
    </ng-container>
    <!-- End More Menu -->

  </div>

</dx-select-box>

<dx-drop-down-box *ngIf="!useSelectBox" #dropDownBox
  [id]="id + '_box'"
  [(opened)]="isDropDownBoxOpened"
  [placeholder]="placeholder"
  [dataSource]="dataSource"
  [value]="selectedDisplay"
  [valueExpr]="valueExpr"
  [displayExpr]="displayExpr"
  (click)="(isDropDownBoxOpened === !isDropDownBoxOpened)"
  [contentTemplate]="'dropdownTemplate'"
  [disabled]="isDisabled"
  [visible]="isVisible"
  [showClearButton]="showClearButton"
  (onValueChanged)="dropdownOnValueChanged($event)"
  (onKeyDown)="onKeyDown($event, cell)"
  [deferRendering]="false"
  (onOpened)="openDropdown($event)"
  [inputAttr]="{ title: placeholder, 'aria-controls': id + 'dropdownContainer', 'aria-label': placeholder}"
>

  <dxo-drop-down-options
    [id]="id + '_box'"
    [container]="containerized ? id : undefined"
    [hideOnParentScroll]="false"
    [wrapperAttr]="wrapperAttr"
  ></dxo-drop-down-options>

  <div [id]="id + 'dropdownContainer'"
    *dxTemplate="let data of 'dropdownTemplate'"
  >
    <fieldset>
      <legend hidden=true>
        Drop Down
      </legend>
      <dx-data-grid class="drop-down-box__grid"
        dropdownTemplate
        [dataSource]="dataSource"
        [columns]="displayExpr"
        [showColumnHeaders]="showColumnHeader"
        [selectedRowKeys]="selections"
        [showColumnLines]="false"
        (onKeyDown)="onGridKeyDown($event, cell)"
        (onSelectionChanged)="getSelectedRowsData($event)"
        [scrolling]="{ mode: 'standard' }"
        [elementAttr]="{ style: 'max-height: 345px;'}"
        [paging]="false"
        [keyExpr]="keyExpr || valueExpr"
        (onContentReady)="ADAattributes($event)"
        (onCellClick)="onCellClick($event)"
        (keyup)="onKeyUp($event)"
      >
        <dxo-filter-row [visible]="allowSearch"></dxo-filter-row>
        <dxo-selection
          [mode]="selectMode"
          [showCheckBoxesMode]="showCheckBoxesMode"
          selectAllMode="allPages"
        ></dxo-selection>
        <dxi-column
          [dataField]="displayExpr"
          [caption]="dropdownHeaderDisplay">
        </dxi-column>
      </dx-data-grid>
    </fieldset>
  </div>

</dx-drop-down-box>
