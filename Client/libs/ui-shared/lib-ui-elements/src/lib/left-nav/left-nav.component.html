<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened>
    <div class="sidenavTop">
      <mat-tree
        [dataSource]="itemSource"
        [treeControl]="treeControl"
        class="example-tree"
      >
        <!-- This is the tree node template for leaf nodes -->
        <mat-tree-node *matTreeNodeDef="let currentItem" matTreeNodeToggle>
          <li class="mat-tree-node">
            <!-- use a disabled button to provide padding for tree leaf -->
            <button mat-icon-button disabled></button>
            <!-- <a *ngIf="currentItem.routerLink !== null" mat-list-item href="#" [routerLink]="currentItem.routerLink" -->
            <!-- routerLinkActive="active" routerLinkActiveOptions="{exact:true}">{{currentItem.text}}</a> -->

            <a mat-list-item [href]="currentItem.Href">{{
              currentItem.Text
            }}</a>
          </li>
        </mat-tree-node>
        <!-- This is the tree node template for expandable nodes -->
        <mat-nested-tree-node *matTreeNodeDef="let currentItem; when: hasChild">
          <li>
            <div [id]="currentItem.Id" class="mat-tree-node">
              <!-- <a *ngIf="currentItem.routerLink !== null" mat-list-item href="#" [routerLink]="currentItem.routerLink" -->
              <!-- routerLinkActive="active" routerLinkActiveOptions="{exact:true}">{{currentItem.text}}</a> -->
              {{ currentItem.Text }}
              <button
                mat-icon-button
                matTreeNodeToggle
                [attr.aria-label]="'Toggle ' + currentItem.Text"
              >
                <!-- <crem-icon *ngIf="treeControl.isExpanded(currentItem)" [iconPath]="mdiChevronDown">
                 </crem-icon>
                 <crem-icon *ngIf="!treeControl.isExpanded(currentItem)" [iconPath]="mdiChevronRight">
                </crem-icon> -->
              </button>
            </div>
            <ul
              [class.example-tree-invisible]="
                !treeControl.isExpanded(currentItem)
              "
            >
              <ng-container matTreeNodeOutlet></ng-container>
            </ul>
          </li>
        </mat-nested-tree-node>
      </mat-tree>
    </div>
    <hr id="sidenavLine" />
  </mat-sidenav>

  <mat-sidenav-content>
    <ng-content select="routerOutlet"></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
