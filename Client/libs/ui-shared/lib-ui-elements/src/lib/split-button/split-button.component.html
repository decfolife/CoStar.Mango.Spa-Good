<div class="split-button">
  <div class="split-button__container">
    <crem-button
      class="split-button__container__main-button"
      [id]="'main-split-button'"
      [text]="text"
      [color]="color"
      [btnStyle]="btnStyle"
      [size]="'medium'"
      [disabled]="disabled"
      (click)="onMainButtonClick()"
    ></crem-button>
    <crem-button
      class="split-button__container__seperator"
      [text]="'|'"
      [color]="color"
      [btnStyle]="btnStyle"
      [size]="'medium'"
      [disabled]="disabled"
    ></crem-button>
    <crem-button
      class="split-button__container__caret-button"
      [id]="'caret-split-button'"
      [icon]="icon"
      [color]="color"
      [btnStyle]="btnStyle"
      [size]="'medium'"
      [disabled]="disabled"
      ariaLabel="Show Options"
      (click)="toggleDropdown($event)"
    ></crem-button>
  </div>
  <div
    class="split-button__dropdown"
    *ngIf="dropDownOpen"
    role="menu"
    [ngClass]="{
    'split-button__dropdown__right': dropdownPosition === 'left',
    'split-button__dropdown__left': dropdownPosition === 'right',
  }"
  >
    <div
      class="split-button__dropdown__dropdown-item"
      *ngFor="let option of options"
      (click)="onOptionSelect($event)"
      role="menuitem"
      [attr.tabindex]="0"
    >
      {{ option }}
    </div>
  </div>
</div>
