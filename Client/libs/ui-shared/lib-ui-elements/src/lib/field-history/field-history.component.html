<div
  class="dx-field"
  >
  <div class="iconWrapper dx-field-value-static">
    <crem-icon
      [id]="helpTextID"
      class="dx-field__icon dx-field__icon--info"
      icon="cremInfo"
      fill="#C8C8C8"
      pack="crem"
      tabindex="0"
      aria-label="Click to view help text and history"
      role="img"
      (click)="toggleVisible()"
      (keydown.enter)="toggleVisible()"
      (keydown.space)="toggleVisible(); $event.preventDefault()"
    ></crem-icon>

    <dx-popover [target]="'#' + helpTextID" *ngIf="dataSource"
      position="bottom"
      role="tooltip"
      aria-label="Pop-up with help text and history tabs"
      [width]="600"
      [(visible)]="visible"
    >
      <dxo-animation>
        <dxo-show type="pop"
          [from]="{ scale: 0 }"
          [to]="{ scale: 1 }"
        ></dxo-show>

        <dxo-hide type="fade"
          [from]="1"
          [to]="0"
        ></dxo-hide>
      </dxo-animation>

      <div id="popoverWrapper"
        class="tooltipAppPopover"
        aria-live="assertive"
      >
        <div *ngIf="dataSource?.helpTextSubject"
          id="popoverWrapper"
        ><div class="popoverTitle" #popoverTitle tabindex="0"  (keydown.escape)="toggleVisible()"
        >{{ dataSource?.helpTextSubject }}</div></div>

        <mat-tab-group disableRipple="true"
          animationDuration="1000ms"
        >
          <mat-tab tabindex="0" [attr.id]="'helpTextTitle'" label="Help Text">
            <div class="mat-tab__help-text" *ngIf="dataSource?.helpTextText">{{ dataSource?.helpTextText }}</div>

            <div class="mat-tab__help-text" *ngIf="dataSource?.helpTextText === null || dataSource?.helpTextText === undefined">
              <p>No help text available.</p>
            </div>
          </mat-tab>

          <mat-tab tabindex="0" [attr.id]="'helpTextHistory'" label="History">
            <div *ngIf="dataSource?.helpTextHistory">
              <dx-data-grid [dataSource]="dataSource?.helpTextHistory"
                keyExpr="id"
                [showColumnLines]="false"
                [showRowLines]="false"
                [showBorders]="false"
                [rowAlternationEnabled]="true"
                [allowColumnResizing]="true"
                [allowColumnReordering]="false"
                [columnAutoWidth]="true"
                [wordWrapEnabled]="true"
              >
                <dxo-sorting mode="none"></dxo-sorting>

                <dxo-header-filter [visible]="true"></dxo-header-filter>

                <dxo-scrolling mode="virtual"></dxo-scrolling>

                <dxi-column dataField="afterChange"
                  caption="Value"
                ></dxi-column>

                <dxi-column dataField="lastModifiedBy"
                  caption="User"
                  [width]="140"
                ></dxi-column>

                <dxi-column dataField="lastModified"
                  dataType="date"
                  caption="Date"
                  [width]="100"
                  [format]="dateFormat"
                ></dxi-column>
              </dx-data-grid>
            </div>

            <div id="noHistoryText"
              *ngIf="dataSource?.helpTextHistory === null || dataSource?.helpTextHistory === undefined"
            ><p>No change history to show.</p></div>

          </mat-tab>
        </mat-tab-group>
      </div>
    </dx-popover>
  </div>
</div>
