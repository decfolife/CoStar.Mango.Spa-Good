<div class="dx-field">
  <div class="iconWrapper dx-field-value-static">
    <!-- Button -->
    <ng-container *ngIf="displayIcon === 'infoHistoryIcon'">
      <button
        #TriggerIcon
        type="button"
        tabindex="0"
        [id]="helpTextID"
        [attr.role]="img"
        [cremDataId]="dataId"
        class="info-history-icon"
        [attr.title]="'Click to view help text and history'"
        [attr.aria-label]="'Click to view help text and history'"
        (click)="toggleVisible()"
        (keydown)="toggleFieldHistory($event)"
      ></button>
    </ng-container>

    <crem-icon
      *ngIf="displayIcon !== 'infoHistoryIcon'"
      #TriggerIcon
      [id]="helpTextID"
      class="dx-field__icon dx-field__icon--info"
      icon="cremInfo"
      fill="#C8C8C8"
      pack="crem"
      tabindex="0"
      aria-label="Click to view help text and history"
      role="img"
      (click)="toggleVisible()"
      (keydown.enter)="toggleVisible()"
      (keydown.space)="toggleVisible(); $event.preventDefault()"
    ></crem-icon>

    <!-- Popover -->
    <dx-popover
      [target]="'#' + helpTextID"
      *ngIf="dataSource"
      [position]="popoverConf.position"
      [width]="popoverConf.width"
      [minWidth]="popoverConf.minWidth"
      [maxWidth]="popoverConf.maxWidth"
      [height]="popoverConf.height"
      [minHeight]="popoverConf.minHeight"
      [maxHeight]="popoverConf.maxHeight"
      [(visible)]="visible"
      [wrapperAttr]="popoverWrapperAttr"
      (onHidden)="onPopoverHidden()"
    >
      <dxo-animation>
        <dxo-show
          type="pop"
          [from]="{ scale: 0 }"
          [to]="{ scale: 1 }"
        ></dxo-show>

        <dxo-hide type="fade" [from]="1" [to]="0"></dxo-hide>
      </dxo-animation>

      <div id="popoverWrapper" class="tooltipAppPopover">
        <!-- Info/Help Tab -->
        <div *ngIf="dataSource?.helpTextSubject">
          <div class="popoverTitle" #popoverTitle tabindex="0">
            {{ dataSource?.helpTextSubject }}
          </div>
        </div>

        <!-- History Tab -->
        <crem-tabs
          [id]="'field-history-tabPanel'"
          [selectedTabIndex]="0"
          (selectedTabChange)="onTabChanged($event)"
        >
          <!-- Info Tab -->
          <crem-tab-item
            *ngIf="showInfoTab"
            title="{{ dataSource?.helpTextName }}"
            id="helpTextTab"
            [height]="_tabHeight"
          >
            <div class="mat-tab__help-text" *ngIf="dataSource?.helpTextText">
              {{ dataSource?.helpTextText }}
            </div>

            <div
              class="mat-tab__help-text"
              *ngIf="
                dataSource?.helpTextText === null ||
                dataSource?.helpTextText === undefined
              "
            >
              <p>No help text available.</p>
            </div>
          </crem-tab-item>

          <!-- History Tab -->
          <crem-tab-item id="HistoryTab" title="History" [height]="_tabHeight">
            <div *ngIf="dataSource?.helpTextHistory">
              <dx-data-grid
                #HistoryDataGrid
                [dataSource]="dataSource?.helpTextHistory"
                [columns]="columns"
                [keyExpr]="historyGridConfiguration.keyExpr"
                [showColumnLines]="historyGridConfiguration.showColumnLines"
                [showRowLines]="historyGridConfiguration.showRowLines"
                [showBorders]="historyGridConfiguration.showBorders"
                [rowAlternationEnabled]="
                  historyGridConfiguration.rowAlternationEnabled
                "
                [allowColumnResizing]="
                  historyGridConfiguration.allowColumnResizing
                "
                [allowColumnReordering]="
                  historyGridConfiguration.allowColumnReordering
                "
                [columnAutoWidth]="historyGridConfiguration.columnAutoWidth"
                [wordWrapEnabled]="historyGridConfiguration.wordWrapEnabled"
                [height]="_gridHeight"
              >
                <dxo-sorting
                  [mode]="historyGridConfiguration.sortingMode"
                ></dxo-sorting>

                <dxo-header-filter
                  [visible]="historyGridConfiguration.headerFilter?.visible"
                ></dxo-header-filter>

                <dxo-scrolling
                  [mode]="historyGridConfiguration.scrolling?.mode"
                ></dxo-scrolling>

                <dxo-paging
                  [pageSize]="
                    historyGridConfiguration.paging?.allowedPageSizes[0]
                  "
                ></dxo-paging>

                <dxo-pager
                  [enabled]="false"
                  [visible]="historyGridConfiguration.paging?.visible"
                  [showInfo]="historyGridConfiguration.paging?.showInfo"
                  [infoText]="historyGridConfiguration.paging?.infoText"
                  [allowedPageSizes]="
                    historyGridConfiguration.paging?.allowedPageSizes
                  "
                  [showPageSizeSelector]="
                    historyGridConfiguration.paging?.showPageSizeSelector
                  "
                  [showNavigationButtons]="
                    historyGridConfiguration.paging?.showNavigationButtons
                  "
                ></dxo-pager>

                <!-- TODO: Migrate to the column input parameter to fully parameterized, update on dynamic forms -->
                <ng-container *ngIf="!columns">
                  <dxi-column
                    dataField="afterChange"
                    caption="Value"
                  ></dxi-column>

                  <dxi-column
                    dataField="lastModifiedBy"
                    caption="User"
                    [width]="140"
                  ></dxi-column>

                  <dxi-column
                    dataField="displayName"
                    caption="Field"
                    [width]="140"
                    [visible]="showFieldName"
                  ></dxi-column>

                  <dxi-column
                    dataField="lastModified"
                    dataType="date"
                    caption="Date"
                    [width]="100"
                    [format]="dateFormat"
                  ></dxi-column>
                </ng-container>
              </dx-data-grid>
            </div>

            <div
              id="noHistoryText"
              *ngIf="
                dataSource?.helpTextHistory === null ||
                dataSource?.helpTextHistory === undefined
              "
            >
              <p>No change history to show.</p>
            </div>
          </crem-tab-item>
        </crem-tabs>
      </div>
    </dx-popover>
  </div>
</div>
