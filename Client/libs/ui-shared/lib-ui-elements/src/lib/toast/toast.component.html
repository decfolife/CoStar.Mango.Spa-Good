<div
  class="template-wrapper content"
  [ngClass]="getToastBorderColor()"
  [ngStyle]="getWrapperCSS()"
  (click)="closeOnClick && close()"
  *ngIf="visible"
  role="alert"
  aria-atomic="true"
>
  <div class="icon-container">
    <div class="icon-wrapper" [ngClass]="getIconBgColorClasses()">
      <crem-icon
        *ngIf="state == 'info'"
        size="xl"
        pack="solid"
        icon="faCircleInfo"
        aria-hidden="true"
      ></crem-icon>
      <crem-icon
        *ngIf="state == 'success'"
        size="xl"
        pack="solid"
        icon="faCircleCheck"
        aria-hidden="true"
      ></crem-icon>
      <crem-icon
        *ngIf="state == 'warning'"
        size="xl"
        pack="solid"
        icon="faCircleExclamation"
        aria-hidden="true"
      ></crem-icon>
      <crem-icon
        *ngIf="state == 'error'"
        size="xl"
        pack="solid"
        icon="faCircleXmark"
        aria-hidden="true"
      ></crem-icon>
    </div>
  </div>
  <div
    [ngClass]="{'message':true, 'no-header': messageHeader === '' || !messageHeader,}"
  >
    <div
      *ngIf="messageHeader"
      class="message-header"
      [id]="'toast-header-' + createdAt"
    >
      {{ messageHeader }}
    </div>
    <div *ngIf="!!showBody" class="message-content">{{ message }}</div>
    <div *ngIf="!!showBody" [innerHTML]="contentTemplate"></div>
  </div>
  <div class="close-button-wrapper" *ngIf="showCloseButton">
    <button
      type="button"
      class="close-button"
      [attr.aria-label]="
        'Toast notification' + (messageHeader ? ': ' + messageHeader : '')
      "
      (click)="close()"
    >
      <crem-icon
        aria-hidden="true"
        size="m"
        pack="crem"
        color="gray03"
        icon="cremXMark"
      ></crem-icon>
    </button>
  </div>
</div>
