<div class="not-found">
    <div class="not-found__content-wrapper">
        <div class="not-found__title-wrapper">
            <h1 class="not-found__title">
                {{title}}
            </h1>
        </div>
        <div class="not-found__subtitle-wrapper">
            <h2 class="not-found__subtitle">
                {{subtitle}}
            </h2>
        </div>
    </div>
    <img class="not-found__image" src="assets/images/searchRealEstate.svg" alt="{{title}} image" />
</div>
