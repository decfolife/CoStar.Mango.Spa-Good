<crem-input-label *ngIf="showLabel" [label]="label" [name]="name" [required]="required"
  [showInfo]="showInfo"></crem-input-label>

<div class="input-container">

  <input #input *ngIf="inputType === 'text'" type="text" [ngClass]="getCssClasses()" [class]="className" [id]="id"
    [(ngModel)]="value" [name]="name" [placeholder]="placeholder" [required]="required" [disabled]="disabled"
    [readonly]="readOnly" [attr.minLength]="minLengthField" [attr.maxLength]="maxLengthField"
    (input)="onInputChange($event)" (blur)="onBlur($event)" (keydown.enter)="onEnter($event)">

  <input *ngIf="inputType === 'number'" type="number" [ngClass]="getCssClasses()" [class]="className" [id]="id"
    [(ngModel)]="value" [name]="name" [placeholder]="placeholder" [required]="required" [disabled]="disabled"
    [readonly]="readOnly" [attr.min]="minNumber" [attr.max]="maxNumber" (input)="onInputChange($event)" (blur)="onBlur($event)" (keydown.enter)="onEnter($event)"
    >

  <input *ngIf="inputType === 'password'" type="password" [ngClass]="getCssClasses()" [class]="className" [id]="id"
    [(ngModel)]="value" [name]="name" [placeholder]="placeholder" [required]="required" [disabled]="disabled"
    [readonly]="readOnly" (input)="onInputChange($event)" (blur)="onBlur($event)" (keydown.enter)="onEnter($event)">


  <textarea #textarea (input)="adjustTextareaHeight(); onInputChange($event)" *ngIf="inputType === 'textarea'"
    [ngClass]="getCssClasses()" [class]="className" [id]="id" [(ngModel)]="value" [name]="name" [placeholder]="placeholder"
    [required]="required" [disabled]="disabled" [readonly]="readOnly" [attr.minlength]="minLengthField"
    [attr.maxlength]="maxLengthField" [rows]="rows" [cols]="cols"></textarea>

  <crem-input-hint *ngIf="showHint" [type]="state" [text]="hintText"></crem-input-hint>
</div>
