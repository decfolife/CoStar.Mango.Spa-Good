<crem-input-label
  *ngIf="showLabel"
  [label]="label"
  [name]="name"
  [required]="required"
  [showInfo]="showInfo"
></crem-input-label>

<div class="input-container">
  <div class="error-icon">
    <crem-error-tooltip
      *ngIf="status !== 'default'"
      [status]="status"
      [message]="statusMessage"
    ></crem-error-tooltip>
  </div>

  <input
    #input
    *ngIf="inputType === 'text' && !mask"
    type="text"
    [ariaLabel]="ariaLabel"
    [ngClass]="getCssClasses()"
    [class]="className"
    [id]="id"
    [(ngModel)]="value"
    [name]="name"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [readonly]="readOnly"
    [attr.minLength]="minLengthField"
    [attr.maxLength]="maxLengthField"
    (input)="onInputChange($event)"
    (blur)="onBlur($event)"
    (keydown.enter)="onEnter($event)"
    inputStateClass
  />

  <input
    *ngIf="inputType === 'number'"
    type="number"
    [ariaLabel]="ariaLabel"
    [ngClass]="getCssClasses()"
    [class]="className"
    [id]="id"
    [(ngModel)]="value"
    [name]="name"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [readonly]="readOnly"
    [attr.min]="minNumber"
    [attr.max]="maxNumber"
    (input)="onInputChange($event)"
    (blur)="onBlur($event)"
    (keydown.enter)="onEnter($event)"
    inputStateClass
  />

  <input
    *ngIf="inputType === 'email'"
    type="email"
    [ariaLabel]="ariaLabel"
    [ngClass]="getCssClasses()"
    [class]="className"
    [id]="id"
    [(ngModel)]="value"
    [name]="name"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [readonly]="readOnly"
    (input)="onInputChange($event)"
    (blur)="onBlur($event)"
    (keydown.enter)="onEnter($event)"
    [inputStateClass]="'email'"
  />

  <input
    *ngIf="inputType === 'password'"
    type="password"
    [ariaLabel]="ariaLabel"
    [ngClass]="getCssClasses()"
    [class]="className"
    [id]="id"
    [(ngModel)]="value"
    [name]="name"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [readonly]="readOnly"
    (input)="onInputChange($event)"
    (blur)="onBlur($event)"
    (keydown.enter)="onEnter($event)"
    inputStateClass
  />

  <textarea
    #textarea
    (input)="adjustTextareaHeight(); onInputChange($event)"
    *ngIf="inputType === 'textarea'"
    [ariaLabel]="ariaLabel"
    [ngClass]="getCssClasses()"
    [class]="className"
    [id]="id"
    [(ngModel)]="value"
    [name]="name"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [readonly]="readOnly"
    [attr.minlength]="minLengthField"
    [attr.maxlength]="maxLengthField"
    [rows]="rows"
    [cols]="cols"
    inputStateClass
  ></textarea>

  <input
    #inputMask
    *ngIf="mask"
    type="text"
    [ariaLabel]="ariaLabel"
    [ngClass]="getCssClasses()"
    [class]="className"
    [id]="id"
    [(ngModel)]="value"
    [name]="name"
    [placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [readonly]="readOnly"
    (input)="onInputChange($event)"
    (blur)="onBlur($event)"
    (keydown.enter)="onEnter($event)"
    [mask]="mask.mask"
    [thousandSeparator]="mask.thousandSeparator"
    [prefix]="mask.prefix ?? ''"
    [suffix]="mask.suffix ?? ''"
    [showMaskTyped]="mask.showMaskTyped"
    [allowNegativeNumbers]="mask.allowNegativeNumbers"
    [dropSpecialCharacters]="mask.dropSpecialCharacters"
    [shownMaskExpression]="mask.shownMaskExpression"
    inputStateClass
  />

  <crem-input-hint
    *ngIf="showHint"
    [type]="state"
    [text]="hintText"
  ></crem-input-hint>
</div>
