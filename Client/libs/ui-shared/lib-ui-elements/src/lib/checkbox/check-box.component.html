<div class="checkbox-wrapper">
  <div>
    <dx-check-box
      [(value)]="value"
      (onValueChanged)="onValueChanged($event)"
      (onInitialized)="initialized.emit(checkBox)"
      [elementAttr]="elementAttr"
      [disabled]="disabled"
    >
    </dx-check-box>
  </div>
  <label
    class="checkbox-label"
    [class.disabled]="disabled"
    (click)="onEnterKey()"
    ><ng-content></ng-content
  ></label>
</div>
