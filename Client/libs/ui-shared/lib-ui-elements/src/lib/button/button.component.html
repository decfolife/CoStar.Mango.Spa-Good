<button
  type="button"
  [attr.id]="id"
  [ngClass]="getCssClasses()"
  [class]="className"
  [style]="styles"
  [attr.aria-label]="ariaLabel"
  [attr.disabled]="disabled ? true : null"
  (click)="handleClick()"
  [attr.aria-haspopup]="ariaHasPopUp"
  [attr.aria-expanded]="ariaExpanded"
>
  <ng-container *ngIf="icon">
    <crem-icon
      class="icon"
      [icon]="icon"
      [library]="iconLibrary"
      [pack]="iconPack"
      [color]="iconColor"
      [rotate]="iconRotate"
      [flip]="iconFlip"
      [animation]="iconAnimation"
      [size]="iconSize"
      [pull]="iconPull"
      [fill]="iconFill"
      [transform]="iconTransform"
    ></crem-icon>
  </ng-container>

  <span class="content">
    <ng-container #textProp>
      <ng-content class="text"></ng-content>
    </ng-container>
    <ng-container
      *ngIf="
        textProp.childElementCount === undefined ||
        textProp.childElementCount === 0
      "
    >
      {{ text }}
    </ng-container>
  </span>

  <span class="tag"></span>
</button>
