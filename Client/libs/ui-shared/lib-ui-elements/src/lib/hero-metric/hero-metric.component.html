<mat-card [id]="metric.id" class="costar-hero-metric-card">
  <mat-card-header >
    <mat-card-title tabindex="0">{{ metric.title }}</mat-card-title>
    <div class="addl-info-wrapper">
      <crem-tooltip
        [externalId]="metric.id"
        [helpTextData]="metric.tooltipData"
      ></crem-tooltip>
    </div>
  </mat-card-header>
  <mat-card-content>
    <div  tabindex="0" class="hero-value">
      {{ metric.heroMetric }}
    </div>
    <div tabindex="0" class="sidekick-value-wrapper" *ngIf="metric.sidekick">
      <div class="sidekick-value" [ngClass]="valColor">
        <div [ngSwitch]="valDirection">
          <div *ngSwitchCase="'arrows-brand-up'" class="arrows-brand-up">
            <crem-icon
              icon="faArrowUp">
            </crem-icon>
          </div>

          <div *ngSwitchCase="'arrows-brand-down'" class="arrows-brand-down">
            <crem-icon
              icon="faArrowDown">
            </crem-icon>
          </div>
          
        </div>
        {{ metric.sidekick.metricValue }}
      </div>
    </div>
  </mat-card-content>
  <mat-card-footer  tabindex="0">
    <mat-card-subtitle>
      {{ metric.subtitle }}
    </mat-card-subtitle>
  </mat-card-footer>
</mat-card>
