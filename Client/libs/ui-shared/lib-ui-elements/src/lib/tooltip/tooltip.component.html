<div [id]="tooltipId" class="dx-field">
  <div class="iconWrapper dx-field-value-static">
    <div [attr.id]="'t' + tooltipId + 'Trigger'" [id]="tooltipId + 'Trigger'">
      <crem-icon
        transform="scale(.8)"
        fill="#808080"
        icon="brand-info-border"
        library="local"
        tabindex="0"
        (click)="getHelpText()"
        (keydown.enter)="getHelpText()"
        (keydown.space)="getHelpText(); $event.preventDefault()"
        role="button"
        [attr.aria-label]="tooltipId + ' More information'"
      ></crem-icon>
    </div>
    <dx-popover
      [target]="'#' + 't' +  tooltipId + 'Trigger'"
      position="top"
      [width]="400"
      [(visible)]="withAnimationOptionsVisible"
      role="dialog"
      (onShown)="onShownHandler()"
    >
      <dxo-animation>
        <dxo-show
          type="pop"
          [from]="{ scale: 0 }"
          [to]="{ scale: 1 }"
        ></dxo-show>
        <dxo-hide type="fade" [from]="1" [to]="0"></dxo-hide>
      </dxo-animation>
      <div id="popoverWrapper">
        <div #helpText id="helpText" tabindex="0" *ngIf="helpTextData && !helpTextDataIsHtml" >{{ helpTextData }}</div>
        <div #helpText id="helpText" tabindex="0" *ngIf="helpTextData&& helpTextDataIsHtml" [innerHTML]="helpTextData"></div>
        <div #helpText id="helpText" tabindex="0" *ngIf="helpTextData === null || helpTextData === undefined">
          <p>No help text available.</p>
        </div>
      </div>
    </dx-popover>
  </div>
</div>
