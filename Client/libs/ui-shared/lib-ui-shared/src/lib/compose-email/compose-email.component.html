<crem-modal
  [modalTitle] = "modalTitle"
  closeIconVisible = "true"
  primaryFooterButtonText="Send"
  closeOrCancelButtonText="Cancel"
  (primaryButtonAction)="sendEmail()"
  [customFooter]="true"
  [modalId] = "modalId"
>
<div modalContent id="composeEmailModal-content">
  <div class="cem-noteType" [ngClass]="noteTypeValueInvalid ? 'fieldInvalid' : ''">
    <h4 class="cem-noteType-label label">* Note Type</h4>
    <crem-dropdown
      id="emailNoteTypeId"
      dropDownContainerCustomClass="emailNoteType"
      [dataSource]="noteTypes"
      placeholder="Note Type"
      [showClearButton]='false'
      displayExpr='commonNoteType'
      valueExpr='commonNoteTypeID'
      [initialSelectedValue]="selectedNoteType.commonNoteTypeID"
      (selectedItems)="noteTypeSelected($event)"
      [required]= "'true'"             
      [showDefaultValidationTooltip]="true"
    >
    </crem-dropdown>
     <!--  do we need these two lines [required] and  [showDefaultValidationTooltip]-->
  </div>
  <div class="cem-to-members" [ngClass]="toMembersValueInvalid ? 'fieldInvalid' : ''">
    <h4 class="cem-toMembers-label label">* To</h4>
    <div id="cem-toMembers-container">
      <crem-dropdown
        id='cem-toMembersId'
        dropDownContainerCustomClass="cem-toMembers-custClass"
        [showColumnHeader]='true'
        placeholder="Select Members"
        displayExpr='contactName'
        valueExpr="contactEmailAddress"
        showCheckBoxesMode='always'
        showClearButton='true'
        allowSearch='true'
        selectMode='multiple'
        [dataSource]="contacts"
        useArrayOfKeys='true'
        getWholeObject='true'
        (selectedItems)="selectedMembers($event)"
      ></crem-dropdown>
    </div>
  </div>
  <div class="cem-body">
    <h4 class="cem-body-label">Body</h4>
      <dx-text-area
        [(value)]="emailMessage"
        [minHeight]="100"
        [maxHeight]="200"
        [autoResizeEnabled]="true"
        [inputAttr]="{ 'aria-label': 'Email Message Body' }"
      >
      </dx-text-area>
  </div>
  <div class="cem-include">
    <h4 class="cem-include-label">Include</h4>
    <div class="cem-include-options">             
      <span class="cem-include-options-filePaths">
        <dx-check-box
          class="cem-filePaths-checkbox"
          aria-label="Include File Paths"
          text="File Paths"
          [(value)]="filePathsChecked"
          [elementAttr]="{ 'class': 'filePathsCheckbox' }"
        ></dx-check-box>
      </span>
      <span class="cem-include-options-unapprovedTasks">
        <dx-check-box
          class="cem-unapprovedTasks-checkbox"
          aria-label="Include Unapproved Tasks"
          text="Unapproved Tasks"
          [(value)]="unapprovedTasksChecked"
          [elementAttr]="{ 'class': 'unapprovedTasksCheckbox' }"
        ></dx-check-box>
      </span>
    </div>
  </div>
  <div class="cem-filesGrid-container">
    <dx-data-grid class="cem-fiesGrid"
      #CEMFilesGrid
      [dataSource]="fileItems"
      [showColumnLines]="false"
      [hoverStateEnabled]="true"
      [rowAlternationEnabled]="true"
      [allowColumnResizing]="false"
      keyExpr="value"
      [width]="'100%'"
    >	

      <dxo-selection
        class="cem-fileSelections1"
        elementAttr="{class: 'cem-fileSelections2'}"
        cssClass="cem-fileSelections3"
        selectAllMode="allPages"
        showCheckBoxesMode="always"
        mode="multiple">
      </dxo-selection>

      <dxi-column dataField="text" caption="File Name" [cellTemplate]="'fileNameTemplate'"> </dxi-column>
      <dxi-column dataField="uploadedOn" [cellTemplate]="'uploadedOnTemplate'"> </dxi-column>
      <div *dxTemplate="let fileItem of 'fileNameTemplate'">
        <div class="cem-filesGrid-fileName">
          <crem-icon class="fa-lg fa-regular" icon="{{fileItem.data.icon}}" pack="regular"></crem-icon>
          {{fileItem.data.text}}
        </div>
      </div>
      <div *dxTemplate="let fileItem of 'uploadedOnTemplate'">
          <div class="cem-filesGrid-fileName" >{{fileItem.data.uploadedOn}}</div>
          <div class="cem-filesGrid-uploadedBy">{{fileItem.data.createdBy}}</div>
      </div>
    </dx-data-grid>
  </div>
</div>
<div modalFooter class="cem-footerContent">
  <div id="buttonTemplate" class="cem-footerleftControls" *ngIf="unapprovedTasksChecked">{{emailNote}}</div>
  <div id="buttonTemplate" class="cem-footerRightControls">
    <crem-button  type="secondary" class="cem-footer-cancelBtn cem-btn" id="close-btn" (click)="closeModal()"> Cancel </crem-button>
		<crem-button  type="primary" class="cem-footer-sendBtn cem-btn" (click)="sendEmail()"> Send </crem-button>
  </div>
</div>
</crem-modal>
