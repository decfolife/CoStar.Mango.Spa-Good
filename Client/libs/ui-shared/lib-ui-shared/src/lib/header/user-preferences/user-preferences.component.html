<crem-modal
  className="newModal"
  modalTitle="User Preferences"
  modalTitleId="userPreferences"
  modalId="userPreferences"
  closeIconVisible="true"
  closeOrCancelButtonText="No"
  [customFooter]="true"
>
  <div modalContent class="body-content">
    <form
      [hidden]="disablePasswordChange"
      crem-form
      id="updatePasswordForm"
      [formGroup]="updatePasswordForm"
    >
      <div class="section-header">
        <span class="section-title">Change Password</span>
        <hr />
      </div>
      <div class="section">
        <div class="col1">
          <crem-form-item>
            <crem-form-control>
              <crem-input
                id="userPreferencesCurrentPassword"
                label="Current Password"
                showLabel="true"
                inputType="text"
                placeholder="Enter current password"
                formControlName="currentPassword"
              ></crem-input>
            </crem-form-control>
          </crem-form-item>
        </div>
      </div>
      <div class="section">
        <div class="col1">
          <crem-form-item>
            <crem-form-control>
              <crem-input
                id="userPreferencesNewPassword"
                label="New Password"
                showLabel="true"
                inputType="text"
                placeholder="Enter new password"
                formControlName="password"
              ></crem-input>
            </crem-form-control>
          </crem-form-item>
        </div>
        <div class="col2">
          <crem-form-item>
            <crem-form-control>
              <crem-input
                id="userPreferencesConfirmPassword"
                label="Confirm Password"
                showLabel="true"
                inputType="text"
                placeholder="Confirm Password"
                formControlName="confirmPassword"
              ></crem-input>
            </crem-form-control>
          </crem-form-item>
        </div>
      </div>
    </form>
    <form crem-form id="userPreferencesForm" [formGroup]="userPreferencesForm">
      <div class="section-header">
        <span class="section-title">Preferences</span>
        <hr />
      </div>
      <div class="section">
        <div class="col1">
          <div class="dropdown-section">
            <crem-form-item>
              <span>Date Style </span><span class="required">*</span>
              <crem-form-control formControlName="dateStyle">
                <crem-dropdown
                  id="userPreferencesDateStyle"
                  [dataSource]="dateTypes"
                  [initialSelectedValue]="
                    userPreferences.contactDatesEU ? 1 : 0
                  "
                  displayExpr="display"
                  valueExpr="value"
                  (selectedItems)="dateStyleChanged($event)"
                ></crem-dropdown>
              </crem-form-control>
            </crem-form-item>
          </div>
        </div>
        <div class="col2">
          <div class="dropdown-section">
            <crem-form-item>
              <span>Measurement </span><span class="required">*</span>
              <crem-form-control>
                <crem-dropdown
                  id="userPreferencesDefaultMeasurement"
                  [dataSource]="measurements"
                  [initialSelectedValue]="userPreferences.contactMeasurements"
                  displayExpr="measureUnitType"
                  valueExpr="measureUnitsID"
                  formControlName="measurement"
                ></crem-dropdown>
              </crem-form-control>
            </crem-form-item>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="col1">
          <div class="dropdown-section">
            <crem-form-item>
              <span>Currency </span><span class="required">*</span>
              <crem-form-control>
                <crem-dropdown
                  id="userPreferencesDefaultCurrency"
                  [dataSource]="currencyMappings"
                  [initialSelectedValue]="userPreferences.contactCurrency"
                  displayExpr="currencyName"
                  valueExpr="currencyID"
                  formControlName="currency"
                ></crem-dropdown>
              </crem-form-control>
            </crem-form-item>
          </div>
        </div>
        <div class="col2">
          <div class="dropdown-section">
            <crem-form-item>
              <span>Start Page </span><span class="required">*</span>
              <crem-form-control>
                <crem-dropdown
                  id="userPreferencesDefaultStartPage"
                  [dataSource]="possibleStartPages"
                  [initialSelectedValue]="initialStartPageValue"
                  displayExpr="pageName"
                  valueExpr="pagePath"
                  formControlName="startPage"
                ></crem-dropdown>
              </crem-form-control>
            </crem-form-item>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="col1">
          <div class="toggle-section">
            <crem-form-item>
              <p>Consolidate Project Emails</p>
              <crem-form-control>
                <crem-toggle-slider
                  id="userPreferencesConsolidateEmails"
                  [value]="userPreferences.contactConsolidatedEmails"
                  checkedLabel="YES"
                  uncheckedLabel="NO"
                  size="wide"
                  formControlName="consolidateProjectEmails"
                  ariaLabel="Consolidate Project Emails"
                ></crem-toggle-slider>
              </crem-form-control>
            </crem-form-item>
          </div>
        </div>
        <div class="col2">
          <div class="text-section">
            <p>Email Subscriptions</p>
            <span>Click here to manage </span
            ><a
              id="userPreferencesEmailSubscriptions"
              href="https://lp.costarmanager.com/contact-signup"
              >Email Subscriptions</a
            ><crem-icon icon="faArrowUpRightFromSquare"></crem-icon>
          </div>
        </div>
      </div>
    </form>
  </div>

  <div modalFooter class="footer-content">
    <div id="ButtonTemplate" class="footerRightControls">
      <crem-button
        type="secondary"
        id="userPreferencesCancel"
        (click)="closeModal()"
      >
        Cancel
      </crem-button>
      <crem-button
        type="primary"
        id="userPreferencesSave"
        (click)="savePreferences()"
      >
        Save
      </crem-button>
    </div>
  </div>
</crem-modal>
