<crem-modal
  #equipmentModal
  modalId="add_equipment_modal"
  modalTitleId="add_equipment_modal_modalTitleId"
  modalTitle="Add Equipment Lease"
  closeIconVisible="true"
  [customFooter]="true"
  [closeDialogResult]="savedALease"
>
  <div modalContent class="body-content">
    <form
      crem-form
      layout="vertical"
      [formGroup]="equipmentForm"
      class="add-equipment-form"
    >
      <crem-form-item
        [id]="getId(componentName, 'portfolio', 'form-item')"
        *ngIf="!hasPassedSupplier"
      >
        <crem-form-label
          [id]="getId(componentName, 'portfolio', 'label')"
          [required]="!hasPassedSupplier"
          >Portfolio
        </crem-form-label>

        <crem-form-control>
          <crem-dropdown
            #portfolioDropdown
            [id]="getId(componentName, 'portfolio', 'dropdown')"
            [dataSource]="portfolioDropdownItem"
            [showClearButton]="true"
            required="!hasPassedSupplier"
            [customRequireValidation]="false"
            [showColumnHeader]="false"
            displayExpr="companyName"
            valueExpr="companyID"
            [allowSearch]="true"
            hoverText="Select Portfolio"
            (selectedItems)="onPortfolioValueChange($event)"
            formControlName="portfolioList"
            [initialSelectedValue]="initialSelectedPortfolio"
            [containerized]="false"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item [id]="getId(componentName, 'supplier', 'form-item')">
        <crem-form-label
          [id]="getId(componentName, 'supplier', 'label')"
          [required]="true"
          >Supplier
        </crem-form-label>
        <crem-form-control>
          <crem-dropdown
            #supplierDropdown
            [id]="getId(componentName, 'supplier', 'dropdown')"
            [dataSource]="supplierDropdownItem"
            [showClearButton]="true"
            required="true"
            [customRequireValidation]="false"
            [showColumnHeader]="false"
            displayExpr="objectName"
            valueExpr="objectID"
            [allowSearch]="true"
            hoverText="Select Supplier"
            formControlName="supplierList"
            [containerized]="false"
            [autoSelect]="true"
            [useSelectBox]="hasPassedSupplier"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item [id]="getId(componentName, 'legalentity', 'form-item')">
        <crem-form-label
          [id]="getId(componentName, 'legalentity', 'label')"
          [required]="true"
          >Legal Entity
        </crem-form-label>
        <crem-form-control>
          <crem-input
            [id]="getId(componentName, 'legalentity', 'textbox')"
            [showHint]="false"
            [showLabel]="false"
            [showInfo]="false"
            [inputType]="'text'"
            [required]="true"
            [value]="''"
            [name]="''"
            [placeholder]="'Enter legal entity name'"
            formControlName="legalEntityName"
          >
          </crem-input>
        </crem-form-control>
      </crem-form-item>

      <crem-form-item [id]="getId(componentName, 'template', 'form-item')">
        <crem-form-label
          [id]="getId(componentName, 'template', 'label')"
          [required]="true"
          >Template
        </crem-form-label>
        <crem-form-control>
          <crem-dropdown
            #templateDropdown
            [id]="getId(componentName, 'template', 'dropdown')"
            [dataSource]="templateDropdownItem"
            [showClearButton]="true"
            [showColumnHeader]="false"
            displayExpr="objectTypeTypeName"
            value="objectTypeTypeID"
            valueExpr="objectTypeTypeID"
            [required]="true"
            [allowSearch]="true"
            hoverText="Select Template"
            [initialSelectedValue]="selectedTemplateID"
            formControlName="templateList"
            [containerized]="false"
            [autoSelect]="true"
            [useSelectBox]="hasPassedSupplier"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>

      <div class="layout-container">
        <crem-form-item [id]="getId(componentName, 'beginDate', 'form-item')">
          <crem-form-label
            [id]="getId(componentName, 'beginDate', 'label')"
            [required]="true"
            >Begin Date
          </crem-form-label>
          <crem-form-control>
            <crem-date-picker
              #beginDatePicker
              tabindex="0"
              [dateFormat]="dateFormat"
              [showClearButton]="'true'"
              [inputId]="'beginDate'"
              [isRequired]="'true'"
              [placeholderText]="'Select Date...'"
              [showDefaultValidationTooltip]="false"
              formControlName="beginDate"
            >
            </crem-date-picker>
          </crem-form-control>
        </crem-form-item>

        <crem-form-item [id]="getId(componentName, 'endDate', 'form-item')">
          <crem-form-label
            [id]="getId(componentName, 'endDate', 'label')"
            [required]="true"
            >End Date
          </crem-form-label>
          <crem-form-control>
            <crem-date-picker
              #endDatePicker
              tabindex="0"
              [dateFormat]="dateFormat"
              [showClearButton]="'true'"
              [inputId]="'endDate'"
              [isRequired]="'true'"
              [placeholderText]="'Select Date...'"
              [showDefaultValidationTooltip]="false"
              formControlName="endDate"
            >
            </crem-date-picker>
          </crem-form-control>
        </crem-form-item>
      </div>

      <crem-form-item [id]="getId(componentName, 'currencytype', 'form-item')">
        <crem-form-label
          [id]="getId(componentName, 'currencytype', 'label')"
          [required]="true"
          >Currency Type
        </crem-form-label>
        <crem-form-control>
          <crem-dropdown
            #currencyDropdown
            [id]="getId(componentName, 'currency-type', 'dropdown')"
            [dataSource]="currencyDropdownItem"
            [showClearButton]="true"
            [showColumnHeader]="false"
            displayExpr="targetCurrencyDesc"
            valueExpr="exchangeRateID"
            [required]="true"
            [allowSearch]="true"
            [initialSelectedValue]="defaultCurrency"
            hoverText="Select Currency Type"
            formControlName="currencyTypeList"
            [containerized]="false"
          >
          </crem-dropdown>
        </crem-form-control>
      </crem-form-item>
    </form>
  </div>

  <div modalFooter class="addEquipmentFooter">
    <crem-button
      [id]="getId(componentName, 'cancel', 'button')"
      type="secondary"
      (click)="close()"
      >Cancel
    </crem-button>

    <crem-button
      [id]="getId(componentName, 'save', 'button')"
      type="secondary"
      (click)="save()"
      [disabled]="disableButton"
      [icon]="saveClicked ? 'faSpinner' : ''"
      [iconPack]="saveClicked ? 'solid' : ''"
      [iconAnimation]="saveClicked ? 'spin' : ''"
    >
      <span>
        {{ saveClicked ? 'Saving' : 'Save' }}
      </span>
    </crem-button>

    <crem-button
      [id]="getId(componentName, 'save-and-new', 'button')"
      type="secondary"
      (click)="saveAndNew()"
      [disabled]="disableButton"
      [icon]="saveNewClicked ? 'faSpinner' : ''"
      [iconPack]="saveNewClicked ? 'solid' : ''"
      [iconAnimation]="saveNewClicked ? 'spin' : ''"
    >
      <span>
        {{ saveNewClicked ? 'Saving' : 'Save & New' }}
      </span>
    </crem-button>

    <crem-button
      [id]="getId(componentName, 'launch', 'button')"
      type="primary"
      (click)="launchEquipmentLeaseRenderForm()"
      [disabled]="disableButton"
      [icon]="saveLaunchClicked ? 'faSpinner' : ''"
      [iconPack]="saveLaunchClicked ? 'solid' : ''"
      [iconAnimation]="saveLaunchClicked ? 'spin' : ''"
    >
      <span>
        {{ saveLaunchClicked ? 'Saving' : 'Launch' }}
      </span>
    </crem-button>
  </div>
</crem-modal>
