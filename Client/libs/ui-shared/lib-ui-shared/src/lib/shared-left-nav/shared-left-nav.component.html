<mat-sidenav-container
  *ngIf="navigationLinks.length > 0"
  #sideNavContainer
  class="sharedLeftNav-container"
  [ngClass]="{ sideNavExpand: expandNav, sideNavCollapse: !expandNav }"
>
  <mat-sidenav
    #sidenav
    opened="true"
    [disableClose]="true"
    class="shared-left-nav"
    [autoFocus]="false"
    (opened)="leftNavOpened(sideNavContainer)"
  >
    <div class="sr-only" role="status" aria-live="polite" aria-atomic="true">
      {{ flyOutKeyboardInstruction }}
    </div>

    <div
      class="sidenavTop scroll-container vertical"
      id="sidebar-nav"
      [attr.aria-labelledby]="'sidebar-control'"
      [ngClass]="{ hideLinks: !expandNav }"
    >
      <ul class="navList regularNavItems">
        <ng-container *ngFor="let linkObj of regularLeftNavItems">
          <ng-container *ngIf="linkObj.category == null">
            <li
              class="listItem"
              [class.parent-link-padding]="link.objectTypeName != null"
              *ngFor="let link of linkObj.children"
              [ngClass]="
                activeLink === link.name ? link.name + ' active' : link.name
              "
            >
              <a
                [id]="
                  'left-nav__' +
                  link?.moduleID +
                  '-' +
                  link?.dynamicName
                    ?.toLowerCase()
                    ?.replace(' ', '-')
                    .replace('.', '_')
                "
                [ngClass]="activeLink === link.name ? 'selected' : ''"
                (click)="onNavLinkClick(link)"
                (keyup.enter)="onNavLinkClick(link)"
                (keyup.space)="onNavLinkClick(link)"
                [tabindex]="0"
              >
                <span *ngIf="link.objectTypeName == null">{{
                  link.dynamicName
                }}</span>
                <span *ngIf="link.objectTypeName != null"
                  ><span class="bold-object-type-name">{{
                    link.objectTypeName.trim() + ': '
                  }}</span
                  >{{ link.dynamicName }}</span
                >
              </a>
            </li>
          </ng-container>

          <ng-container *ngIf="linkObj.category !== null">
            <li
              class="listItem"
              [ngClass]="
                activeLink === linkObj.category
                  ? linkObj.category + ' active'
                  : linkObj.category
              "
            >
              <ng-container
                *ngIf="!linkObj.categoryHasFlyOutMenu; else flyoutMenuTemplate"
              >
                <mat-expansion-panel
                  [expanded]="!(isSubleftnav$ | async)"
                  class="leftnavPanel"
                  [attr.aria-expanded]="expanded"
                  [attr.aria-label]="'Toggle section navigation'"
                >
                  <mat-expansion-panel-header>
                    <mat-panel-title>
                      {{ linkObj.category }}
                    </mat-panel-title>
                  </mat-expansion-panel-header>
                  <ul>
                    <li
                      class="listItem"
                      *ngFor="let link of linkObj.children"
                      [ngClass]="
                        activeLink === link.name
                          ? link.name + ' active'
                          : link.name
                      "
                    >
                      <a
                        [id]="
                          'left-nav__' +
                          link?.moduleID +
                          '-' +
                          link?.dynamicName
                            ?.toLowerCase()
                            ?.replace(' ', '-')
                            .replace('.', '_')
                        "
                        [ngClass]="activeLink === link.name ? 'selected' : ''"
                        (click)="onNavLinkClick(link)"
                        (keyup.enter)="onNavLinkClick(link)"
                        (keyup.space)="onNavLinkClick(link)"
                        [tabindex]="0"
                      >
                        <span>{{ link.dynamicName }}</span>
                      </a>
                    </li>
                  </ul>
                </mat-expansion-panel>
              </ng-container>
            </li>
          </ng-container>

          <ng-template #flyoutMenuTemplate>
            <div
              (mouseenter)="openFlyOutMenu(trigger, linkObj.category)"
              (mouseleave)="closeFlyOutMenu(trigger)"
            >
              <button
                [matMenuTriggerFor]="appMenu"
                #trigger="matMenuTrigger"
                (menuOpened)="onFlyOutMenuOpened(trigger, linkObj.category)"
                (menuClosed)="onFlyOutMenuClosed(linkObj.category)"
                [id]="
                  'left-nav__listItem__' +
                  linkObj?.categoryModuleID +
                  '-' +
                  linkObj?.category
                    ?.toLowerCase()
                    ?.replace(' ', '-')
                    .replace('.', '_')
                "
                class="flyout_anchor"
                [ngClass]="
                  linkObj.categoryLinkUrl === null
                    ? 'default-cursor-nav-link'
                    : ''
                "
                (click)="
                  $event.preventDefault();
                  onCategoryNavLinkClick($event, linkObj)
                "
                (keydown.space)="$event.preventDefault()"
                (keyup.space)="
                  openFlyOutMenu(trigger, linkObj.category, true);
                  flyOutMenuEntered = true
                "
                [tabindex]="0"
                [attr.aria-haspopup]="'menu'"
                [attr.aria-expanded]="trigger.menuOpen"
              >
                <div class="flyout_anchor_button_content_div">
                  <div
                    [ngClass]="
                      activeLink === linkObj.category ? 'selected' : ''
                    "
                  >
                    {{ linkObj.category }}
                  </div>

                  <mat-icon>keyboard_arrow_right</mat-icon>
                </div>
              </button>
            </div>
            <mat-menu
              class="expand-right"
              hasBackdrop="false"
              #appMenu="matMenu"
              xPosition="after"
            >
              <div
                class="flyout-scroll"
                (mouseenter)="flyOutMenuEntered = true"
                (mouseleave)="flyOutMenuLeave()"
              >
                <span *ngFor="let link of linkObj.children">
                  <li
                    class="listItem"
                    [ngClass]="link.isCurrentlyActiveLink ? 'childActive' : ''"
                  >
                    <a
                      mat-menu-item
                      [id]="
                        'left-nav__' +
                        link?.moduleID +
                        '-' +
                        link?.dynamicName
                          ?.toLowerCase()
                          ?.replace(' ', '-')
                          .replace('.', '_')
                      "
                      [ngClass]="
                        link.isCurrentlyActiveLink ? 'childSelected' : ''
                      "
                      (click)="onNavLinkClick(link)"
                      (keyup.enter)="onNavLinkClick(link)"
                      (keyup.space)="onNavLinkClick(link)"
                      (keydown)="keydownFlyout($event, link)"
                      class="flyout-navitem"
                      [tabindex]="0"
                    >
                      {{ link.dynamicName }}
                    </a>
                  </li>
                  <span *ngIf="hasSubChildLevelMenuItems(link)">
                    <ng-container
                      *ngTemplateOutlet="
                        subChildLevelMenuItemsTemplate;
                        context: { $implicit: link.subChildLevelNavLinks }
                      "
                    >
                    </ng-container>
                  </span>
                </span>
              </div>
            </mat-menu>
          </ng-template>

          <!-- This is the begining of the template that recursively goes down the nested subchildlinks and displays them.  The template is called in the flyout template above -->
          <ng-template #subChildLevelMenuItemsTemplate let-subChildLinks>
            <span *ngFor="let subChildLink of subChildLinks">
              <li
                class="listItem"
                [ngClass]="
                  subChildLink.isCurrentlyActiveLink ? 'subChildActive' : ''
                "
              >
                <a
                  mat-menu-item
                  [id]="
                    'left-nav__' +
                    subChildLink?.moduleID +
                    '-' +
                    subChildLink?.dynamicName
                      ?.toLowerCase()
                      ?.replace(' ', '-')
                      .replace('.', '_')
                  "
                  [ngClass]="[
                    subChildLink.isCurrentlyActiveLink
                      ? 'subChildSelected'
                      : '',
                    subChildLink.subChildLevel > 0
                      ? getParentLinkDynamicName(subChildLink)
                          ?.toLowerCase()
                          ?.replace(' ', '-')
                          .replace('.', '_') +
                        '_' +
                        'subChildLevel_link'
                      : ''
                  ]"
                  [ngStyle]="{
                    color: subChildLink.subChildLevel > 0 ? '#162f5a' : '#000',
                    'font-size':
                      subChildLink.subChildLevel > 0 ? '13px' : '14px',
                    'padding-left': (1 + subChildLink.subChildLevel) * 16 + 'px'
                  }"
                  (click)="onNavLinkClick(subChildLink)"
                  (keyup.enter)="onNavLinkClick(subChildLink)"
                  (keyup.space)="onNavLinkClick(subChildLink)"
                  (keydown)="keydownFlyout($event, subChildLink)"
                  class="flyout-navitem"
                  [tabindex]="0"
                  [innerHTML]="subChildLink.dynamicName"
                >
                </a>
              </li>
              <span *ngIf="hasSubChildLevelMenuItems(subChildLink)">
                <ng-container
                  *ngTemplateOutlet="
                    subChildLevelMenuItemsTemplate;
                    context: { $implicit: subChildLink.subChildLevelNavLinks }
                  "
                >
                </ng-container>
              </span>
            </span>
          </ng-template>
          <!-- This is the end of the sublinks template -->
        </ng-container>
      </ul>

      <ul class="navList commonNavItems">
        <ng-container *ngFor="let linkObj of commonLeftNavItems">
          <li
            class="listItem"
            *ngFor="let link of linkObj.children"
            [ngClass]="
              activeLink === link.name ? link.name + ' active' : link.name
            "
          >
            <a
              [id]="
                'left-nav__' +
                link?.moduleID +
                '-' +
                link?.dynamicName
                  ?.toLowerCase()
                  ?.replace(' ', '-')
                  .replace('.', '_')
              "
              [ngClass]="activeLink === link.name ? 'selected' : ''"
              (click)="onNavLinkClick(link)"
              (keyup.enter)="onNavLinkClick(link)"
              (keyup.space)="onNavLinkClick(link)"
              [tabindex]="0"
            >
              <span>{{ link.dynamicName }}</span>
            </a>
          </li>
        </ng-container>
      </ul>
    </div>

    <div class="sidenavBottom">
      <div
        id="sidebar-control"
        class="navCollExp"
        (click)="sidenavtoggle()"
        (keyup.enter)="sidenavtoggle()"
        (keyup.Space)="sidenavtoggle()"
        [attr.role]="'button'"
        [attr.aria-controls]="'sidebar-nav'"
        [attr.title]="expandNav ? 'Hide Sidebar' : 'Show Sidebar'"
        [attr.aria-expanded]="expandNav"
        tabindex="0"
      >
        <mat-icon
          class="arrowLeft"
          id="navArrowLeft"
          *ngIf="expandNav"
          aria-label="Hide Sidebar"
          >keyboard_double_arrow_left</mat-icon
        >
        <mat-icon
          class="arrowRight"
          id="navArrowRight"
          *ngIf="!expandNav"
          aria-label="Show Sidebar"
          >keyboard_double_arrow_right</mat-icon
        >
      </div>
    </div>
  </mat-sidenav>
</mat-sidenav-container>
