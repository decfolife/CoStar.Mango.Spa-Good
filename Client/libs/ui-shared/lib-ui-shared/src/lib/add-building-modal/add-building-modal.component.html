<dx-load-panel shadingColor="rgba(255,255,255)" [visible]="loading" *ngIf="loading" [showIndicator]="true"
	[showPane]="true" [shading]="true" [closeOnOutsideClick]="false"></dx-load-panel>

<crem-modal modalId="add_building_modal__add_modal" modalTitleId="add_building_modal__create_center"
	[modalTitle]="modalTitle" closeIconVisible="true" [customFooter]="true">
	<div modalContent class="body-content">

		<div class="section">

			<dx-form #addBuildingForm id="form" validationGroup="centerForm" labelLocation="top">

				<dxi-item itemType="group" cssClass="centerForm" [colCount]="1">

					<dxi-item itemType="group">

						<dxi-item dataField="buildingName" id="centerNameId">
							<dxo-label [text]="dynName +' Name'"></dxo-label>
							<dxi-validation-rule type="required" message="You must enter a {{dynName}} Name.">
							</dxi-validation-rule>
						</dxi-item>

						<dxi-item dataField="portfolio" editorType="dxSelectBox"
							[editorOptions]="{ items: portfolioDropdownItem, valueExpr: 'CompanyID', displayExpr: 'CompanyName',  onValueChanged:onPortFolioValueChanged}"
							id="centerPortfolioID">
							<dxi-validation-rule type="required"
								message="You must select a Portfolio"></dxi-validation-rule>
						</dxi-item>

						<dxi-item dataField="template" editorType="dxSelectBox" id="centerTemplateId"
							[editorOptions]="{ dataSource: templateDropdownItem, valueExpr: 'ObjectTypeTypeID', displayExpr: 'ObjectTypeTypeName' }">
							<dxi-validation-rule type="required"
								message="You must select a Template"></dxi-validation-rule>
						</dxi-item>

						<dxi-item [visible]="enableHierachyDropDown" dataField="hierarchy" editorType="dxSelectBox"
							id="centerHierarchyId"
							[editorOptions]="{ dataSource: hierarchyDropdownItem, valueExpr: 'CompanyID', displayExpr: 'CompanyName' }">
						</dxi-item>

						<dxi-item dataField="buildingCountry" editorType="dxSelectBox" id="centerCountryId"
							[editorOptions]="{ dataSource: countryDropdownItem, valueExpr: 'Country', displayExpr: 'Country', onValueChanged:onCountryChanged }">
							<dxo-label text="Country"></dxo-label>
						</dxi-item>

						<dxi-item dataField="buildingAddress" id="centerAddressId">
							<dxo-label text="Address"></dxo-label>
						</dxi-item>

						<dxi-item itemType="group" cssClass="addressSubFields" [colCount]="3">
							<dxi-item dataField="buildingCity" id="centerCityId">
								<dxo-label text="City"></dxo-label>
							</dxi-item>

							<dxi-item [visible]="!enableStateTextBox" dataField="buildingState" editorType="dxSelectBox"
								[editorOptions]="{ dataSource: stateDropdownItem, valueExpr: 'State', displayExpr: 'State' }"
								id="centerStateId">
								<dxo-label text="State/Province"></dxo-label>
							</dxi-item>

							<dxi-item [visible]="enableStateTextBox" dataField="State" id="centerStateId">
								<dxo-label text="State/Province"></dxo-label>
							</dxi-item>

							<dxi-item dataField="buildingZipCode" id="ceneterZipId">
								<dxo-label text="Zip Code"></dxo-label>
							</dxi-item>
						</dxi-item>

						<dxi-item dataField="Sub Group" editorType="dxSelectBox" id="centerSubGroupId"
							[editorOptions]="{ dataSource: subGroupDropdownItem, valueExpr: 'CompanyID', displayExpr: 'CompanyName' }">
							<dxi-validation-rule *ngIf="enableSubGroupDropDown" type="required"
								message="You must select a Sub Group"></dxi-validation-rule>
						</dxi-item>

					</dxi-item>

				</dxi-item>

			</dx-form>

		</div>

	</div>

	<div modalFooter class="addBuildingFooter">

		<crem-button type="secondary" id="add_building_modal__cancel_btn" (click)="close()">
			Cancel</crem-button>

		<crem-button type="secondary" id="add_building_modal__save_btn" (click)="save($event)">
			Save</crem-button>

		<crem-button type="secondary" id="add_building_modal__savenew_btn" (click)="saveAndNew($event)">
			Save and New</crem-button>

		<crem-button type="primary" id="add_building_modal__launch_btn" (click)="launch($event)">
			Launch
		</crem-button>

	</div>
</crem-modal>
