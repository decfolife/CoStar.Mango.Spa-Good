<crem-modal modalId="add_building_modal__add_modal" modalTitleId="add_building_modal__create_project"
	[modalTitle]="'Title'" closeIconVisible="true" [customFooter]="true">
	<div modalContent class="body-content">

		<!-- todo: add logic for loading pane -->
		<!-- 	<dx-load-panel shadingColor="rgba(255,255,255,0.2)" [visible]="loading" [showIndicator]="true"
			[showPane]="true" [shading]="true" [closeOnOutsideClick]="false"></dx-load-panel> -->
		<!--  -->

		<div id="ngifloading">
			<h4 id="ifTitle">
				Title
			</h4>
			<div class="section">
				<div class="section--border"></div>

				<!-- todo: build out ui -->
				<div id="modal">
					<dx-form id="form">
						<dxi-item itemType="group" cssClass="first-group" [colCount]="4">
							<dxi-item>
								<div class="form-avatar"></div>
							</dxi-item>

							<dxi-item itemType="group" [colSpan]="3">
								<dxi-item dataField="Portfolio" editorType="dxSelectBox"
									[editorOptions]="{ items: portfolios, value: '' }"></dxi-item>
								<dxi-item dataField="Center Name"></dxi-item>
							</dxi-item>
						</dxi-item>

						<dxi-item itemType="group" cssClass="second-group" [colCount]="3">
							<dxi-item itemType="group">
								<dxi-item dataField="Country" editorType="dxSelectBox"
									[editorOptions]="{ items: countries, value: '' }"></dxi-item>
								<dxi-item dataField="Street Address"></dxi-item>
								<dxi-item dataField="City"></dxi-item>
							</dxi-item>

							<dxi-item itemType="group">
								<dxi-item dataField="State" editorType="dxSelectBox"
									[editorOptions]="{ items: states }"></dxi-item>
								<dxi-item dataField="ZipCode"></dxi-item>
								<dxi-item dataField="Template" editorType="dxSelectBox"
									[editorOptions]="{ items:[ 'Center', 'Building'] }"></dxi-item>
							</dxi-item>

							<dxi-item itemType="group">
								<dxi-item dataField="Sub Group" editorType="dxSelectBox"
									[editorOptions]="{ items:[ 'Here there', 'be dragons'] }"></dxi-item>
								<dxi-item dataField="Hierarchy" editorType="dxSelectBox"
									[editorOptions]="{ items:[ 'Here there', 'be dragons'] }"></dxi-item>
							</dxi-item>
						</dxi-item>
					</dx-form>
				</div>


			</div>
		</div>
	</div>
	<!--  -->

	<div modalFooter class="footer-content">
		<div id="add_building_modal__modal_buttons" class="footerRightControls">
			<crem-button [disabled]="loading" type="secondary" id="add_building_modal__cancel_btn" (click)="close()">
				Cancel</crem-button>
			<crem-button [disabled]="loading" type="secondary" id="add_building_modal__save_btn">
				Save</crem-button>
			<crem-button [disabled]="loading" type="secondary" id="add_building_modal__save_and_new_btn">
				Save & New</crem-button>
			<crem-button [disabled]="loading" type="primary" id="add_building_modal__launch_btn"> Launch </crem-button>
		</div>
	</div>
</crem-modal>
