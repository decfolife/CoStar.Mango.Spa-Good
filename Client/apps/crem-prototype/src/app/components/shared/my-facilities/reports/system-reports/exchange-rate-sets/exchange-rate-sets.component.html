<div class="list-page">
	<div class="list-page-controls-wrapper">
		<div class="controls-left">
			<h5 class="dbl-right-margin">Rate Set</h5>	
            <costar-search (changed)="searchDataGrid($event)"></costar-search>
            <portfolio-menu (portfolioChanged)="onPortfolioChange($event)"></portfolio-menu>
            <dx-select-box [dataSource]="periods"
                displayExpr="Name"
                valueExpr="ID"
                [value]="selectedPeriod"
                (onValueChanged)="onPeriodChange($event)"
                [showClearButton]="true"
                [searchMode]="searchModeOption"
                [searchExpr]="searchExprOption"
                [searchTimeout]="searchTimeoutOption"
                [minSearchLength]="minSearchLengthOption"
                placeholder="Select a Period"
                [searchEnabled]="true">
            </dx-select-box>
            <button class="btn btn-default" (click)="apply()" [disabled]="!selectedPeriod || !selectedPortfolio">Apply</button> 
		</div>
		<div class="controls-right">
            <button class="btn btn-primary" (click)="exportGrids()" [disabled]="!(selectedPeriod && selectedPortfolio && isApplied)">Export</button> 
        </div>

	</div>
	<div class="list-page-data-grid-wrapper">
		<dx-data-grid *ngIf="selectedPeriod && selectedPortfolio && isApplied"
			class="list-page-data-grid"
			#DataGrid
			[dataSource]="data"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
			[filterSyncEnabled]="true"
			(onContentReady)="onContentReady($event)"
			[columnMinWidth]="10"	
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
			<dxo-sorting mode="multiple"></dxo-sorting>
			<dxo-column-fixing [enabled]="true"></dxo-column-fixing>
			<dxo-column-chooser [allowSearch]="true" mode="select">
			</dxo-column-chooser>
			<dxo-paging [pageSize]="100"></dxo-paging>
		    <dxo-pager 
		        [showPageSizeSelector]="true"
		        [allowedPageSizes]="[50, 100, 200, 500]"
		        [showInfo]="true"
				[showNavigationButtons]="true"
				[visible]="true"
			>
		    </dxo-pager>
			<dxi-column *ngFor="let col of columns" 
				[dataField]="col.dataField" 
				[alignment]="col.alignment"
                [visible]="col.visible"
				[dataType]="col.dataType"
				[caption]="col.caption"
				[fixed]="col.fixed"
				[allowEditing]="col.allowEditing"
				[cellTemplate]="col.cellTemplate"
				>
				<dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
			</dxi-column>
		</dx-data-grid>
	</div>
</div>
