<div class="dynamic-form">
	<div class="dynamic-form-controls-wrapper">
		<div class="controls-left">
			<h5 *ngIf="profile">Discount Rate Profile - {{profile.profileName}}</h5>
			<h5 *ngIf="!profile">New Discount Rate Profile</h5>
		</div>
		<div class="controls-right">
			<mat-slide-toggle [checked]="true">Active</mat-slide-toggle>
			<button class="btn btn-default">Delete</button>
			<button class="btn btn-primary-outline" (click)="close()">Close</button>
			<button class="btn btn-primary">Save</button>
		</div>
	</div>
	<div class="dynamic-form-content">	
		<div class="row">
			<div *ngFor="let section of formFields" [ngClass]="section.class">			
				<mat-card>
					<mat-card-header>
						<mat-card-title>{{section.sectionName}}</mat-card-title>
					</mat-card-header>
					<mat-card-content>						
						<dx-form 
							[(formData)]="profile"
							[colCount]="2"
							labelLocation="left"
							[showColonAfterLabel]="false">
							<dxi-item *ngFor="let field of section.fields" 
								[dataField]="field.value"	
								[label]="{ text : field.label }"
								[editorType]="field.controlType"
								[editorOptions]="{ items: field.dropdownValues, searchEnabled: true, disabled : field.readOnly }"
								[template]="field.dxTemplate"
								>				
							</dxi-item>	
							<div *dxTemplate="let data of 'textBoxTemplate'">
							    <dx-text-box [(value)]="profile[data.dataField]" [disabled]="data.editorOptions.disabled"></dx-text-box>
							    <form-field-tooltip [fieldId]="data.dataField"></form-field-tooltip>						    
							</div>
							<div *dxTemplate="let data of 'dateBoxTemplate'">
							    <dx-date-box [(value)]="profile[data.dataField]" [disabled]="data.editorOptions.disabled"></dx-date-box>
							    <form-field-tooltip [fieldId]="data.dataField"></form-field-tooltip>
							</div>
							<div *dxTemplate="let data of 'selectBoxTemplate'">
							    <dx-select-box [dataSource]="data.editorOptions.items" [(value)]="profile[data.dataField]" [searchEnabled]="data.editorOptions.searchEnabled" valueExpr="value" displayExpr="display" [disabled]="data.editorOptions.disabled"></dx-select-box>
							    <form-field-tooltip [fieldId]="data.dataField"></form-field-tooltip>
							</div>						
						</dx-form>
					</mat-card-content>
				</mat-card>	
			</div>	
		</div>			
	</div>
</div>
