<dx-popup
	#ManageTagsPopup
    [width]="600"
    [height]="470"
    [showTitle]="true"
    [title]="title"
    [dragEnabled]="true"
    [closeOnOutsideClick]="false"
    [(visible)]="isVisible"
    (onHidden)="close()">
    <div *dxTemplate="let data of 'content'" class="popup-no-padding">
    	<costar-popup>
            <popup-content>	
                <div class="manage-tags-wrapper">
                    <tag [enableRemove]="false" [newTag]="true" class="std-bottom-margin" (saved)="saveNewTag($event)"></tag>                 
                    <ng-container *ngFor="let t of tags">
                        <tag [tag]="t" [enableRemove]="true" class="std-bottom-margin" (removed)="removeTag($event)"></tag>
                    </ng-container>	                        
                </div>                
            </popup-content>
            <popup-footer>		
                <popup-footer-right>
                    <button class="btn btn-default" (click)="close()">Close</button> 
                    <button class="btn btn-primary" (click)="save()">Save</button> 
                </popup-footer-right>
            </popup-footer>
        </costar-popup>
    </div>
</dx-popup>
