<dx-popup
	#TaskPopup
    width="60%"
    height="80%"
    [showTitle]="true"
    [title]="title"
    [dragEnabled]="true"
    [closeOnOutsideClick]="false"
    [visible]="isVisible"
    (onHidden)="close($event)">
    <div *dxTemplate="let data of 'content'" class="popup-no-padding">
    	<task-dialog [task]="task" (closed)="close($event)" (saved)="taskSaved($event)" (transition)="transitionToTask($event)"></task-dialog>    
    </div>
</dx-popup>
