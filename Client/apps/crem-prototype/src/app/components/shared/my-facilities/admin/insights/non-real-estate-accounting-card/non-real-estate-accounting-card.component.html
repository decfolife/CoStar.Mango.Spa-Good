<mat-card class="dashboard-card insights-hero-dash-card">
	<mat-card-header>				
		<mat-card-title>
			<span>Non Real Estate Accounting</span>
		</mat-card-title>
		<mat-form-field appearance="outline" class="">
			<mat-select value="All">
				<mat-option value="All">All</mat-option>
				<mat-option value="ASC 842 Operating">ASC 842 Operating</mat-option>						
				<mat-option value="ASC 842 Finance">ASC 842 Finance</mat-option>						
				<mat-option value="IFRS 16">IFRS 16</mat-option>						
				<mat-option value="Operating Lessor">Operating Lessor</mat-option>						
			</mat-select>
		</mat-form-field>
	</mat-card-header>
	<mat-card-content class="dashboard-card-hero-wrapper">										
		<ng-container *ngFor="let hero of heros">
			<dashboard-hero-card *ngIf="hero.visible"
				[title]="hero.title"
				[heroMetric]="hero.hero"
				[sidekickMetricA]="hero.sidekick"					
				[subtitle]="hero.subtitle"
				[tooltip]="hero.helpText"
			></dashboard-hero-card>
		</ng-container>					
	</mat-card-content>
</mat-card>
