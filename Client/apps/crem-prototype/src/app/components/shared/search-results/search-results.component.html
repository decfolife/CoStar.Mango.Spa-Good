<dx-tab-panel
	#SearchResultsTabPanel	
	height="100%"					
	[selectedIndex]="0"
	[loop]="false"
	[animationEnabled]="true"
	[swipeEnabled]="true"
	class="search-results-tab-panel"
	>
	<dxi-item title="Center" class="oflow-y-auto">
		<dx-data-grid 
			class="list-page-data-grid"
			#DataGrid
			[dataSource]="buildings"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 
			(onRowClick)="navigateToBuilding($event)"
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
			[columnMinWidth]="10"
			[wordWrapEnabled]="true"	
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
			<dxo-sorting mode="multiple"></dxo-sorting>
			<dxo-paging [pageSize]="100"></dxo-paging>
		    <dxo-pager 
		        [showPageSizeSelector]="true"
		        [allowedPageSizes]="[50, 100, 200, 500]"
		        [showInfo]="true"
		        [showNavigationButtons]="true">
		    </dxo-pager>
			<dxi-column *ngFor="let col of buildingColumns" 
				[dataField]="col.dataField" 
				[alignment]="col.alignment"
				[visible]="col.visible"
				[dataType]="col.dataType"
				[caption]="col.caption"
				>
				<dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
			</dxi-column>			
		</dx-data-grid>
	</dxi-item>
	<dxi-item title="Lease" class="oflow-y-auto">
		<dx-data-grid 
			class="list-page-data-grid"
			#DataGrid
			[dataSource]="leases"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 
			(onRowClick)="navigateToLease($event)"
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
			[columnMinWidth]="10"
			[wordWrapEnabled]="true"	
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
			<dxo-sorting mode="multiple"></dxo-sorting>
			<dxo-paging [pageSize]="100"></dxo-paging>
		    <dxo-pager 
		        [showPageSizeSelector]="true"
		        [allowedPageSizes]="[50, 100, 200, 500]"
		        [showInfo]="true"
		        [showNavigationButtons]="true">
		    </dxo-pager>
			<dxi-column *ngFor="let col of leaseColumns" 
				[dataField]="col.dataField" 
				[alignment]="col.alignment"
				[visible]="col.visible"
				[dataType]="col.dataType"
				[caption]="col.caption"
				>
				<dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
			</dxi-column>			
		</dx-data-grid>
	</dxi-item>
	<dxi-item title="Project" class="oflow-y-auto">
		<dx-data-grid 
			class="list-page-data-grid"
			#DataGrid
			[dataSource]="projects"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 
			(onRowClick)="navigateToProject($event)"
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
			[columnMinWidth]="10"
			[wordWrapEnabled]="true"	
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
			<dxo-sorting mode="multiple"></dxo-sorting>
			<dxo-paging [pageSize]="100"></dxo-paging>
		    <dxo-pager 
		        [showPageSizeSelector]="true"
		        [allowedPageSizes]="[50, 100, 200, 500]"
		        [showInfo]="true"
		        [showNavigationButtons]="true">
		    </dxo-pager>
			<dxi-column *ngFor="let col of projectColumns" 
				[dataField]="col.dataField" 
				[alignment]="col.alignment"
				[visible]="col.visible"
				[dataType]="col.dataType"
				[caption]="col.caption"
				>
				<dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
			</dxi-column>			
		</dx-data-grid>
	</dxi-item>
	<dxi-item title="Contact" class="oflow-y-auto">
	</dxi-item>
	<dxi-item title="Company" class="oflow-y-auto">
	</dxi-item>
</dx-tab-panel>
