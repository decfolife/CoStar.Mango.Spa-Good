<mat-card class="dashboard-card project-dash-card closed-deal-card">
	<mat-card-header>				
		<mat-card-title>Closed Deals</mat-card-title>	
		<mat-card-subtitle>(Last 30 Days)</mat-card-subtitle>												
	</mat-card-header>
	<mat-card-content class="no-padding">						
		<dx-data-grid class="list-page-data-grid"
			#ClosedDeals
			id="ClosedDeals"
			[dataSource]="closedDeals"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 							
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
		>
			<dxo-scrolling mode="virtual"></dxo-scrolling>							
			<dxo-scrolling mode="virtual"></dxo-scrolling>	
			<dxi-column dataField="client"></dxi-column>									
			<dxi-column dataField="property"></dxi-column>
			<dxi-column dataField="propertyType"></dxi-column>
			<dxi-column dataField="market"></dxi-column>
			<dxi-column dataField="dealType"></dxi-column>
			<dxi-column dataField="rentableSf" caption="Rentable SF">
				<dxo-format type="fixedPoint" [precision]="0"></dxo-format>
			</dxi-column>
			<dxi-column dataField="netEffectiveRent" dataType="number" format="currency"></dxi-column>
			<dxi-column dataField="leaseValue" dataType="number" format="currency"></dxi-column>
			<dxi-column dataField="broker" alignment="center"></dxi-column>
			<dxi-column dataField="commission" dataType="number" format="currency"></dxi-column>
			<dxi-column dataField="completeDate" dataType="date" alignment="center"></dxi-column>			
			<dxo-summary>					
				<dxi-total-item
				    column="rentableSf"
				    summaryType="sum"
				    [customizeText]="customizeSumInteger">
				</dxi-total-item>
				<dxi-total-item
				    column="leaseValue"
				    summaryType="sum"
				    [customizeText]="customizeSumCurrency">
				</dxi-total-item>
				<dxi-total-item
				    column="commission"
				    summaryType="sum"
				    [customizeText]="customizeSumCurrency">
				</dxi-total-item>				
			</dxo-summary>									
		</dx-data-grid>						
	</mat-card-content>
</mat-card>
