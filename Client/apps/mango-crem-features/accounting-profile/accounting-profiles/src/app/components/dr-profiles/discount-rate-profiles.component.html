<div class="list-page" id="discount-rate-profiles-container">
    <div class="list-page-controls-wrapper">
        <div class="controls-left">
            <h5 class="dbl-right-margin" id="discount-rate-profiles-h5">Discount Rate Profiles</h5>
            <dx-text-box [(value)]="searchText" id="listPageSearch" class="searchbox" placeholder="Search..." [showClearButton]="true" valueChangeEvent="keyup" (onValueChanged)="searchDataGrid($event)"></dx-text-box>
            <app-portfolio-dropdown class="discount-rate" (masterGroupID)="populateDiscountRateProfiles($event)"></app-portfolio-dropdown>
        </div>

        <div class="controls-right">
            <crem-button id="filterBtn" type="primary" btnStyle="stroked" (click)="showFilterBuilder()">
                <div id="filterTxt">Filters</div>
                <div *ngIf="appliedFilterCount > 0 && !showClearFilters" class="badge primary costar std-left-margin" (mouseover)="toggleClearFilters()">
                    {{appliedFilterCount}}
                </div>
                <div *ngIf="appliedFilterCount > 0 && showClearFilters" class="badge primary costar std-left-margin underline" (mouseout)="toggleClearFilters()" (click)="clearGridFilters($event)">
                    Clear {{appliedFilterCount}} Filters
                </div>
            </crem-button>

            <crem-button id="moreBtn" type="primary" btnStyle="stroked" [matMenuTriggerFor]="listMenu" text="More" icon="faCaretDown" iconPosition="right">
            </crem-button>

            <mat-menu #listMenu="matMenu">
                <button id="columnChooserBtn" mat-menu-item (click)="showColumnChooser()">Column Chooser</button>
                <button id="exportBtn" mat-menu-item (click)="exportDataGrid()">Export</button>

                <mat-button-toggle-group mat-menu-item>
                    <mat-slide-toggle [(ngModel)]="showArchived" (click)="$event.stopPropagation()" (change)="toggleArchiveFilter($event)">Show Archived</mat-slide-toggle>
                </mat-button-toggle-group>
            </mat-menu>

            <crem-button type="primary" icon="faPlus" *ngIf="service.userRights === 2" (click)="addDiscountRateProfile($event)" text="Add" id="addBtn" iconPosition="right"></crem-button>
        </div>

    </div>

    <div id="discountRateGrid" class="list-page-data-grid-wrapper">
        <dx-data-grid
            class="list-page-data-grid"
            #DataGrid
            [dataSource]="profiles"
            keyExpr="policyId"
            [showColumnLines]="false"
            [showRowLines]="false"
            [showBorders]="false"
            [rowAlternationEnabled]="true"
            (onRowClick)="navigateToObject($event)"
            [allowColumnResizing]="true"
            [allowColumnReordering]="true"
            [filterSyncEnabled]="true"
            [columnAutoWidth]="true"
            (onContentReady)="calculateAppliedFilterCount($event)">

        <dxo-header-filter [visible]="true"></dxo-header-filter>
        <dxo-grouping #expand [autoExpandAll]="true" [contextMenuEnabled]="true"></dxo-grouping>
        <dxo-scrolling mode="standard"></dxo-scrolling>
        <dxo-sorting mode="multiple"></dxo-sorting>
        <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
        <dxo-filter-builder-popup
            [width]="600"
            [height]="600"
            [(visible)]="filterBuilderVisible">
        </dxo-filter-builder-popup>

        <dxo-filter-builder
            [customOperations]="customOperations"
        ></dxo-filter-builder>
        <dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[50, 100, 200, 500]" [showInfo]="true">
        </dxo-pager>
        <dxo-paging [pageSize]="50">
        </dxo-paging>
        <dxo-column-chooser mode="dragAndDrop" [allowSearch]="true">
        </dxo-column-chooser>
        <dxo-export [enabled]="false" fileName="CoStar_DiscountRateProfiles"></dxo-export>
        <dxi-column
            dataField="policyName"
            [visible]="true"
            caption="Name"
            fixed="true"
            allowEditing="false">
        </dxi-column>
        <dxi-column
            dataField="profileAlias"
            [visible]="true"
            caption="Alias">
        </dxi-column>
        <dxi-column
            dataField="currency"
            alignment="center"
            [visible]="true"
            caption="Currency">
        </dxi-column>
        <dxi-column
            dataField="country"
            [visible]="true"
            caption="Country">
        </dxi-column>
        <dxi-column
            dataField="termRangeMinMonths"
            alignment="right"
            [visible]="true"
            dataType="number"
            caption="Min Months"
            format="#,##0.##############">
        </dxi-column>
        <dxi-column
            dataField="termRangeMaxMonths"
            alignment="right"
            [visible]="true"
            dataType="number"
            caption="Max Months"
            format="#,##0.##############">
        </dxi-column>
        <dxi-column
            dataField="effectiveDate"
            alignment="center"
            [visible]="true"
            dataType="date"
            [format]="dateFormat"
            caption="Effective Date">
        </dxi-column>
        <dxi-column
            dataField="amount"
            alignment="right"
            [visible]="true"
            dataType="number"
            caption="Discount Rate">
        </dxi-column>
        <dxi-column
            dataField="annualRateType"
            alignment="center"
            [visible]="true"
            dataType="number"
            caption="Annual Rate Type">
                <dxo-lookup
                    [dataSource]="annualRateTypes"
                    valueExpr="Id"
                    displayExpr="Name">
                </dxo-lookup>
        </dxi-column>
        <dxi-column
            dataField="inUse"
            alignment="center"
            [visible]="true"
            [showEditorAlways]="false"
            falseText="No"
            trueText="Yes"
            caption="In Use">
        </dxi-column>
        <dxi-column
            dataField="inUseNbr"
            [visible]="true"
            dataType="number"
            caption="Accounting Schedules">
        </dxi-column>
        <dxi-column
            dataField="policyId"
            [visible]="false"
            caption="System Profile ID">
        </dxi-column>
        <dxi-column
            dataField="modifiedByName"
            [visible]="false"
            caption="Modified By">
        </dxi-column>
        <dxi-column
            dataField="companyName"
            [visible]="false"
            caption="Portfolio">
        </dxi-column>
        <dxi-column
            dataField="createdByName"
            [visible]="false"
            caption="Created By">
        </dxi-column>
        <dxi-column
            dataField="lastModifiedDate"
            [visible]="false"
            dataType="date"
            caption="Modified Date"
            [format]="dateTimeFormat">
        </dxi-column>
        <dxi-column
            dataField="createdByDate"
            [visible]="false"
            dataType="date"
            caption="Created Date"
            [format]="dateTimeFormat">
        </dxi-column>
        <dxi-column
            dataField="active"
            alignment="center"
            [showEditorAlways]="false"
            [visible]="false"
            [filterValue]="true"
            falseText="Archived"
            trueText="Active"
            caption="System Profile Status">
        </dxi-column>
        <dxi-column
            dataField="sourceImportId"
            [visible]="false"
            caption="Source Import ID">
        </dxi-column>
    </dx-data-grid>
    </div>

    <dx-load-panel
        #loadPanel
        shadingColor="rgba(0,0,0,0.4)"
        [position]="{ of: '#discountRateGrid' }"
        [(visible)]="loadingVisible"
        [showIndicator]="true"
        [showPane]="true"
        [shading]="true"
        [closeOnOutsideClick]="false">
    </dx-load-panel>
</div>
