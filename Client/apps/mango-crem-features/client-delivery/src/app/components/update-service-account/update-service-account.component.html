<crem-modal
  class="client-delivery-modal"
  modalId="updateServiceAccoutModalId"
  modalTitle="Confirm {{ editActionTitle }}"
  closeIconVisible="true"
  primaryFooterButtonText="Confirm"
  closeOrCancelButtonText="Cancel"
  (primaryButtonAction)="updateConfirmation()"
>
  <div modalContent class="account-modal-content">
    <span>Are you sure you want to {{ editAction.toLowerCase() }}</span
    ><span class="user-name">{{ user }}</span
    >?
  </div>
</crem-modal>
