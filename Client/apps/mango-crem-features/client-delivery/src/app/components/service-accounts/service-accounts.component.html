<div class="service-accounts-page">
	<div class="service-accounts-page-title-wrapper">
		<div class="controls-left">
			<h2 class="title std-right-margin">{{ pageTitle }}</h2>
				<cs-search class="service-accounts-search std-right-margin" placeholder="Search service accounts"
								(changed)="searchDataGrid($event)">
				</cs-search>
			<div>
				<crem-dropdown
					id="service-accounts-dropdown"
					[isDisabled]='deleting'
					[dataSource]='dropdownField'
					[allowSearch]='false'
					placeholder='Account Filter'
					initialSelectedValue='Active'
					[showClearButton]='false'
					[showColumnHeader]='false'
					displayExpr='value'
					valueExpr='value'
					(selectedItems)="onFilterChange($event)"
				></crem-dropdown>
			</div>
		</div>
		<div class="controls-right">
			<div class="std-right-margin">
				<crem-button type="primary" (click)="addServiceAccount()">Add</crem-button>
			</div>
			<crem-button type="secondary" (click)="exportGrids()">Export</crem-button>
		</div>
		</div>
	<div class="service-accounts-page-data-grid-wrapper">
		<dx-data-grid
			#DataGrid
			[dataSource]="serviceAccountsData"
			keyExpr="contactId"
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true" 
			[allowColumnResizing]="true"
			[allowColumnReordering]="true"
			[columnAutoWidth]="true"
			[filterSyncEnabled]="true"
			[columnMinWidth]="10"
			(onCellPrepared)="onCellPrepared($event)"
			(onCellClick)="openAccountDetails($event)"
			(onContentReady)="onContentReady($event)"
			(onKeyDown)="onKeyDownOpenAccountDetails($event)"
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>    
			<dxo-sorting mode="multiple"></dxo-sorting>
			<dxo-column-fixing [enabled]="true"></dxo-column-fixing>
			<dxo-column-chooser [allowSearch]="true" mode="select">
			</dxo-column-chooser>
			<dxo-paging [pageSize]="50"></dxo-paging>
				<dxo-pager
						[showPageSizeSelector]="true"
						[allowedPageSizes]="[50, 100, 200, 500]"
						[showInfo]="true"
						[showNavigationButtons]="true"
						[visible]="true"
			>
			</dxo-pager>
			<dxi-column *ngFor="let col of columns" 
				[dataField]="col.dataField" 
				[alignment]="col.alignment"
				[visible]="col.visible"
				[dataType]="col.dataType"
				[format]="col.format"
				[caption]="col.caption"
				[fixed]="col.fixed"
				[allowEditing]="col.allowEditing"
				[cellTemplate]="col.cellTemplate"
				>
				<dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint" [precision]="col.precision"></dxo-format>
			</dxi-column>
			
			<div *dxTemplate="let d of 'contactActiveTemplate'">
				<dx-check-box
				[value]="d.value"			
				readOnly="true"
				id="chk{{d.rowIndex}}" 
				name="chk{{d.rowIndex}}"	
				hint="chk{{d.rowIndex}} is {{d.value}}"
				aria-checked="{{d.value}}"
				aria-readonly="true"
				iconSize="15"
				></dx-check-box>				
			</div>

			<dxi-column dataField="Actions" caption="Actions" type="buttons" width="65">
					<dxi-button	template="moreMenuTemplate">
						<div *dxTemplate="let data of 'moreMenuTemplate'">
						<button 
							class="btn btn-link userOptionsMenuBtn" 
							[matMenuTriggerFor]="MoreMenu"
							mat-button aria-haspopup="menu" 
							aria-label="More service account user Options" 
							title="Action menu to reactivate or deactivate"
							>
							<fa-icon [icon]="faEllipsisH"></fa-icon>
						</button>
							<mat-menu #MoreMenu="matMenu">                
								<ul> 
									<li *ngIf="data.data.contactActive==true" 
										(click)="updateServiceAccountStatus(data,false)"
										(keydown.enter)="updateServiceAccountStatus(data,false)"
										(keydown.space)="updateServiceAccountStatus(data,false)"
										role="menuitem" tabindex="0" mat-menu-item
										>Deactivate</li>                 
									<li *ngIf="data.data.contactActive==false" 
										(click)="updateServiceAccountStatus(data,true)"
										(keydown.enter)="updateServiceAccountStatus(data,true)"
										(keydown.space)="updateServiceAccountStatus(data,true)"
										role="menuitem" tabindex="0" mat-menu-item
										>Reactivate</li>
								</ul>
							</mat-menu>
						</div>
					</dxi-button>		    	
			</dxi-column>			
		</dx-data-grid>
		<dx-load-panel shadingColor="rgba(255,255,255,0.2)"
			[showIndicator]="true"
			[showPane]="true"
			[shading]="true"
			[closeOnOutsideClick]="false"
		></dx-load-panel>
	</div>
</div>
