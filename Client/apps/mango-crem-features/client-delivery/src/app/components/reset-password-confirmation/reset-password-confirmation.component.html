<crem-modal class="client-delivery-modal"
	modalId = "resetPasswordConfirmationModalId"
	modalTitle="Reset Password Confirmation" 
	closeIconVisible="true" 
	primaryFooterButtonText="Confirm"
	closeOrCancelButtonText="Cancel" 
	(primaryButtonAction)="resetPasswordConfirmation()"
	>
	<div modalContent class="account-modal-content">
		<span>Are you sure you want to reset the password for</span><span class="email-address"> {{ emailAddress}}</span>?
	</div>
</crem-modal>
