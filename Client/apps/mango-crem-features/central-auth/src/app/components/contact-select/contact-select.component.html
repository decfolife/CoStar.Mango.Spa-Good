<mango-user-records-popup 
    [selectedClientKey]="(selectedClientKey$ | async)"
    [contactRecords]="(contactRecords$ | async)" 
    [defaultContactRecordID]="(defaultContactRecordID$ | async)" 
    (onSubmit)="onContactRecordSubmit($event)">
</mango-user-records-popup>
<dx-load-panel shadingColor="rgba(0,0,0,0.4)" [(visible)]="isLoading"
    [showIndicator]="true" [showPane]="true" [shading]="true" [closeOnOutsideClick]="false">
</dx-load-panel>
