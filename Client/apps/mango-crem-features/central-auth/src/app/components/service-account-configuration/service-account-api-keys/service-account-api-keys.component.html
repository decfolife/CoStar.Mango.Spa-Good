<div class="api-keys-wrapper">
	<mat-card>	
		<mat-card-header class="api-key-header">
			<mat-card-title>API Keys</mat-card-title>
			<button type="button" (click)="generateApiKey()" class="btn btn-primary">Generate API Key</button>
		</mat-card-header>	
		<mat-card-content>	
			<div></div>
			<div class="api-key-grid-container">
				<div class="grid-item">Service Account</div>
				<div class="grid-item">API KEY</div>
				<div class="grid-item">Date Generate</div>
				<div class="grid-item">Expiration Date</div>
				<div class="grid-item">{{userEmail}}</div>
				<div class="grid-item">********************</div>
			  <div class="grid-item">{{dateGenerated | date: 'MM/dd/yyyy'}}</div>
				<div class="grid-item">{{expirationDate | date: 'MM/dd/yyyy'}}</div>
			</div>
		</mat-card-content>
	</mat-card>
</div>
