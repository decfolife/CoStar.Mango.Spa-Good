<div class="api-keys-wrapper">
	<mat-card>	
		<mat-card-header class="api-key-header">
			<mat-card-title>API Keys</mat-card-title>
			<button type="button" (click)="generateApiKey()" class="btn btn-primary">Generate API Key</button>
		</mat-card-header>	
		<mat-card-content>	
			<div></div>
			<div class="api-key-grid-container">
				<div>Service Account</div>
				<div>API KEY</div>
				<div>Date Generated</div>
				<div>Expiration Date</div>
				<div>{{userEmail}}</div>
				<div *ngIf="apiKeyExpiresOn">********************</div>
				<div *ngIf="apiKeyGeneratedDate">{{apiKeyGeneratedDate}}</div>
				<div *ngIf="apiKeyExpiresOn">{{apiKeyExpiresOn}}</div>
			</div>
		</mat-card-content>
	</mat-card>
</div>
