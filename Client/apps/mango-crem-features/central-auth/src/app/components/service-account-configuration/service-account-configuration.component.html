<div class="service-account-configuration">
	<mango-ca-navbar></mango-ca-navbar>
	<div>
	<mango-service-account-api-keys 
		[servieAccountInfo] ="servieAccountInfo"
		(apiKeyUpdated) = "serviceAccountUpdated()">
	</mango-service-account-api-keys>
		<div class="middle-row-grid-container">
			<mango-service-account-sites *ngIf="servieAccountInfo.serviceAccountSites" 
				[sites]="servieAccountInfo.serviceAccountSites" 
				(apiAccessUpdated) = "serviceAccountUpdated()">
			</mango-service-account-sites>
			<mango-service-account-endpoints *ngIf="servieAccountInfo.serviceAccountEndpoints" 
				[endpoints]="servieAccountInfo.serviceAccountEndpoints">
			</mango-service-account-endpoints>
			<mango-service-account-api-key-duration
				[serviceAccountInfo] ="servieAccountInfo"
				(apiKeyExpiresInDaysUpdated) = "serviceAccountUpdated()">
			</mango-service-account-api-key-duration>
		</div>			
		<mango-service-account-history *ngIf="serviceAccountChangeHistories"
			[histories]="serviceAccountChangeHistories">
		</mango-service-account-history>
	</div>
</div>
