<div class="sites-wrapper">
	<mat-card>	
		<mat-card-header>
			<mat-card-title>Sites</mat-card-title>
		</mat-card-header>	
		<mat-card-content>		
			<div class="site-toggles-container" *ngFor="let site of sites; let i = index">
				<div class="grid-item">{{site.clientKey}}</div>
				<div class="grid-item">
					<mat-slide-toggle
						[checked]="site?.isActive"
						(change)="toggleSite($event, i)"
					></mat-slide-toggle>
				</div>
			</div>
		</mat-card-content>
	</mat-card>
</div>
