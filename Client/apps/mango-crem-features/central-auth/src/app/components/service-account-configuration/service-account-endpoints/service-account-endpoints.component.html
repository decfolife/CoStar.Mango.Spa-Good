<div class="endpoints-wrapper">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Endpoints</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div
        class="endpoint-toggles-container"
        *ngFor="let endpoint of endpoints; let i = index"
      >
        <div *ngIf="!endpoint.isActive" class="disabled-label">
          {{ endpoint.endpoint }}
        </div>
        <div *ngIf="endpoint.isActive">{{ endpoint.endpoint }}</div>
        <div>
          <mat-slide-toggle
            aria-label="{{ endpoint.endpoint }} Endpoint Access"
            id="endpointcheckbox{{ endpoint.endpoint }}"
            [checked]="endpoint.isActive"
            [disabled]="endpoint.isCommingSoon"
            (change)="updateEndPointAccess($event, i)"
            (keydown.enter)="updateEndPointAccessADA($event, i)"
          ></mat-slide-toggle>
        </div>
        <div *ngIf="endpoint.isCommingSoon">(Coming soon)</div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
