<div class="endpoints-wrapper">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Inbound Endpoints</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div
        class="endpoint-toggles-container"
        *ngFor="let endpoint of endpoints; let i = index"
      >
        <div *ngIf="endpoint.scopeName.indexOf('Inbound') != -1">
          {{ endpoint.scopeName.replace(' Inbound', '') }}
        </div>
        <div *ngIf="endpoint.scopeName.indexOf('Inbound') != -1">
          <mat-slide-toggle
            title="{{ endpoint.description }}"
            aria-label="{{ endpoint.scopeName }} Endpoint Access"
            id="endpointcheckbox{{ endpoint.scopeName }}in"
            [checked]="endpoint.selected"
            (change)="updateEndPointAccess($event, i)"
            (keydown.enter)="updateEndPointAccess($event, i)"
          ></mat-slide-toggle>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
  <mat-card>
    <mat-card-header>
      <mat-card-title>Outbound Endpoints</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div
        class="endpoint-toggles-container"
        *ngFor="let endpoint of endpoints; let i = index"
      >
        <div *ngIf="endpoint.scopeName.indexOf('Outbound') != -1">
          {{ endpoint.scopeName.replace(' Outbound', '') }}
        </div>
        <div *ngIf="endpoint.scopeName.indexOf('Outbound') != -1">
          <mat-slide-toggle
            title="{{ endpoint.description }}"
            aria-label="{{ endpoint.scopeName }} Endpoint Access"
            id="endpointcheckbox{{ endpoint.scopeName }}out"
            [disabled]="
              endpoint.scopeName == 'Company Outbound' ||
              endpoint.scopeName === 'Contacts Outbound'
                ? 'true'
                : 'false'
            "
            [checked]="endpoint.selected"
            (change)="updateEndPointAccess($event, i)"
            (keydown.enter)="updateEndPointAccess($event, i)"
          ></mat-slide-toggle>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
