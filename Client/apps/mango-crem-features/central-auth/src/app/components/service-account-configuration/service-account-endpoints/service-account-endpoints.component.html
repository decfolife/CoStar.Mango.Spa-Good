<div class="endpoints-wrapper">
	<mat-card>	
		<mat-card-header>
			<mat-card-title>Endpoints</mat-card-title>
		</mat-card-header>	
		<mat-card-content>		
			<div class="endpoint-toggles-container" *ngFor="let endpoint of endpoints; let i = index">
				<div>{{endpoint.endpoint}}</div>
				<div>
					<mat-slide-toggle 
						aria-label="{{endpoint.endpoint}} Endpoint Access"
						id="endpointcheckbox{{endpoint.endpoint}}"
						[checked]="endpoint?.isActive"
						[disabled]="true"
					></mat-slide-toggle>
				</div>
				<div *ngIf="!endpoint.isActive">(Coming soon)</div>
			</div>
		</mat-card-content>
	</mat-card>
</div>
