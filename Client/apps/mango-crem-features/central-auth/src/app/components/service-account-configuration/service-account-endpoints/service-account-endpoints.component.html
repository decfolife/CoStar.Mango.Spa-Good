<div class="endpoints-wrapper">
  <mat-card>
    <mat-card-header>
      <mat-card-title>Inbound Endpoints</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div
        class="endpoint-toggles-container"
        *ngFor="let endpoint of newEndpoints; let i = index"
      >
        <div
          *ngIf="!endpoint.isActive && endpoint.isInbound"
          class="disabled-label"
        >
          {{ endpoint.endpoint }}
        </div>
        <div *ngIf="endpoint.isActive && endpoint.isInbound">
          {{ endpoint.endpoint }}
        </div>
        <div *ngIf="endpoint.isInbound">
          <mat-slide-toggle
            aria-label="{{ endpoint.endpoint }} Inbound Endpoint Access"
            id="endpointcheckbox{{ endpoint.endpoint }}in"
            [checked]="endpoint.isActive"
            [disabled]="endpoint.isCommingSoon"
            (change)="updateEndPointAccess($event, i)"
            (keydown.enter)="updateEndPointAccessADA($event, i)"
          ></mat-slide-toggle>
        </div>
        <div *ngIf="endpoint.isCommingSoon && endpoint.isInbound">
          (Coming soon)
        </div>
      </div>
    </mat-card-content>
  </mat-card>
  <mat-card>
    <mat-card-header>
      <mat-card-title>Outbound Endpoints</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div
        class="endpoint-toggles-container"
        *ngFor="let endpoint of newEndpoints; let i = index"
      >
        <div
          *ngIf="!endpoint.isActive && !endpoint.isInbound"
          class="disabled-label"
        >
          {{ endpoint.endpoint }}
        </div>
        <div *ngIf="endpoint.isActive && !endpoint.isInbound">
          {{ endpoint.endpoint }}
        </div>
        <div *ngIf="!endpoint.isInbound">
          <mat-slide-toggle
            aria-label="{{ endpoint.endpoint }} Outbound Endpoint Access"
            id="endpointcheckbox{{ endpoint.endpoint }}out"
            [checked]="endpoint.isActive"
            [disabled]="endpoint.isCommingSoon"
            (change)="updateEndPointAccess($event, i)"
            (keydown.enter)="updateEndPointAccessADA($event, i)"
          ></mat-slide-toggle>
        </div>
        <div *ngIf="endpoint.isCommingSoon && !endpoint.isInbound">
          (Coming soon)
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
