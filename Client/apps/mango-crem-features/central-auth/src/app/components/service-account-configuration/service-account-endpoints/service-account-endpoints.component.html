<div class="endpoints-wrapper">
	<mat-card>	
		<mat-card-header>
			<mat-card-title>Endpoints</mat-card-title>
		</mat-card-header>	
		<mat-card-content>		
			<div class="endpoint-toggles-container" *ngFor="let endpoint of endpoints; let i = index">
				<div class="grid-item">{{endpoint.endpoint}}</div>
				<div class="grid-item">
					<mat-slide-toggle
						[checked]="endpoint?.isActive"
						[disabled]="true"
					></mat-slide-toggle>
				</div>
				<div *ngIf="!endpoint.isActive" class="grid-item">(Coming soon)</div>
			</div>
		</mat-card-content>
	</mat-card>
</div>
