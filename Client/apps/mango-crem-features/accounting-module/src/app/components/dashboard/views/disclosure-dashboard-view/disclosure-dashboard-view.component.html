<crem-skeleton
  *ngIf="isLoading; else showCards"
  [instances]="skeletonInstances"
  type="card"
></crem-skeleton>

<ng-template #showCards>
  <div
    class="card-containers"
    cdkDropList
    cdkDropListOrientation="vertical"
    (cdkDropListDropped)="cardMove($event)"
  >
    <ng-container *ngFor="let config of localCardConfig">
      <mango-iad-card
        class="categories-item"
        cdkDropListOrientation="horizontal"
        [cdkDropListData]="{ card: card, index: i }"
        fxLayout="row"
        [config]="config"
        [dataSource]="pivotDataSources[config.index]"
        (selectedFilter)="onSelectedFilter($event, config)"
      ></mango-iad-card>
    </ng-container>
  </div>
</ng-template>
