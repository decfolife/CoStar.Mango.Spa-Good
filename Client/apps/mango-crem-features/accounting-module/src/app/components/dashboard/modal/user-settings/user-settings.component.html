<crem-modal
  [modalTitle] = "modalTitle"
  [closeIconVisible] = "closeButton"
  [closeOrCancelButtonText] = "secondaryFooterButtonText"
  [modalId] = "modalId"
  className="newModal"
>
  <div modalContent>
    <mat-tab-group disableRipple="true" animationDuration="1000ms" dynamicHeight="true">
      <mat-tab class="tab-settings" label="Cards">

      </mat-tab>
      <mat-tab class="tab-settings" label="Card Order">

      </mat-tab>
      <mat-tab class="tab-settings" label="Settings">

      </mat-tab>
    </mat-tab-group>
  </div>
</crem-modal>
