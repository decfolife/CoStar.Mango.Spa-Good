<div class="templates-log-container">
  <div class="templates-log-toolBar-wrapper">
    <div class="controls-left">
      <h1 class="title">Import Log</h1>
    </div>
  </div>
  <div class="templates-log-dataGrid-wrapper">
    <crem-loader *ngIf="isLoading"></crem-loader>
    <dx-data-grid
      *ngIf="!isLoading"
      #TemplateLogDataGrid
      [dataSource]="templateLogData"
      [showColumnLines]="false"
      [showRowLines]="false"
      [showBorders]="false"
      [rowAlternationEnabled]="true"
      [wordWrapEnabled]="true"
    >
      <dxo-header-filter
        [visible]="true"
        [allowSearch]="true"
      ></dxo-header-filter>
      <dxo-paging [pageSize]="100"></dxo-paging>
      <dxo-pager
        [showPageSizeSelector]="true"
        [allowedPageSizes]="[100, 200, 500]"
        [showInfo]="true"
        [showNavigationButtons]="true"
        [visible]="true"
      >
      </dxo-pager>
      <dxo-load-panel
        [enabled]="true"
        shadingColor="rgba(255,255,255,1.0)"
        [showIndicator]="true"
        [showPane]="true"
        [shading]="true"
      >
      </dxo-load-panel>

      <dxi-column dataField="logEntryInfo" caption="Info">
        <dxo-header-filter [allowSearch]="true"></dxo-header-filter>
      </dxi-column>
      <dxi-column
        dataField="lastUpdatedDateTime"
        caption="Time"
        dataType="datetime"
        [format]="etlService.dateFormat"
      >
      </dxi-column>
    </dx-data-grid>
  </div>
</div>
