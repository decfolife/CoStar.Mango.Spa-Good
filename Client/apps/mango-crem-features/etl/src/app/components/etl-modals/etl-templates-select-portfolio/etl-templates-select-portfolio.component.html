<crem-modal
  modalTitle="Select Portfolio"
  [closeIconVisible]="true"
  [customFooter]="true"
  (primaryButtonAction)="onSubmit()"
  (closeButtonAction)="onClose()"
>
  <div modalContent>
    <div class="form-field">
      <div>
        <div>Portfolio</div>
        <div>
          <dx-select-box
            [id]="etlService.getId(componentName, 'select-portoloio', 'input')"
            [dataSource]="portfolios"
            valueExpr="companyID"
            displayExpr="companyName"
            (onValueChanged)="onPortfolioSelected($event)"
          >
          </dx-select-box>
        </div>
      </div>
    </div>
  </div>
  <div modalFooter class="footer-content">
    <div id="buttonTemplate" class="footerRightControls">
      <crem-button
        type="secondary"
        [id]="etlService.getId(componentName, 'cancel-button', 'button')"
        (click)="onClose()"
        >Cancel</crem-button
      >
      <crem-button
        type="primary"
        [id]="etlService.getId(componentName, 'submit-button', 'button')"
        (click)="onSubmit()"
        >Submit</crem-button
      >
    </div>
  </div>
</crem-modal>
