<crem-modal
  modalTitle="Copy Template"
  [closeIconVisible]="true"
  [customFooter]="true"
  (primaryButtonAction)="onSubmit()"
  (closeButtonAction)="onClose()"
>
  <div modalContent>
    <div class="form-field">
      <div class="dynamicLabel">New template name :</div>
      <div class="dynamicInput">
        <crem-input
          [required]="true"
          [showLabel]="false"
          [showInfo]="false"
          [inputType]="'text'"
          [(value)]="selectedItem"
        ></crem-input>
      </div>
    </div>
  </div>
  <div modalFooter class="footer-content">
    <div id="buttonTemplate" class="footerRightControls">
      <crem-button
        type="secondary"
        [id]="etlService.getId(componentName, 'cancel-button', 'button')"
        (click)="onClose()"
        >Cancel</crem-button
      >
      <crem-button
        type="primary"
        [id]="etlService.getId(componentName, 'submit-button', 'button')"
        (click)="onSubmit()"
        >Submit</crem-button
      >
    </div>
  </div>
</crem-modal>
