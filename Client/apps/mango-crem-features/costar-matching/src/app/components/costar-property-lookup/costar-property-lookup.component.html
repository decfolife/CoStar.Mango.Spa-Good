<div *ngIf="userHasPageAccess else noPageAccessContent">
  <div *ngIf="userHasViewRights else noAccessFlgContent">
    <div *ngIf="buildingInfo">
      <crem-page-header
        pageTitle="CoStar Property Association"
        [showTitleInfo]="false"
      ></crem-page-header>

      <div class="page-content">
        <crem-card id="costar-matching-building-info" title="Building Information">
          <div class="building-info-container">
            <crem-descriptions [items]="propertyDescriptions"></crem-descriptions>
          </div>
        </crem-card>
        <div class="costar-matching-properties-container">
          <crem-card id="costar-matching-match-property" title="Match Property">
            <div class="search-container">
              <crem-search
                [showLabel]="false"
                [placeholder]="''"
                [disabled]="false"
                [required]="false"
                [showInfo]="false"
                [value]="buildingInfo.buildingAddress_1"
                [debounceTime]="500"
                (changed)="searchCostarProperties($event)">
              </crem-search>
            </div>
            <div class="grid-container">
              <dx-data-grid #PropertiesGrid
                id="costar-matching-matched-properties" 
                [dataSource]="properties"
                [showBorders]="true" 
                [hoverStateEnabled]="true"
                [showRowLines]="true" 
                [showColumnLines]="false"
                (onKeyDown)="onGridCellKeyDown($event)"
                (onSelectionChanged)="onSelectionChanged($event)">
                <dxo-selection mode="multiple"></dxo-selection>
                <dxi-column dataField="coStarID" caption="CoStar ID" alignment="left"></dxi-column>
                <dxi-column dataField="coStarAddress" caption="Property Address" alignment="left" dataType="date" format="MM/dd/yyyy hh:mm:ss a"></dxi-column>
                <dxi-column dataField="propertyType" caption="Property Type" alignment="left"></dxi-column>
                <dxi-column dataField="confidenceScore" caption="Confidence Score" alignment="left"></dxi-column>
              </dx-data-grid>
            </div>
            <div class="associatedPropertyInfo" *ngIf="PropertiesGrid.selectedRowKeys.length && userHasAddRights">
              <div>Associate Property to</div>
              <div class="propertyInfo">{{ PropertiesGrid.instance.getSelectedRowsData()[0].coStarAddress }}</div>
              <div class="confirm">  
                <crem-button class="confirm-button"
                  type="primary" 
                  id="costar-matching-confirm-button" 
                  (buttonClick)="saveCostarInfo()">Confirm
                </crem-button>
              </div>
            </div>
          </crem-card>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #noAccessFlgContent>
  <div class="page-content">
    <crem-no-objects-found
        [title]="'No access to the CoStar Matching'"
        [subtitle]="'You do not currently have access to this page, please contact your Admin'"
    ></crem-no-objects-found>
  </div>
</ng-template>

<ng-template #noPageAccessContent>
  <div class="page-content">
    <p>401 Unauthorized</p>
    <p>You do not currently have access to this page, please contact your Admin.</p>
  </div>
</ng-template>
