<crem-card
  [id]="accountingSummaryService.getId(componentName,'section','card')" 
  [title]="title"
  [subtitle]="subtitle">

    <form [formGroup]="detailsForm" class="details-container">
    <div class="details-section-controls">
        <div class="controls">
          <div class="labels">
            <crem-input-label
              [id]="accountingSummaryService.getId(componentName,'classification','label')"
              [label]="'Classification'"
              [showInfo]="false"
              [required]="true">
            </crem-input-label>
          </div>
          <div class="controls-container">
            <crem-dropdown
              [id]="accountingSummaryService.getId(componentName,'classification','dropdown')"
              [placeholder]="'Select Classification'" 
              displayExpr="classificationType"
              [dataSource]="classificationTypeList"
              value="classificationID"
              valueExpr="classificationID"
              [required]="true"
              [initialSelectedValue]="selectedClassificationID"
              [showClearButton]="true"
              (selectedItems)="onClassificationValueChanged($event)"
              formControlName="classification"
              [containerized]="true"
            />
          </div>
        </div>

        <div class="controls">
          <div class="labels">
            <crem-input-label
              [id]="accountingSummaryService.getId(componentName,'journalEntryProfile','label')"
              [label]="'Journal Entry Profile'"
              [showInfo]="false"
              [required]="journalEntryProfileRequired">
            </crem-input-label>
          </div>
          <div class="controls-container">
            <crem-dropdown
              [id]="accountingSummaryService.getId(componentName,'journalEntryProfile','dropdown')"
              [placeholder]="'Select Journal Entry Profile'" 
              displayExpr="profileName"
              [isSearchable]="false"
              [dataSource]="journalEntryProfileList"
              [allowSearch]="false"
              [required]="journalEntryProfileRequired"
              value="profileID"
              valueExpr="profileID"
              [showClearButton]="true"
              [initialSelectedValue]='selectedjournalEntryProfileID'
              formControlName="journalEntryProfile"
              [containerized]="true"
            />
          </div>
        </div> 
    
        <div class="terms-container" id="termRows">
          <div class="terms-row">
          <div class="controls">
            <div class="labels">
              <crem-input-label
                [id]="accountingSummaryService.getId(componentName,'termBegin','label')"
                [label]="'Accounting Term Begin'"
                [showInfo]="false"
                [required]="true">
              </crem-input-label>
            </div>
            <div class="controls-container">
              <crem-dropdown
                [id]="accountingSummaryService.getId(componentName,'termBegin','dropdown')"
                [placeholder]="'Select Term Begin...'" 
                displayExpr="accountingEventBeginDateDisplay"
		            [isSearchable]="false"
                [dataSource]="beginDateOptionsForEvents"
              	[allowSearch]="false"
                value="optionID"
                valueExpr="optionID"
                [required]="true"
                (selectedItems)="setTermBeginDate($event)"
                [initialSelectedValue]='selectedBeginDateID'
                formControlName="accountingEventBeginDateDropdown"
                [containerized]="true"
              />
              <crem-date-picker
                [id]="accountingSummaryService.getId(componentName,'termBegin','date-picker')"
                [value]="termBeginDate"
                [useMaskBehavior]="false"
                [dateFormat]="dateFormat"
                [invalidDateMessage]="'Invalid date'"
                [showClearButton]="false"
                [isRequired]="true"
                [disabled]="isTermBeginDateEnabled"
                (changeEvent)="onTermBeginDateChange($event)"
                formControlName="accountingEventBeginDate">
              </crem-date-picker>
            </div>
          </div>
    
          <div class="controls">
            <div class="labels">
              <crem-input-label
                [id]="accountingSummaryService.getId(componentName,'termEnd','label')"
                [label]="'Accounting Term End'"
                [showInfo]="false"
                [required]="true">
              </crem-input-label>
            </div>
            <div class="controls-container">
              <crem-dropdown
                [id]="accountingSummaryService.getId(componentName,'termEnd','dropdown')"
                [placeholder]="'Select Term End...'" 
                displayExpr="accountingEventEndDateDisplay"
                [dataSource]="endDateOptionsForEvents"
                value="optionID"
                valueExpr="optionID"
                [required]="true"
                (selectedItems)="setTermEndDate($event)"
                [initialSelectedValue]='selectedEndDateID'
                formControlName="accountingEventEndDateDropdown"
                [containerized]="true"
              />
    
              <crem-date-picker
                [id]="accountingSummaryService.getId(componentName,'termEnd','date-picker')"
                [value]="termEndDate"
                [dateFormat]="dateFormat"
                [useMaskBehavior]="false"
                [invalidDateMessage]="'Invalid date'"
                [showClearButton]="false"
                [isRequired]="true"
                [disabled]="isTermEndDateEnabled"
                formControlName="accountingEventEndDate"
                (changeEvent)="onTermEndDateChange($event)">
              </crem-date-picker>
            </div>
        
          </div>
        </div>  
        <div class="terms-row">
          <div class="term-validation" *ngIf="termsValidationFailed">
            <div class="terms-checkbox">
              <crem-check-box
                [id]="accountingSummaryService.getId(componentName,'include-charges','checkbox')"
                [value]="isTermBeginNot1stDayOfTheMonth"
                [disabled]="false"
                formControlName="notFirstDayOfTheMonth">
              </crem-check-box>
              <crem-input-label
                [id]="accountingSummaryService.getId(componentName,'include-charges','label')"
                [label]="'Include charges from the first of the month?'"
                for="details-include-charges-checkbox"
                formControlName="includeCharges">
              </crem-input-label>
            </div>
          </div>
          <div class="term-hint" *ngIf="termBeginDate && termEndDate">
            <span title="Accounting Term (Years, Months, Days)" *ngIf="termString">{{termString}} |</span>
            <span title="Accounting Term (Number of Periods)" *ngIf="portfolioSettings?.leaseRecognitionCalendarID !== 1"> {{termInPeriods }} Periods |</span>
            <span title="Accounting Term (Number of Months)">{{termInMonths}} Months |</span>
            <span title="Accounting Term (Number of Days)">{{termInDays}} Days</span>
          </div>
        </div>
        </div>
        
        <div class="controls">
          <div class="labels">
            <crem-input-label
              [id]="accountingSummaryService.getId(componentName,'reportingException','label')"
              [label]="'Reporting Exception'"
              [showInfo]="false">
            </crem-input-label>
          </div>
          <div class="controls-container">
            <crem-dropdown
              [id]="accountingSummaryService.getId(componentName,'reportingException','dropdown')"
              [placeholder]="'Select Reporting Exceptions...'" 
              displayExpr="name"
              [isSearchable]="false"
              [dataSource]="reportingExceptionsList"
              [allowSearch]="false"
              value="id"
              valueExpr="id"
              [initialSelectedValue]='selectedExceptionId'
              (selectedItems)="onReportingExceptionValueChanged($event)"
              formControlName="reportingExceptions"
              [containerized]="true"
            />
          </div>
        </div>

        <div class="controls">
          <div class="labels">
            <crem-input-label
              [id]="accountingSummaryService.getId(componentName,'isImpaired','label')"
              [label]="'Is Impaired'"
              [showInfo]="false">
            </crem-input-label>
          </div>
          <div class="controls-container">
            <crem-toggle-slider
              size="wide"
              checkedLabel="YES"
              uncheckedLabel="NO"
              [value]="isImpaired"
              [disabled]="isImpairedDisabled">
            </crem-toggle-slider>
          </div>
        </div>
    </div>

    <div class="comments-section" *ngIf="showReportExceptionComment">
      <div class="controls">
        <div class="labels">
          <crem-input-label
            [id]="accountingSummaryService.getId(componentName,'report-exception-comment','label')"
            [label]="'Other Reason Explanation'"
            for="details-report-exception-comment-textarea"
            [required]="false">
          </crem-input-label>
      </div>
      <div class="controls-container">
          <crem-input
            [id]="accountingSummaryService.getId(componentName,'report-exception-comment','textarea')"
            [inputType]="'textarea'"
            [value]="''"
            [name]="''"
            [placeholder]="''"
            [required]="false"
            [allowScrolling]="true"
            [rows]="2"
            formControlName="reportingExceptionReason">
          </crem-input>
      </div>
    </div>
    </div>
    
    <div class="comments-section">
      <div class="controls">
      <div class="labels">
        <crem-input-label
          [id]="accountingSummaryService.getId(componentName,'comments','label')"
          [label]="'Comments'"
          for="details-comments-textarea">
        </crem-input-label>
      </div>
      <div class="controls-container">

          <crem-input
          [id]="accountingSummaryService.getId(componentName,'comments','textarea')"
          [inputType]="'textarea'"
          [value]="''"
          [name]="''"
          [placeholder]="''"
          [required]="false"
          [allowScrolling]="true"
          [rows]="2"
          formControlName="detailsSectionComments">
        </crem-input>
      </div>
    </div>
    </div>
  </form>
</crem-card>
