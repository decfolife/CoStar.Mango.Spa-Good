<crem-modal
  [modalTitle]="data.reportName"
  modalTitleId="RunReportModalTitle"
  [modalId]="allowSegments ? 'RunReportModalWithSegments' : 'RunReportModal'"
  closeIconVisible="true"
  primaryFooterButtonText="Run"
  closeOrCancelButtonText="Cancel"
  [customFooter]="true"
  className="newModal"
>
  <div modalContent class="body-content">
    <dx-load-panel
      shadingColor="rgba(255,255,255,0.2)"
      [visible]="showLoading"
      [showIndicator]="true"
      [showPane]="true"
      [shading]="true"
      [closeOnOutsideClick]="false"
    ></dx-load-panel>
    <crem-vertical-stepper display="1" *ngIf="!loading && showSegment">
      <crem-dynamic-form
        #SegmentForm
        class="w-100"
        [config]="segmentConfig"
        (changeEvent)="onChange($event)"
        idPrefix="segmentForm"
      >
        <ng-template let-fieldData="fieldData">
          <div class="form__section-item">
            <crem-dropdown
              #SegmentDropdown
              [id]="idPrefix + fieldData.dataField + '_dropdown'"
              [isDisabled]="fieldData.disabled"
              [dataSource]="fieldData.dataSource"
              [placeholder]="fieldData.placeHolder || 'Select...'"
              [showClearButton]="true"
              [showColumnHeader]="false"
              [displayExpr]="fieldData.displayExpr || 'value'"
              [valueExpr]="fieldData.valueExpr || 'value'"
              [isVisible]="!fieldData.hidden"
              [selectBoxValue]="
                data.redirectData?.newSegmentID
                  ? data.redirectData.newSegmentID
                  : []
              "
              [dataField]="fieldData.dataField"
              [allowSearch]="true"
              [useSelectBox]="true"
              [readOnly]="fieldData.readOnly"
              [hoverText]="fieldData.hoverText || fieldData.caption"
              [grouped]="true"
              dropDownContainerCustomClass="criteria_report_custom_header_segments"
              [useCustomGroupTemplate]="true"
              (selectedItems)="
                segmentForm?.onChange($event, 'dropdown', 'segmentID')
              "
            >
              <ng-template #customHeaderTemplate let-fieldData="data">
                <!-- this template is utilizing the custom header for grouping -->
                <div
                  class="segment_custom"
                  (click)="customButtonClicked('custom')"
                >
                  Custom
                </div>
                <div
                  class="segment_create_new"
                  [attr.title]="
                    !hasSegmentsAddRight
                      ? 'You have View rights to this segment. Ask your administrator to grant you Add rights to create a segment.'
                      : ''
                  "
                  [ngClass]="{
                    'segment_create_new--disabled': !hasSegmentsAddRight
                  }"
                  (click)="customButtonClicked('create New Segment')"
                >
                  Create New Segment
                </div>
              </ng-template>
            </crem-dropdown>
            <div class="textbox_subtext">
              <div *ngIf="!defaultValues">
                Using 'Custom', you are manually selecting the desired criteria
                for this report export.
              </div>
            </div>
          </div>
        </ng-template>
      </crem-dynamic-form>
    </crem-vertical-stepper>
    <crem-vertical-stepper
      display="2"
      *ngIf="!loading"
      [showBorder]="false"
      [hideStepper]="!showSegment"
    >
      <mango-criteria-form-report
        *ngIf="!loading && !segmentLoading"
        #CriteriaFormReport
        [criteriaSetId]="criteriaSetId"
        [defaultValues]="defaultValues"
        isReportCriteriaSet="true"
        (onCriteriaLoadedChange)="onCriteriaLoadedChange()"
        (onFormItemChange)="onFormItemChange($event)"
        (loadingCallback)="setLoading($event)"
        [idPrefix]="idPrefix"
      ></mango-criteria-form-report>
    </crem-vertical-stepper>
  </div>
  <div modalFooter class="footer-content" id="'ButtonTemplate'">
    <crem-button
      type="secondary"
      [id]="idPrefix + 'CancelButton'"
      (click)="closeDialog($event)"
    >
      Cancel
    </crem-button>
    <crem-button
      [id]="idPrefix + 'RunButton'"
      type="primary"
      (click)="runReport($event)"
    >
      Run
    </crem-button>
  </div>
</crem-modal>
