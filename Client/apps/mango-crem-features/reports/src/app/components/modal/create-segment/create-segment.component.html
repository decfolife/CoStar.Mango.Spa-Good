<crem-modal
  [modalTitle]="modalTitle"
  [modalTitleId]="idPrefix + 'ModalTitle'"
  [modalId]="idPrefix + 'Modal'"
  closeIconVisible="true"
  primaryFooterButtonText="Run"
  closeOrCancelButtonText="Cancel"
  [customFooter]="true"
  [closeDialogResult]="saveAndNewClicked ? 'refresh' : ''"
  className="newModal"
>
  <div modalContent class="body-content">
    <dx-load-panel
      shadingColor="rgba(255,255,255,0.2)"
      [visible]="showloading"
      [showIndicator]="true"
      [showPane]="true"
      [shading]="true"
      [closeOnOutsideClick]="false"
    ></dx-load-panel>
    <crem-vertical-stepper display="1" *ngIf="!loading">
      <crem-dynamic-form
        [config]="segmentConfig"
        (changeEvent)="onChange($event)"
        [idPrefix]="idPrefix"
        class="w-100"
      >
        <ng-template let-fieldData="fieldData">
          <div class="form__section-item" *ngIf="!addSegment">
            <crem-input
              [state]="
                (!segmentNameValid || !hasSegmentNameInput) &&
                textboxHasBeenModified
                  ? 'error'
                  : null
              "
              [maxLengthField]="fieldData.maxLength"
              [(value)]="segmentName"
              (valueChange)="onSegmentTextChange($event, fieldData)"
              [id]="'input' + fieldData.dataField"
              [disabled]="data.archived"
              [showHint]="false"
              [showLabel]="false"
              [showInfo]="false"
              [inputType]="'text'"
              [placeholder]="''"
              [required]="true"
            ></crem-input>
            <div class="textbox_subtext" *ngIf="!warningHint; else warning">
              {{ hintMessageText }}
            </div>
            <ng-template #warning>
              <div
                class="textbox_subtext--warning"
                *ngIf="textboxHasBeenModified"
              >
                <crem-icon class="icon" icon="faCircleInfo"></crem-icon>
                {{ hintMessageText }}
              </div>
            </ng-template>
          </div>
        </ng-template>
      </crem-dynamic-form>
    </crem-vertical-stepper>

    <crem-vertical-stepper
      display="2"
      *ngIf="!loading && !(data.redirectData?.source === 'runreport')"
    >
      <crem-dynamic-form
        #CriteriaSetForm
        [config]="criteriaSetConfig"
        (changeEvent)="onChange($event)"
        [idPrefix]="idPrefix"
        class="w-100"
      >
        <ng-template let-fieldData="fieldData">
          <div class="form__section-item">
            <crem-dropdown
              [id]="idPrefix + fieldData.dataField + 'Dropdown'"
              [isDisabled]="fieldData.disabled"
              dropDownContainerCustomClass="dynamicFormDropDown"
              [dataSource]="fieldData.dataSource"
              [placeholder]="fieldData.placeholder || 'Select...'"
              [showClearButton]="true"
              [showColumnHeader]="false"
              [required]="fieldData.required"
              [displayExpr]="fieldData.displayExpr || 'value'"
              [valueExpr]="fieldData.valueExpr || 'value'"
              [isVisible]="!fieldData.hidden"
              [customRequireValidation]="fieldData.customRequireValidation"
              [showRedBorder]="
                !CriteriaSetForm.configKey[fieldData.dataField]?.value
                  ?.length && criteriaSetModified
              "
              [selectBoxValue]="
                CriteriaSetForm.configKey[fieldData.dataField]?.value?.length &&
                CriteriaSetForm.configKey[fieldData.dataField]?.valueExpr
                  ? CriteriaSetForm.configKey[fieldData.dataField]?.value[0][
                      CriteriaSetForm.configKey[fieldData.dataField]?.valueExpr
                    ]
                  : []
              "
              [dataField]="fieldData.dataField"
              [allowSearch]="true"
              [useSelectBox]="true"
              [readOnly]="
                fieldData.readOnly ||
                data.archived ||
                (!hasEditRight && !hasObjectEditRight)
              "
              [hoverText]="fieldData.hoverText || fieldData.caption"
              (selectedItems)="onCriteriaDropdownChange($event)"
              [containerized]="true"
            ></crem-dropdown>
            <div
              class="textbox_subtext--warning"
              *ngIf="
                !CriteriaSetForm.configKey[fieldData.dataField]?.value
                  ?.length && criteriaSetModified
              "
            >
              <crem-icon class="icon" icon="faCircleInfo"></crem-icon>
              A criteria set is required.
            </div>
            <div
              class="textbox_subtext"
              *ngIf="
                !(
                  !CriteriaSetForm.configKey[fieldData.dataField]?.value
                    ?.length && criteriaSetModified
                )
              "
            >
              The criteria set consists of selectable criteria used in reports.
            </div>
          </div>
        </ng-template>
      </crem-dynamic-form>
    </crem-vertical-stepper>

    <crem-vertical-stepper
      [display]="data.redirectData?.source === 'runreport' ? 2 : 3"
      [showBorder]="false"
      *ngIf="!loading"
    >
      <div class="criteria-selection-wrapper">
        <crem-dynamic-form
          *ngIf="!selectedCriteriaId"
          [config]="emptyItemConfig"
          (changeEvent)="onChange($event)"
          [idPrefix]="idPrefix"
        >
        </crem-dynamic-form>

        <mango-criteria-form-segment
          *ngIf="selectedCriteriaId"
          #CriteriaForm
          [defaultValues]="data.config ? data.config : defaultValues"
          [criteriaSetId]="selectedCriteriaId"
          [isReportCriteriaSet]="selectedReportCriteriaSet"
          [readOnly]="data.archived"
          (onCriteriaLoadedChange)="onCriteriaLoadedChange($event)"
          (loadingCallback)="setLoading($event)"
          (onFormItemChange)="onFormItemChange($event)"
          [idPrefix]="idPrefix"
        >
        </mango-criteria-form-segment>
      </div>
    </crem-vertical-stepper>
  </div>
  <div modalFooter class="footer-content">
    <div id="'ButtonTemplate'" class="footerRightControls">
      <crem-button
        [id]="idPrefix + 'CancelButton'"
        type="secondary"
        (click)="cancelDialog($event)"
      >
        Cancel
      </crem-button>
      <ng-container *ngIf="!data.archived">
        <crem-button
          *ngIf="
            !(data.redirectData?.source === 'runreport') &&
            data.openReportAction === 'edit'
          "
          type="secondary"
          [id]="idPrefix + 'SaveAsbutton'"
          [attr.title]="
            !hasEditRight
              ? 'You have View rights for segments. Ask your administrator to grant you Add rights to create a segment.'
              : ''
          "
          [disabled]="data.archived || !hasEditRight"
          (click)="!(data.archived || !hasEditRight) && saveAsClicked($event)"
        >
          Save As
        </crem-button>
        <crem-button
          *ngIf="
            !(data.redirectData?.source === 'runreport') &&
            !(data.openReportAction === 'edit')
          "
          type="secondary"
          [id]="idPrefix + 'SaveAndNewbutton'"
          [disabled]="data.archived || !hasEditRight"
          (click)="
            !(data.archived || !hasEditRight) && saveSegment($event, true)
          "
        >
          Save & New
        </crem-button>
        <crem-button
          [id]="idPrefix + 'SaveButton'"
          type="primary"
          [attr.title]="
            !hasObjectEditRight
              ? 'You have View rights to this segment. Ask your administrator to grant you additional rights to edit this segment.'
              : ''
          "
          [disabled]="data.archived || !hasObjectEditRight"
          (click)="
            !(data.archived || !hasObjectEditRight) &&
              saveSegment($event, false)
          "
        >
          Save
        </crem-button>
      </ng-container>
      <crem-button
        *ngIf="data.archived"
        [id]="idPrefix + 'UnarchiveButton'"
        [attr.title]="
          !hasObjectDeleteRight
            ? 'You do not have the necessary rights to unarchive a segment.'
            : ''
        "
        type="primary"
        [disabled]="!hasObjectDeleteRight"
        (click)="hasObjectDeleteRight && unarchiveSegment($event)"
      >
        Unarchive
      </crem-button>
    </div>
  </div>
</crem-modal>
