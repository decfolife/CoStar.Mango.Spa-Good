<crem-modal 
	[modalTitle]="modalTitle"
  [modalTitleId]="idPrefix + 'ModalTitle'"
  [modalId]="idPrefix + 'Modal'"
	closeIconVisible="true"
  primaryFooterButtonText="Run"
	closeOrCancelButtonText="Cancel"
  [customFooter]="true"
  >
	<div modalContent class="body-content">
    <dx-load-panel shadingColor="rgba(255,255,255,0.2)" [visible]="showloading" [showIndicator]="true"
		[showPane]="true" [shading]="true" [closeOnOutsideClick]="false"></dx-load-panel>
    <crem-vertical-stepper display="1" *ngIf="!loading">
      <dynamic-form
        [config]="segmentConfig"
        (onChangeEvent)="onChange($event)"
        [idPrefix] = "idPrefix"
        >
        <ng-template let-fieldData="fieldData">
          <div class="form__section-item" *ngIf="!addSegment">
            <crem-text-box #CremTextBox
              [(value)]="segmentName"
              [maxLengthMessage]="fieldData.maxLengthMessage"
              [maxLength]="fieldData.maxLength"
              (onChangeEvent)="onSegmentTextChange($event, fieldData)"
              (onInitialized)="onInitialized($event, fieldData.dataField)"
              [isRequired]="fieldData.required"
              [initialFocus]="fieldData.initialFocus"
              [inputId]="'input' + fieldData.dataField"
              [showRedBorder]="(!segmentNameValid || !hasSegmentNameInput) && textboxHasBeenModified"
              [customRequireValidation]="fieldData.customRequireValidation"
              [autoTrim]="true"
              [disabled]="data.archived"
              >
            </crem-text-box>
              <div class="textbox_subtext" *ngIf="!warningHint; else warning">
                {{hintMessageText}}
              </div>
            <ng-template #warning>
              <div class="textbox_subtext--warning" *ngIf="textboxHasBeenModified">
                <crem-icon class="icon" icon="faCircleInfo"></crem-icon>
                {{hintMessageText}}
              </div>
            </ng-template>
          </div>
        </ng-template>
      </dynamic-form>
    </crem-vertical-stepper>
    
    <crem-vertical-stepper display="2" *ngIf="!loading && !(data.redirectData?.source  === 'runreport')">
      <dynamic-form #CriteriaSetForm
        [config]="criteriaSetConfig"
        (onChangeEvent)="onChange($event)"
        [idPrefix] = "idPrefix"
        >
        <ng-template let-fieldData="fieldData">
          <div class="form__section-item">
            <crem-dropdown
              [id]="idPrefix + fieldData.dataField + 'Dropdown'"
              [isDisabled]='fieldData.disabled'
              dropDownContainerCustomClass="dynamicFormDropDown"
              [dataSource]='fieldData.dataSource'
              [placeholder]='fieldData.placeholder || "Select..."' [showClearButton]='true'
              [showColumnHeader]='false' [required]="fieldData.required"
              [displayExpr]="fieldData.displayExpr || 'value'"
              [valueExpr]="fieldData.valueExpr || 'value'"
              [isVisible]="!fieldData.hidden"
              [customRequireValidation]="fieldData.customRequireValidation"
              [showRedBorder]="!CriteriaSetForm.configKey[fieldData.dataField]?.value?.length && criteriaSetModified"
              [selectBoxValue]="(CriteriaSetForm.configKey[fieldData.dataField]?.value?.length && CriteriaSetForm.configKey[fieldData.dataField]?.valueExpr) ? 
              CriteriaSetForm.configKey[fieldData.dataField]?.value[0][CriteriaSetForm.configKey[fieldData.dataField]?.valueExpr] : []"
              [dataField]="fieldData.dataField"
              [allowSearch]='true'
              [useSelectBox]="true"
              [readOnly]="fieldData.readOnly || data.archived || (!hasEditRight && !hasObjectEditRight)"
              [hoverText]="fieldData.hoverText || fieldData.caption"
              (selectedItems)="onCriteriaDropdownChange($event)">
            </crem-dropdown>
            <div class="textbox_subtext--warning" *ngIf="!CriteriaSetForm.configKey[fieldData.dataField]?.value?.length && criteriaSetModified">
              <crem-icon class="icon" icon="faCircleInfo"></crem-icon>
              A criteria set is required.
            </div>
            <div class="textbox_subtext" *ngIf="!(!CriteriaSetForm.configKey[fieldData.dataField]?.value?.length && criteriaSetModified)">
              The criteria set consists of selectable criteria used in reports.
            </div>
          </div>
        </ng-template>
      </dynamic-form>
    </crem-vertical-stepper>

    <crem-vertical-stepper [display]="data.redirectData?.source === 'runreport' ? 2 : 3" [showBorder]="false" *ngIf="!loading">
      <div class="criteria-selection-wrapper">
        <dynamic-form *ngIf="!selectedCriteriaId "
          [config]="emptyItemConfig"
          (onChangeEvent)="onChange($event)"
          [idPrefix] = "idPrefix"
          >
        </dynamic-form>

        <mango-criteria-form *ngIf="selectedCriteriaId" #CriteriaForm
          [defaultValues]="data.config ? data.config : defaultValues"
          [criteriaSetId]="selectedCriteriaId"
          [isReportCriteriaSet]="selectedReportCriteriaSet"
          [readOnly]="data.archived"
          (onCriteriaLoadedChange)="onCriteriaLoadedChange($event)"
          (loadingCallback)="setLoading($event)"
          (onFormItemChange)="onFormItemChange($event)"
          [idPrefix]="idPrefix"
        >
        </mango-criteria-form>
      </div>
    </crem-vertical-stepper>
  </div>
  <div modalFooter class="footer-content">
    <div id="'ButtonTemplate'" class="footerRightControls">
      <crem-button [id]="idPrefix + 'CancelButton'" 
        type="secondary"
        (click)="cancelDialog($event)"
      >
        Cancel
      </crem-button>
      <ng-container *ngIf="!data.archived">
        <crem-button *ngIf="!(data.redirectData?.source === 'runreport') && (data.openReportAction === 'edit')" 
          type="secondary" 
          [id]="idPrefix + 'SaveAsbutton'"
          [attr.title]="(!hasEditRight) ? 'You do not have the necessary rights to create a segment.' : ''"
          [disabled]="data.archived || !hasEditRight"
          (click)="!(data.archived || !hasEditRight) && saveAsClicked($event)">
          Save As
        </crem-button>
        <crem-button *ngIf="!(data.redirectData?.source === 'runreport') && !(data.openReportAction === 'edit')"
          type="secondary" 
          [id]="idPrefix + 'SaveAndNewbutton'" 
          [disabled]="data.archived || !hasEditRight"
          (click)="!(data.archived || !hasEditRight) && saveSegment($event, true)">
          Save & New
        </crem-button>
        <crem-button [id]="idPrefix + 'SaveButton'"
          type="primary"
          [attr.title]="(!hasObjectEditRight) ? 'You do not have the necessary rights to edit a segment.' : ''"
          [disabled]="(data.archived || !hasObjectEditRight)" 
          (click)="!((data.archived || !hasObjectEditRight)) && saveSegment($event, false)"> Save
        </crem-button>
      </ng-container>
      <crem-button *ngIf="data.archived" [id]="idPrefix + 'UnarchiveButton'"
        [attr.title]="(!hasObjectDeleteRight) ? 'You do not have the necessary rights to unarchive a segment.' : ''"
        type="primary" [disabled]="!hasObjectDeleteRight" (click)="hasObjectDeleteRight && unarchiveSegment($event)"> Unarchive
      </crem-button>
    </div>

  </div>
</crem-modal>
