<div class="reports-right-container">
	<div class="reports-toolBar-wrapper">
		<div class="controls-left">
			<h1 class="title"> Reports </h1>
			<div class="search">
				<cs-search #SearchBox [placeholder]="'Search...'" (changed)="searchDataGrid($event)" ></cs-search>
			</div>
			<div class="favStarBtn">
				<button class="btn btn-default star" (click)="toggleShowFavorites(); $event.preventDefault()"
				>
					<div role="img" *ngIf="!showFavorites" aria-label="Show Favorite Reports">
						<crem-icon
							icon="faStar"
							pack="regular"
				  		></crem-icon>
					</div>
					<div role="img" *ngIf="showFavorites" aria-label="Show Favorite Reports">
						<crem-icon
							icon="faStar"
							pack="solid"
							class="warning"
				  		></crem-icon>
					</div>
				</button>
			</div>
			<div class="dropDown">
				<crem-dropdown
					id="reportTags"
					[dataSource]='reportTags'
					placeholder='Tags'
					[showClearButton]='true'
					displayExpr='reportTag'
					valueExpr='reportTag'
					showCheckBoxesMode="always"
					[allowSearch]="true"
					selectMode="multiple"
					(selectedItems)="tagSelected($event)"
				></crem-dropdown>
			</div>
		</div>
		<div class="controls-right">
			<div>
				<crem-button type="secondary">
					<span id="clearFilters" (click)="clearAllFilters(); $event.preventDefault();">Clear Filters</span>
				</crem-button>
			</div>
			<div class="more">
				<button class="btn btn-default moreButton" [matMenuTriggerFor]="moreMenu" (click)="$event.preventDefault()">More <mat-icon aria-label="More Menu">arrow_drop_down</mat-icon></button>
				<mat-menu #moreMenu="matMenu" class="moreMatMenu">				
					<button mat-menu-item (click)="toggleExpanded()"><span *ngIf="isExpanded">Collapse All</span><span *ngIf="!isExpanded">Expand All</span></button>      
					<button mat-menu-item (click)="resetGrid()">Reset</button>    
					<button mat-menu-item (click)="showColumnChooser()">Column Chooser</button>        
					<button mat-menu-item *ngIf="rptTagAdminRight" (click)="launchManageTagsModal(); $event.preventDefault()">Manage Tags</button>        
					<button mat-menu-item *ngIf="offlineContentRight"(click)="launchUploadOfflineTemplateModal(); $event.preventDefault()">Upload Offline Template</button>        
				</mat-menu>	 
			</div>
			<div class="createReport">
				<crem-button type="primary" *ngIf="createReportAdminRight" (click)="createReport(); $event.preventDefault()" >
					<span id="createReport">Create Report</span>
				</crem-button>
			</div>
		</div>
	</div>

	<div class="reports-dataGrid-wrapper"> 
		<crem-loader *ngIf="!dataRetrieved"></crem-loader>
		<dx-data-grid *ngIf="dataRetrieved"
			#ReportsDataGrid
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true"
			[allowColumnResizing]="true"
			columnResizingMode="widget"
			[allowColumnReordering]="true"
			[columnAutoWidth]="false"
			[dataSource]="filteredReports"
			keyExpr="id"
			[wordWrapEnabled]="true"
			(onCellPrepared)="onCellPrepared($event)"
			(onCellClick)="onCellClicked($event)"
			(onContentReady)="adaAttr($event); ADAattributes($event)"
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
			<dxo-grouping [autoExpandAll]="isExpanded" [contextMenuEnabled]="true"></dxo-grouping>
			<dxo-column-chooser [enabled]="true" [allowSearch]="true" width="400" height="500"></dxo-column-chooser>
			<dxo-paging [pageSize]="50"></dxo-paging>
			<dxo-pager 
					[showPageSizeSelector]="true"
					[allowedPageSizes]="[50, 100, 200, 500]"
					[showInfo]="true"
					[showNavigationButtons]="true"
					[visible]="true">
			</dxo-pager>
			<dxo-state-storing
				[enabled]="true"
				type="custom"
				[storageKey]="reportsGridStateKey"
				[customLoad]="loadState"
				[customSave]="saveState"
			>
			</dxo-state-storing>
			<dxo-load-panel [enabled]="true"
				shadingColor="rgba(255,255,255,1.0)"
				[showIndicator]="true"
				[showPane]="true"
				[shading]="true">
			</dxo-load-panel>
			<dxi-column  dataField="isFavorite" caption="Fav" cellTemplate="favoriteTemplate" padding=0 width="48" [allowHeaderFiltering]="false" 
			[allowSorting]="false" ></dxi-column>
			<dxi-column dataField="reportName" [sortIndex]="1" sortOrder="asc" [allowHiding]="false"></dxi-column>
			<dxi-column dataField="description" ></dxi-column>
			<dxi-column dataField="category" ></dxi-column>
			<dxi-column dataField="type" ></dxi-column>
			<dxi-column dataField="datasetName"></dxi-column>
			<dxi-column caption="Tags" cellTemplate="tagsTemplate" [allowHeaderFiltering]="false"></dxi-column>
			<dxi-column dataField="shared" caption="Shared"></dxi-column>
			<dxi-column dataField="isScheduled" caption="Scheduled"></dxi-column>
			<dxi-column dataField="createdBy"></dxi-column>
			<dxi-column dataField="lastModified" [format]="reportsService.dateFormat" dataType="date" [visible]="false"></dxi-column>
			<dxi-column dataField="lastModifiedBy" [visible]="false"></dxi-column>
			<dxi-column dataField="runCount" [visible]="false"></dxi-column>
			<dxi-column dataField="lastRun" caption="Last Run" dataType="date" [visible]="false"></dxi-column>
			<dxi-column dataField="lastRunBy" caption="Run By" [visible]="false"></dxi-column>
			<dxi-column dataField="rights"></dxi-column>
			<dxi-column caption="Actions" type="buttons" width="65" [showInColumnChooser]="false" [allowReordering]="false">
				<dxi-button template="moreMenuTemplate">
					<div *dxTemplate="let data of 'moreMenuTemplate'">
						
						<button aria-label="more menu" class="btn btn-link" (click)="$event.preventDefault()" [matMenuTriggerFor]="expenseMoreMenu"><mat-icon aria-label="Actions Menu">more_horiz</mat-icon></button>
		    			<mat-menu #expenseMoreMenu="matMenu" class="reports-actions">
							<ul role="menu">
								<li mat-menu-item (keydown.space)="runReport(data)" (keydown.enter)="runReport(data)" (click)="runReport(data)">Run</li>
								<li mat-menu-item (keydown.space)="editReport(data)" (keydown.enter)="editReport(data)" (click)="editReport(data)" *ngIf="data.data.type == 'AdHoc' && (data.data.canEdit || data.data.canDelete)">Edit</li>
								<li mat-menu-item (keydown.space)="shareReport(data)" (keydown.enter)="shareReport(data)" (click)="shareReport(data)" *ngIf="data.data.type == 'AdHoc' && (data.data.canEdit || data.data.canDelete)">Share</li>
								<li mat-menu-item (keydown.space)="scheduleReport(data)" (keydown.enter)="scheduleReport(data)" (click)="scheduleReport(data)" *ngIf="data.data.type == 'AdHoc' && (data.data.canEdit || data.data.canDelete)">Schedule</li>
								<li mat-menu-item (keydown.space)="assignReportTags(data)" (keydown.enter)="assignReportTags(data)" (click)="assignReportTags(data)" *ngIf="data.data.canEdit || data.data.canDelete">Assign Tags</li>
								<li mat-menu-item (keydown.space)="viewReportHistory(data)" (keydown.enter)="viewReportHistory(data)" (click)="viewReportHistory(data)" *ngIf="data.data.type == 'AdHoc'">View History</li>
								<li mat-menu-item (keydown.space)="deleteReport(data)" (keydown.enter)="deleteReport(data)" (click)="deleteReport(data)" *ngIf="data.data.type == 'AdHoc' && data.data.canDelete">Delete</li>
							</ul>
						</mat-menu>
					</div>
				</dxi-button>
			</dxi-column>

			<div *dxTemplate="let rpt of 'favoriteTemplate'">
				<div tabindex="0" *ngIf="!rpt.data.isFavorite" (click)="favoriteReport(rpt)" 
					role="button" aria-label="Click to favorite report" (keydown)="onKeydownMakeFavorite($event, rpt)">
					<crem-icon
						icon="faStar"
						pack="regular"
					></crem-icon>
				</div>
				<div tabindex="0" *ngIf="rpt.data.isFavorite" (click)="unFavoriteReport(rpt)"
					role="button" aria-label="Click to unfavorite report" (keydown)="onKeydownMakeUnFavorite($event, rpt)">
					<crem-icon
						icon="faStar"
						pack="solid"
						class="warning"
					></crem-icon>
				</div>
			</div>
			<div *dxTemplate="let rpt of 'tagsTemplate'">		
				<ng-container *ngFor="let t of rpt.data.tags">
					<div class="reportTag">{{t.reportTag}}</div>
				</ng-container>				
			</div>
		</dx-data-grid>
	</div>

</div>
