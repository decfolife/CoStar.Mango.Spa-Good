<div class="report-page">
  <div class="report-page-controls-wrapper">
    <div class="controls-left">
      <h5 class="reports__page-title dbl-right-margin">
        Group and User Module Rights
      </h5>
      <cs-search
        #SearchBox
        class="report-search"
        (changed)="searchDataGrid($event)"
        [disabled]="dataGridLoading || !isApplied"
        debounceTime="500"
      >
      </cs-search>
      <div class="reports__dropdown-container">
        <div class="report-dropdown">
          <crem-dropdown
            [dataSource]="userList"
            allowSearch="true"
            placeholder="Users"
            [showColumnHeader]="true"
            displayExpr="name"
            valueExpr="id"
            (selectedItems)="userDropdownChange($event)"
            showCheckBoxesMode="always"
            dropDownContainerCustomClass="reportsDropDown"
            selectMode="multiple"
          ></crem-dropdown>
        </div>
        <div class="report-dropdown">
          <crem-dropdown
            [dataSource]="groupList"
            allowSearch="true"
            placeholder="Groups"
            [showColumnHeader]="true"
            displayExpr="name"
            valueExpr="id"
            (selectedItems)="groupDropdownChange($event)"
            showCheckBoxesMode="always"
            dropDownContainerCustomClass="reportsDropDown"
            selectMode="multiple"
          ></crem-dropdown>
        </div>
        <div class="report-dropdown">
          <crem-dropdown
            #ModuleDropdown
            [dataSource]="dropdownData.items"
            allowSearch="true"
            placeholder="Modules"
            [showColumnHeader]="true"
            [displayExpr]="dropdownData.displayExpr"
            [valueExpr]="dropdownData.valueExpr"
            (selectedItems)="moduleDropdownChange($event)"
            showCheckBoxesMode="always"
            dropDownContainerCustomClass="reportsDropDown"
            selectMode="multiple"
          ></crem-dropdown>
        </div>
      </div>

      <crem-button
        class="button__apply"
        type="secondary"
        [disabled]="selectedModuleNames && !selectedModuleNames.length"
        (click)="apply()"
        >Apply</crem-button
      >
    </div>
    <div class="controls-right">
      <crem-button
        type="primary"
        [disabled]="dataGridLoading || !isApplied"
        (click)="exportGrids($event)"
        >Export</crem-button
      >
    </div>
  </div>
  <dx-tab-panel
    *ngIf="isApplied && userData && groupData"
    [dataSource]="tabs"
    [deferRendering]="false"
    [selectedIndex]="0"
  >
    <div *dxTemplate="let company of 'userRights'">
      <div class="report-page-data-grid-wrapper">
        <dx-data-grid
          class="readOnly"
          #UserDataGrid
          [dataSource]="userData"
          keyExpr="id"
          [showColumnLines]="false"
          [showRowLines]="false"
          [showBorders]="false"
          [rowAlternationEnabled]="true"
          [allowColumnResizing]="true"
          [allowColumnReordering]="true"
          [columnAutoWidth]="true"
          [filterSyncEnabled]="true"
          [columnMinWidth]="10"
          (onCellPrepared)="onCellPrepared($event)"
        >
          <dxo-header-filter
            [visible]="true"
            [allowSearch]="true"
          ></dxo-header-filter>
          <dxo-grouping
            #expand
            [autoExpandAll]="true"
            [contextMenuEnabled]="true"
          ></dxo-grouping>
          <dxo-sorting mode="multiple"></dxo-sorting>
          <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
          <dxo-column-chooser [allowSearch]="true" mode="select">
          </dxo-column-chooser>
          <dxo-paging [pageSize]="100"></dxo-paging>
          <dxo-pager
            [showPageSizeSelector]="true"
            [allowedPageSizes]="[50, 100, 200, 500]"
            [showInfo]="true"
            [showNavigationButtons]="true"
            [visible]="true"
          >
          </dxo-pager>
          <dxi-column
            *ngFor="let col of userColumns"
            [dataField]="col.dataField"
            [alignment]="col.alignment"
            [visible]="col.visible"
            [groupIndex]="col.groupIndex"
            [dataType]="col.dataType"
            [caption]="col.caption"
            [fixed]="col.fixed"
            [allowEditing]="col.allowEditing"
            [cellTemplate]="col.cellTemplate"
          >
            <dxo-format
              *ngIf="col.dataType == 'number' && col.precision >= 0"
              type="fixedPoint"
              [precision]="col.precision"
            ></dxo-format>
          </dxi-column>
        </dx-data-grid>
      </div>
    </div>
    <div *dxTemplate="let company of 'groupRights'">
      <div class="report-page-data-grid-wrapper">
        <dx-data-grid
          class="readOnly"
          #GroupDataGrid
          [dataSource]="groupData"
          keyExpr="id"
          [showColumnLines]="false"
          [showRowLines]="false"
          [showBorders]="false"
          [rowAlternationEnabled]="true"
          [allowColumnResizing]="true"
          [allowColumnReordering]="true"
          [columnAutoWidth]="true"
          [filterSyncEnabled]="true"
          [columnMinWidth]="10"
          (onCellPrepared)="onCellPrepared($event)"
        >
          <dxo-header-filter
            [visible]="true"
            [allowSearch]="true"
          ></dxo-header-filter>
          <dxo-grouping
            #expand
            [autoExpandAll]="true"
            [contextMenuEnabled]="true"
          ></dxo-grouping>
          <dxo-sorting mode="multiple"></dxo-sorting>
          <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
          <dxo-column-chooser [allowSearch]="true" mode="select">
          </dxo-column-chooser>
          <dxo-paging [pageSize]="100"></dxo-paging>
          <dxo-pager
            [showPageSizeSelector]="true"
            [allowedPageSizes]="[50, 100, 200, 500]"
            [showInfo]="true"
            [showNavigationButtons]="true"
            [visible]="true"
          >
          </dxo-pager>
          <dxi-column
            *ngFor="let col of groupColumns"
            [dataField]="col.dataField"
            [alignment]="col.alignment"
            [visible]="col.visible"
            [groupIndex]="col.groupIndex"
            [dataType]="col.dataType"
            [caption]="col.caption"
            [fixed]="col.fixed"
            [allowEditing]="col.allowEditing"
            [cellTemplate]="col.cellTemplate"
          >
            <dxo-format
              *ngIf="col.dataType == 'number' && col.precision >= 0"
              type="fixedPoint"
              [precision]="col.precision"
            ></dxo-format>
          </dxi-column>
        </dx-data-grid>
      </div>
    </div>
    <div *dxTemplate="let company of 'moduleDescription'">
      <dx-data-grid
        class="readOnly"
        #ModuleDescriptionGrid
        [dataSource]="moduleDescriptionData"
        keyExpr="objectTypeId"
        [showColumnLines]="false"
        [showRowLines]="false"
        [showBorders]="false"
        [rowAlternationEnabled]="true"
        [allowColumnResizing]="true"
        [allowColumnReordering]="true"
        [columnAutoWidth]="true"
        [filterSyncEnabled]="true"
        [columnMinWidth]="10"
        (onCellPrepared)="onCellPrepared($event)"
      >
        <dxo-header-filter
          [visible]="true"
          [allowSearch]="true"
        ></dxo-header-filter>
        <dxo-grouping
          #expand
          [autoExpandAll]="true"
          [contextMenuEnabled]="true"
        ></dxo-grouping>
        <dxo-sorting mode="multiple"></dxo-sorting>
        <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
        <dxo-column-chooser [allowSearch]="true" mode="select">
        </dxo-column-chooser>
        <dxo-paging [pageSize]="100"></dxo-paging>
        <dxo-pager
          [showPageSizeSelector]="true"
          [allowedPageSizes]="[50, 100, 200, 500]"
          [showInfo]="true"
          [showNavigationButtons]="true"
          [visible]="true"
        >
        </dxo-pager>
        <dxi-column
          *ngFor="let col of moduleDescriptionColumns"
          [dataField]="col.dataField"
          [alignment]="col.alignment"
          [visible]="col.visible"
          [groupIndex]="col.groupIndex"
          [dataType]="col.dataType"
          [caption]="col.caption"
          [fixed]="col.fixed"
          [allowEditing]="col.allowEditing"
          [cellTemplate]="col.cellTemplate"
        >
          <dxo-format
            *ngIf="col.dataType == 'number' && col.precision >= 0"
            type="fixedPoint"
            [precision]="col.precision"
          ></dxo-format>
        </dxi-column>
      </dx-data-grid>
    </div>
  </dx-tab-panel>
  <dx-load-panel
    shadingColor="rgba(255,255,255,0.2)"
    [(visible)]="dataGridLoading && isApplied"
    [showIndicator]="true"
    [showPane]="true"
    [shading]="true"
    [closeOnOutsideClick]="false"
  ></dx-load-panel>
</div>

<dx-data-grid
  class="readOnly d-none"
  #FilterDataGrid
  [dataSource]="[]"
  [columnAutoWidth]="true"
  [filterSyncEnabled]="true"
  [columnMinWidth]="10"
>
</dx-data-grid>
