<div class="report-page">
  <div class="report-page-controls-wrapper">
    <div class="controls-left">
      <h5 class="reports__page-title dbl-right-margin">{{ pageTitle }}</h5>
      <cs-search
        #SearchBox
        class="report-search"
        (changed)="searchDataGrid($event)"
        [disabled]="!dataGridList?.length"
        debounceTime="1000"
      >
      </cs-search>

      <div class="report-dropdown">
        <crem-dropdown
          [dataSource]="userList"
          allowSearch="true"
          placeholder="Users"
          [showColumnHeader]="true"
          [initialSelectedValue]="initialUser?.id"
          displayExpr="name"
          valueExpr="id"
          (selectedItems)="userDropdownChange($event)"
          showCheckBoxesMode="always"
          dropDownContainerCustomClass="reportsDropDown"
          selectMode="multiple"
        ></crem-dropdown>
      </div>

      <div class="report-dropdown">
        <crem-dropdown
          [dataSource]="groupList"
          allowSearch="true"
          placeholder="Groups"
          [showColumnHeader]="true"
          [initialSelectedValue]="initialGroup?.id"
          displayExpr="name"
          valueExpr="id"
          (selectedItems)="groupDropdownChange($event)"
          showCheckBoxesMode="always"
          dropDownContainerCustomClass="reportsDropDown"
          selectMode="multiple"
        ></crem-dropdown>
      </div>

      <div class="report-dropdown">
        <crem-dropdown
          [dataSource]="moduleList"
          allowSearch="true"
          placeholder="Modules"
          [showColumnHeader]="true"
          [initialSelectedValue]="initialModule?.id"
          displayExpr="name"
          valueExpr="id"
          (selectedItems)="moduleDropdownChange($event)"
          showCheckBoxesMode="always"
          dropDownContainerCustomClass="reportsDropDown"
          selectMode="multiple"
        ></crem-dropdown>
      </div>
      <crem-button
        class="button__apply"
        type="secondary"
        [disabled]="
          (!selectedUsers?.length && !selectedGroups?.length) ||
          !selectedModules?.length ||
          navigationRightsDataLoading
        "
        (click)="apply()"
        >Apply</crem-button
      >
    </div>
    <div class="controls-right">
      <crem-button
        type="primary"
        [disabled]="!dataGridList?.length"
        (click)="exportDynamicGrids($event)"
        >Export</crem-button
      >
    </div>
  </div>
  <div *ngFor="let grid of dataGridList" class="container-wrapper">
    <div class="grid-container">
      <div class="grid-title">{{ grid.moduleDisplayName }}</div>
      <dx-data-grid
        class="readOnly custom-dx-data-grid"
        #ReportDataGrid
        [dataSource]="grid.dataSource"
        keyExpr="EntityId"
        [showBorders]="true"
        [rowAlternationEnabled]="true"
        [allowColumnResizing]="true"
        [allowColumnReordering]="true"
        [columnAutoWidth]="true"
        [filterSyncEnabled]="true"
        [columnMinWidth]="10"
        (onCellPrepared)="onCellPrepared($event)"
      >
        <dxo-header-filter
          [visible]="true"
          [allowSearch]="true"
        ></dxo-header-filter>
        <dxo-grouping
          #expand
          [autoExpandAll]="true"
          [contextMenuEnabled]="true"
        ></dxo-grouping>
        <dxo-sorting mode="multiple"></dxo-sorting>
        <dxo-column-fixing [enabled]="true"></dxo-column-fixing>
        <dxo-column-chooser [allowSearch]="true" mode="select">
        </dxo-column-chooser>
        <dxo-paging [pageSize]="100" [enabled]="false"></dxo-paging>
        <dxo-pager
          [showPageSizeSelector]="true"
          [allowedPageSizes]="[50, 100, 200, 500]"
          [showInfo]="true"
          [showNavigationButtons]="true"
          [visible]="false"
        >
        </dxo-pager>
        <dxi-column
          *ngFor="let col of columnsObject[grid.moduleId]"
          [dataField]="col.dataField"
          [alignment]="col.alignment"
          [visible]="col.visible"
          [groupIndex]="col.groupIndex"
          [dataType]="col.dataType"
          [caption]="col.caption"
          [fixed]="col.fixed"
          [allowEditing]="col.allowEditing"
          [cellTemplate]="col.cellTemplate"
        >
          <dxo-format
            *ngIf="col.dataType == 'number' && col.precision >= 0"
            type="fixedPoint"
            [precision]="col.precision"
          ></dxo-format>
        </dxi-column>
      </dx-data-grid>
    </div>
  </div>

  <dx-load-panel
    shadingColor="rgba(255,255,255,0.2)"
    [(visible)]="navigationRightsDataLoading"
    [showIndicator]="true"
    [showPane]="true"
    [shading]="true"
    [closeOnOutsideClick]="false"
  ></dx-load-panel>
</div>

<dx-data-grid
  class="readOnly d-none"
  #FilterDataGrid
  [dataSource]="[]"
  [columnAutoWidth]="true"
  [filterSyncEnabled]="true"
  [columnMinWidth]="10"
>
</dx-data-grid>
