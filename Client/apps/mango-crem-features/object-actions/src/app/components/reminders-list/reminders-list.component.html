<div class="reminders-right-container">
	<div class="reminders-toolBar-wrapper">
		<div class="controls-left">
			<h1 class="title">Reminders</h1>
			<div class="search">
				<cs-search #SearchBox [placeholder]="'Search...'" (changed)="searchDataGrid($event)"
					class="searchReminders-input"></cs-search>
			</div>
		</div>
		<div class="controls-right">
			<div class="controls-item">
				<crem-button type="secondary">
					<div id="clearFilters" (click)="resetFilter($event); $event.preventDefault();">Clear Filters</div>
				</crem-button>
			</div>
			<div class="controls-item">
				<button class="btn btn-default moreButton" [matMenuTriggerFor]="moreMenu"
					(click)="$event.preventDefault()">More <mat-icon
						aria-label="More Menu">arrow_drop_down</mat-icon></button>
				<mat-menu #moreMenu="matMenu" class="moreMatMenu">
					<button mat-menu-item (click)="resetFilter($event)">Reset</button>
					<button mat-menu-item (click)="openColumnChooser()">Column Chooser</button>
					<button mat-menu-item (click)="exportExcel($event)">Export</button>
				</mat-menu>
			</div>
			<div class="controls-item">
				<crem-button type="primary" (click)="openAddEditReminderDialog('add')">
					<div id="AddReminder">Add</div>
				</crem-button>
			</div>
		</div>
	</div>
	<div class="reminders-dataGrid-wrapper">
		<dx-data-grid #RemindersDataGrid [showColumnLines]="false" [showRowLines]="false" [showBorders]="false"
			[rowAlternationEnabled]="true" [allowColumnResizing]="true" columnResizingMode="widget"
			[allowColumnReordering]="true" [columnAutoWidth]="false" [dataSource]="gridData" keyExpr="TicklerID"
			[wordWrapEnabled]="true"
			(onContentReady)="adaAttributes($event); adaPaginationAttr($event); adaAttrNoDataGrid($event);">
			<dxo-column-chooser [allowSearch]="true" mode="select"></dxo-column-chooser>
			<dxo-column-fixing [enabled]="true"></dxo-column-fixing>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
			<dxi-column *ngFor="let col of columns" [dataField]="col.dataField" [alignment]="col.alignment"
				[visible]="col.visible" [dataType]="col.dataType" [format]="col.format" [caption]="col.caption"
				[fixed]="col.fixed" [width]="col.width" [sortOrder]="col.sortOrder" [allowEditing]="col.allowEditing"
				[cellTemplate]="col.cellTemplate">
				<dxo-format *ngIf="col.dataType == 'number' && col.precision >= 0 " type="fixedPoint"
					[precision]="col.precision"></dxo-format>
			</dxi-column>
			<dxi-column caption="Actions" type="buttons" width="65" [showInColumnChooser]="false"
				[allowReordering]="false" [fixed]="true">
				<dxi-button template="moreMenuTemplate">
					<div *dxTemplate="let data of 'moreMenuTemplate'">
						<button aria-label="more menu" class="btn btn-link" (click)="$event.preventDefault()"
							[matMenuTriggerFor]="MoreMenu"><mat-icon role="none"
								aria-label="Actions Menu">more_horiz</mat-icon></button>
						<mat-menu #MoreMenu="matMenu">
							<button mat-menu-item type="button"*ngIf="userRole < 3"
								(click)="openAddEditReminderDialog('edit',data);" >Edit</button>
							<button mat-menu-item type="button" (click)="deleteReminder(data);"
								(keydown.space)="deleteReminder(data);"
								(keydown.enter)="deleteReminder(data)">Delete</button>
						</mat-menu>
					</div>
				</dxi-button>
			</dxi-column>
			<dxo-paging [pageSize]="50"></dxo-paging>
			<dxo-pager [showPageSizeSelector]="true" [allowedPageSizes]="[50, 100, 200, 500]" [showInfo]="true"
				[showNavigationButtons]="true" [visible]="true">
			</dxo-pager>
			<dxo-grouping #expand [autoExpandAll]="true" [contextMenuEnabled]="true"></dxo-grouping>
			<dxo-column-chooser [enabled]="false" [allowSearch]="true" width="400" height="500"></dxo-column-chooser>
		</dx-data-grid>
	</div>
</div>
