<div class="reminders-right-container">
	<div class="reminders-toolBar-wrapper">
		<div class="controls-left">
			<h1 class="title"> Reminders List </h1>
			<div class="search">
				<cs-search #SearchBox [placeholder]="'Search...'" ></cs-search>
			</div>
		</div>
		<div class="controls-right">
			<div class="controls-item">
				<crem-button type="secondary">
					<div id="clearFilters">Clear Filters</div>
				</crem-button>
			</div>
			<div class="controls-item">
				<crem-button type="primary">
					<div id="AddReminder">Add Reminder</div>
				</crem-button>
			</div>
			<div class="controls-item">
				<crem-button type="secondary">
					<div id="ExportExcel">Export Excel</div>
				</crem-button>
			</div>
		</div>
	</div>
	<div class="reminders-dataGrid-wrapper"> 
		<dx-data-grid 
			#RemindersDataGrid
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true"
			[allowColumnResizing]="true"
			columnResizingMode="widget"
			[allowColumnReordering]="true"
			[columnAutoWidth]="false"
			[dataSource]="gridData"
			[wordWrapEnabled]="true"
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
			<dxo-paging [pageSize]="50"></dxo-paging>
			<dxo-pager 
				[showPageSizeSelector]="true"
				[allowedPageSizes]="[50, 100, 200, 500]"
				[showInfo]="true"
				[showNavigationButtons]="true"
				[visible]="true">
			</dxo-pager>
			<dxo-grouping #expand [autoExpandAll]="true" [contextMenuEnabled]="true"></dxo-grouping>
			<dxo-column-chooser [enabled]="false" [allowSearch]="true" width="400" height="500"></dxo-column-chooser>
		</dx-data-grid>
	</div>
</div>
