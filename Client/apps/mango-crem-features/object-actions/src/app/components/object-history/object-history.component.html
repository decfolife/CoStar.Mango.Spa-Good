<div class="grid" id="object-history-grid">
  <crem-page-header
    id="page-header"
    [tabTitle]="tabTitle"
    [pageTitle]="pageTitle"
    [customActions]="true"
    [customFilters]="true"
    [showListOrMapViewButtons]="false"
  >
    <div filters class="search-container">
      <crem-search
        [id]="'page-header-search'"
        [showLabel]="false"
        [label]="'Please Input search text'"
        [placeholder]="'Search...'"
        [required]="false"
        [disabled]="false"
        [showInfo]="false"
        [debounceTime]="500"
        [searchOption]="'typing'"
        (changed)="changed($event)"
      ></crem-search>
    </div>
    <div actions class="actions-container">
      <crem-button
        [id]="'page-header-more'"
        text="More"
        color="secondary"
        icon="faCaretDown"
        iconPosition="right"
        [matMenuTriggerFor]="listMenu"
      >
      </crem-button>

      <mat-menu #listMenu="matMenu">
        <button
          mat-menu-item
          [id]="'page-header-group-by-date-btn'"
          (click)="groupBy('groupDate')"
        >
          Group By Date
        </button>

        <button
          mat-menu-item
          [id]="'page-header-group-by-user-btn'"
          (click)="groupBy('user')"
        >
          Group By User
        </button>

        <button
          mat-menu-item
          [id]="'page-header-group-by-object-btn'"
          (click)="groupBy('childObject')"
        >
          Group By Object/child Object
        </button>

        <button
          mat-menu-item
          [id]="'page-header-expand-all-btn'"
          (click)="toggleExpandAll()"
        >
          {{ expandAll ? 'Collapse All' : 'Expand All' }}
        </button>
      </mat-menu>

      <crem-button
        [id]="'page-header-export-to-excel-btn'"
        [color]="'primary'"
        [ariaLabel]="sendToExcelClicked ? 'Sending to Excel' : 'Send to Excel'"
        [disabled]="showLoading || sendToExcelClicked"
        (click)="sendToExcel($event)"
        [icon]="sendToExcelClicked ? 'faSpinner' : ''"
        [iconPack]="sendToExcelClicked ? 'solid' : ''"
        [iconAnimation]="sendToExcelClicked ? 'spin' : ''"
      >
        <div>
          <span>
            {{ sendToExcelClicked ? 'Sending to Excel' : 'Send to Excel' }}
          </span>
        </div>
      </crem-button>
    </div>
  </crem-page-header>

  <dx-data-grid
    #ObjectHistoryGrid
    [dataSource]="objectHistory"
    id="object-history-grid-section"
    [columns]="objectHistoryColumns"
    [allowColumnReordering]="true"
    [width]="'100%'"
    [showBorders]="true"
    [remoteOperations]="true"
    [loadPanel]="{ enabled: false }"
    [wordWrapEnabled]="true"
    [rowAlternationEnabled]="true"
    [allowColumnResizing]="true"
    [columnAutoWidth]="true"
    [columnResizingMode]="columnResizingMode"
    [showColumnLines]="false"
    [hoverStateEnabled]="true"
    (onContentReady)="adaAttrNoDataGrid($event)"
  >
    <dxo-header-filter [visible]="true"></dxo-header-filter>

    <dxo-paging [pageSize]="100"></dxo-paging>

    <dxo-grouping
      [autoExpandAll]="false"
      [contextMenuEnabled]="true"
    ></dxo-grouping>

    <dxo-pager
      [showPageSizeSelector]="true"
      [allowedPageSizes]="[50, 100, 200, 500]"
      [showInfo]="true"
      [showNavigationButtons]="true"
      [visible]="true"
    >
    </dxo-pager>
  </dx-data-grid>

  <dx-load-panel
    shadingColor="rgba(255,255,255,0.2)"
    [position]="{ of: '#object-history-grid' }"
    [visible]="showLoading"
    [showIndicator]="true"
    [showPane]="true"
    [shading]="true"
    [hideOnOutsideClick]="false"
  >
  </dx-load-panel>
</div>
