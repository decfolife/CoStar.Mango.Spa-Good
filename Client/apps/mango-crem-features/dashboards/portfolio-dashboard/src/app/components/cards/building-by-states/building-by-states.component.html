<crem-card
[id]="card.gridData.id"
[title]="card.title"
[subtitle]="card.subtitle"
[filterData]="null"
[filterInitialValue]="null"
[showFilterClearButton]="false"
[moreOptions]="card.moreOptions"
[showCustomHeader]="true"
(exportDataGrid)="exportAllChartData($event)"
(hideLabels)="hideLabels($event)"
(toggleLegendEvent)="toggleLegendChart($event)"
fxFlexFill>
	
	<div class="cardContent" fxflexFill *ngIf="card.dispCard">
		<dx-pie-chart
			#BuildingByStatesChart			
			palette="Soft Pastel"
			[dataSource]="card.chartData.dataSource"
		    paletteExtensionMode="Alternate"
			resolveLabelOverlapping="shift"
			(onPointHoverChanged)="onPointHoverChanged($event)"
			(onLegendClick)="onLegendClick($event)"
		>
		
			<dxo-margin
				[top]="15"
				[bottom]="15"
			>
			</dxo-margin>
			
			<dxo-legend
		
				orientation="horizontal"
				itemTextPosition="right"
				horizontalAlignment="center"
				verticalAlignment="bottom"
				[columnCount]="13"
				[visible]="checked"

			>
				>	
				
			</dxo-legend>
		
			<dxi-series
				argumentField="state"
				valueField="buildingCount">
				<dxo-label [visible]="false" [customizeText]="customizeLabel">
					<dxo-connector
							[visible]="true"
							[width]="1"></dxo-connector>
			</dxo-label>
			</dxi-series>
		</dx-pie-chart>
	</div>
</crem-card>
