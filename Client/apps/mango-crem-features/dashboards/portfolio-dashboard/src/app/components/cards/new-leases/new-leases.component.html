<crem-card
  [id]="card.gridData.id"
  [title]="card.title"
  [subtitle]="card.subtitle"
  [counter]="card.counter"
  [filterData]="card.filterData"
  [filterInitialValue]="card.filterInitialValue"
  [showFilterClearButton]="false"
  [moreOptions]="card.moreOptions"
  [showCustomHeader]="true"
  (selectedFilter)="filter($event, card.id)"
  (expandDataGrid)="expandAllGridData($event)"
  (exportDataGrid)="exportAllGridData()"
  fxFlexFill
>
  <div class="cardContent" fxflexFill *ngIf="card.dispCard">
    <dx-data-grid
      #NewLeasesGrid
      [id]="card.gridData.id + 'grid'"
      [showColumnLines]="false"
      [showRowLines]="false"
      [showBorders]="false"
      [rowAlternationEnabled]="true"
      [allowColumnResizing]="true"
      [allowColumnReordering]="true"
      [columnAutoWidth]="false"
      [dataSource]="card.gridData.dataSource"
      keyExpr="gridIndex"
      (onRowClick)="rowClick($event)"
      [wordWrapEnabled]="true"
    >
      <dxo-scrolling mode="virtual"></dxo-scrolling>
      <dxo-header-filter
        [visible]="true"
        [allowSearch]="true"
      ></dxo-header-filter>
      <dxo-pager [visible]="false"></dxo-pager>
      <dxo-scrolling mode="virtual"></dxo-scrolling>
      <dxo-grouping
        #expand
        [autoExpandAll]="card.moreOptions.isExpanded"
        [contextMenuEnabled]="true"
      ></dxo-grouping>

      <dxi-column dataField="clientLeaseID" alignment="left"> </dxi-column>
      <dxi-column dataField="buildingName" caption="Property" alignment="left">
      </dxi-column>
      <dxi-column dataField="address1" alignment="left"> </dxi-column>
      <dxi-column dataField="city" alignment="left"> </dxi-column>
      <dxi-column dataField="state" alignment="left"> </dxi-column>
      <dxi-column
        dataField="commencementDate"
        caption="Commencement"
        dataType="date"
        [format]="portfolioDataService.dateFormat"
        alignment="left"
      >
      </dxi-column>
      <dxi-column
        dataField="expirationDate"
        caption="Expiration"
        dataType="date"
        [format]="portfolioDataService.dateFormat"
        alignment="left"
      >
      </dxi-column>
      <dxi-column dataField="rentableArea" alignment="right" dataType="number">
        <dxo-format type="fixedPoint" [precision]="0"></dxo-format>
      </dxi-column>
      <dxi-column dataField="leaseType" alignment="left"> </dxi-column>
      <dxi-column dataField="leaseStatus" alignment="left"> </dxi-column>
      <dxi-column dataField="currency" alignment="left"> </dxi-column>
      <dxi-column dataField="createdBy" alignment="left"> </dxi-column>
      <dxi-column
        dataField="createdDate"
        alignment="left"
        dataType="date"
        [format]="portfolioDataService.dateFormat"
      >
      </dxi-column>
    </dx-data-grid>
  </div>
</crem-card>
