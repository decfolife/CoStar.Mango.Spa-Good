<!-- <div>Team Member Details works!!!</div> -->
<div class="teamsMembers-container">
	<div class="teamMembers-dataGrid-wrapper"> 
		<dx-data-grid class="teamMembers-grid"
			#TeamMembersGrid
			[showColumnLines]="false"
			[showRowLines]="false"
			[showBorders]="false"
			[rowAlternationEnabled]="true"
			[allowColumnResizing]="true"
			columnResizingMode="widget"
			[allowColumnReordering]="true"
			[columnAutoWidth]="false"
			[dataSource]="teamMembers"
			keyExpr="memberId"
			[width]="'100%'"
			[hoverStateEnabled]="true"
			[filterSyncEnabled]="true"
			[wordWrapEnabled]="true"
			(onCellPrepared)="gridOnCellPrepared($event)"
			(onContentReady)="setAttributes($event)"
			(onKeyDown)="onKeyDown($event)"
			(onSelectionChanged)="onSelectionChanged($event)"
		>
			<dxo-header-filter [visible]="true" [allowSearch]="true"></dxo-header-filter>
			<dxo-sorting mode="multiple"></dxo-sorting>
			<dxo-paging [enabled]="false"></dxo-paging>

			<dxo-selection 
		   	class="selectMember"
				selectAllMode="allPages"
				showCheckBoxesMode="always"
				mode="multiple">
			</dxo-selection>

			<dxo-editing
				mode="row"
				[allowUpdating]="true"
				[allowDeleting]="true"
				[allowAdding]="false"
			>
			</dxo-editing>

			<dxi-column type="selection" [width]="40" [fixed]="true" fixedPosition="left" [allowSorting]="false"
				[allowReordering]="false" [allowResizing]="false">
			</dxi-column>
			<dxi-column dataField="name" [allowEditing]="false" dataType="string" cellTemplate="teamMemberNameTemplate"></dxi-column>
			<dxi-column dataField="company" [allowEditing]="false" dataType="string"></dxi-column>
			<dxi-column dataField="email" [allowEditing]="false" dataType="string"></dxi-column>
			<dxi-column dataField="phoneNumber" [allowEditing]="false" dataType="string"></dxi-column>
			<dxi-column dataField="role" dataType="string" [setCellValue]="setRoleValue">
				<dxo-lookup [dataSource]="memberInfo.roles" aria-label="role" valueExpr="role" displayExpr="role"></dxo-lookup>
			</dxi-column>
			<dxi-column caption='Email Notifications' dataField="emailOn" alignment="center" dataType="string"
				[calculateCellValue]="getEmailonDisplayValue" editCellTemplate="emailToggleTemplate">
			</dxi-column>
			<dxi-column dataField="level" caption='Access Level' dataType="string" alignment="center" [setCellValue]="setLevelValue">
			</dxi-column>
			<dxi-column [visible]="showShareColumn" dataField="share" alignment="center" caption='Share' dataType="string" width="90"
				[calculateCellValue]="getShareDisplayValue" editCellTemplate="sharedToggleTemplate">
			</dxi-column>
			<dxi-column type="buttons" width="110" [fixed]="true" fixedPosition="right" [allowSorting]="false"
				[allowReordering]="false" [allowResizing]="false">
				<dxi-button template="actionsMenuTemplate">
					<div *dxTemplate="let member of 'actionsMenuTemplate'" class="actionsMenuTemplate">
						<button aria-label="actions menu" class="btn btn-link teamMemberActionsButton" 
							[hidden]="!userModuleAddRights || rights.toLowerCase().trim() == 'view'"
							*ngIf="!member.data.editMode" id="{{'memberActionButton' + member.rowIndex}}"
							(click)="$event.preventDefault()" [matMenuTriggerFor]="teamMemberActionsMenu">
							<mat-icon aria-label="Actions Menu">more_vert</mat-icon>
						</button>
		    		<mat-menu #teamMemberActionsMenu="matMenu" class="teamMemberActionsMenu">
							<ul role="menu">
								<li mat-mdc-menu-item (click)="editRow(member)" class="tmam-edit">Edit</li>
								<li mat-mdc-menu-item (click)="removeTeamMember(member.data)" class="tmam-remove">Remove</li>
							</ul>
						</mat-menu>
						<div *ngIf="member.data.editMode" class="teamMemberEditButtons">
							<crem-button type="secondary" (click)="cancelChanges(member.data); $event.preventDefault()" class="cancelBtn" >
								<span id="cancelChanges">Cancel</span>
							</crem-button>
							<crem-button type="primary" (click)="saveMemberChanges($event, member.data); $event.preventDefault()" class="saveBtn">
								<span id="saveChanges">Save</span>
							</crem-button>
						</div>
					</div>
				</dxi-button>		    	
			</dxi-column>
			<div *dxTemplate="let member of 'teamMemberNameTemplate'" class="ptm-teamMemberTemplate" >
				<div class="mtm-memberNameAndInfo">
					<span class="mtm-memberName"> {{member.data.name}}</span>
					<span class="mtm-info" *ngIf="!member.data.isActive || !member.data.allowLogOn">
						<crem-tooltip
							[externalId]="'mtmToolTipId' + member.data.contactId + member.data.teamId"
							[helpTextData]="teamMemberInfo"
						></crem-tooltip>
					</span>	
				</div>
			</div>
			<div *dxTemplate="let member of 'emailToggleTemplate'" >
				<div class="emailToggle">
					<mat-slide-toggle [checked]="member.data.emailOn" [disabled]="!member.data.editMode" 
						(change)="emailtoggle($event, member.data)" aria-label="Email Notication" class="emailTgle-slider"
					>
					</mat-slide-toggle>
				</div>		
			</div>
			<div *dxTemplate="let member of 'sharedToggleTemplate'" >
				<div class="sharedToggle">
					<mat-slide-toggle  [checked]="member.data.share" [disabled]="!member.data.editMode" 
						(change)="sharedtoggle($event, member.data)" aria-label="Shared"
					>
					</mat-slide-toggle>
				</div>
			</div>
		</dx-data-grid>
	</div>

</div>
