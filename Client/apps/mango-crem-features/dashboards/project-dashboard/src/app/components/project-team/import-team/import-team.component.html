<crem-modal
  [modalTitle]="'Import Team Template'"
  [showTooltip]="true"
  [tooltipText]="textForTooltip"
  [closeIconVisible]="true"
  [customFooter]="false"
  [primaryFooterButtonText]="'Import'"
  [closeOrCancelButtonText]="'Cancel'"
  [primaryFooterButtonEnabledDisabled]="importButtonDisabled"
  [modalId]="'importTeamModal'"
  (primaryButtonAction)="importTeamFromTemplate()"
  (closeButtonAction)="closeImportTeamDialog()"
>
  <div modalContent>
    <div class="import-teams-dataGrid-wrapper">
      <crem-loader *ngIf="!dataRetrieved"></crem-loader>
      <dx-data-grid
        *ngIf="dataRetrieved"
        class="teams-grid"
        #TeamsGrid
        [showColumnLines]="false"
        [showRowLines]="false"
        [showBorders]="false"
        [rowAlternationEnabled]="true"
        [allowColumnResizing]="true"
        columnResizingMode="widget"
        [allowColumnReordering]="true"
        [columnAutoWidth]="false"
        [dataSource]="importTeams"
        keyExpr="teamId"
        [width]="'100%'"
        [height]="'455px'"
        [filterSyncEnabled]="true"
        [wordWrapEnabled]="true"
        (onSelectionChanged)="onSelectionChanged($event)"
        (onCellPrepared)="onCellPrepared($event)"
      >
        <dxo-header-filter
          [visible]="true"
          [allowSearch]="true"
        ></dxo-header-filter>
        <dxo-sorting mode="multiple"></dxo-sorting>
        <dxo-paging [enabled]="false"></dxo-paging>

        <dxo-selection
          [allowSelectAll]="false"
          showCheckBoxesMode="always"
          mode="multiple"
        >
        </dxo-selection>

        <dxi-column
          type="selection"
          [width]="40"
          [fixed]="true"
          fixedPosition="left"
          [allowSorting]="false"
          [allowReordering]="false"
          [allowResizing]="false"
          class="selectTeam"
        >
        </dxi-column>
        <dxi-column dataField="teamName" caption="Name"></dxi-column>
        <dxi-column dataField="members" alignment="center"></dxi-column>
        <dxi-column
          dataField="modifiedDate"
          dataType="date"
          [format]="cardsService.dateFormat"
        ></dxi-column>
        <dxi-column dataField="modifiedBy"></dxi-column>
        <dxo-master-detail
          [enabled]="true"
          [autoExpandAll]="autoExpand"
          template="teamDetails"
        ></dxo-master-detail>
        <div *dxTemplate="let team of 'teamDetails'">
          <div class="import-teamMembers-dataGrid-wrapper">
            <dx-data-grid
              [showColumnLines]="false"
              [showRowLines]="false"
              [showBorders]="false"
              [rowAlternationEnabled]="true"
              [allowColumnResizing]="true"
              columnResizingMode="widget"
              [allowColumnReordering]="true"
              [columnAutoWidth]="false"
              [dataSource]="team.data.teamMembers"
              keyExpr="memberId"
              [width]="'100%'"
              [filterSyncEnabled]="true"
              [wordWrapEnabled]="true"
            >
              <dxo-header-filter
                [visible]="true"
                [allowSearch]="true"
              ></dxo-header-filter>
              <dxo-sorting mode="multiple"></dxo-sorting>
              <dxo-paging [enabled]="false"></dxo-paging>

              <dxi-column
                dataField="name"
                [allowEditing]="false"
                dataType="string"
              ></dxi-column>
              <dxi-column
                dataField="role"
                dataType="string"
                [setCellValue]="setRoleValue"
              >
                <dxo-lookup
                  [dataSource]="memberInfo.roles"
                  aria-label="role"
                  valueExpr="role"
                  displayExpr="role"
                ></dxo-lookup>
              </dxi-column>
              <dxi-column
                dataField="level"
                caption="Access Level"
                dataType="string"
                [setCellValue]="setLevelValue"
              >
                <dxo-lookup
                  [dataSource]="memberInfo.levels"
                  valueExpr="level"
                  displayExpr="level"
                ></dxo-lookup>
              </dxi-column>
              <dxi-column
                [visible]="showShareColumn"
                dataField="share"
                alignment="center"
                caption="Share"
                width="90"
                [cellTemplate]="'sharedToggleTemplate'"
              >
              </dxi-column>

              <div *dxTemplate="let member of 'sharedToggleTemplate'">
                <div class="sharedToggle">
                  <crem-toggle-slider
                    [id]="'pts-calculateDate'"
                    [size]="'wide'"
                    [value]="member.data.share"
                    [disabled]="true"
                    [ariaLabel]="'Shared'"
                    checkedLabel="Yes"
                    uncheckedLabel="No"
                  ></crem-toggle-slider>
                </div>
              </div>
            </dx-data-grid>
          </div>
        </div>
      </dx-data-grid>
    </div>
  </div>
</crem-modal>
