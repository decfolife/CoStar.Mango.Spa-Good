<crem-card
[id]="card.id"
[title]="card.title"
[subtitle]="card.subtitle"
[filterData]="null"
[filterInitialValue]="null"
[showFilterClearButton]="false"
[moreOptions]="card.moreOptions"
(exportDataGrid)="exportAllGridData($event)"
>

  <div class="cardContent"  fxflexFill *ngIf="card.dispCard">
    <dx-chart
      #ProjectsByTypeChart
      [id]="card.id + 'chart'"
      [dataSource]="card.chartData.dataSource"
      *ngIf="displayChart"
    >
      <dxo-size
        [height]="244">
      </dxo-size>
      <dxi-series
        argumentField="projectType"
        valueField="projectTypeCount"
        name="Project Types"
        [type]="card.chartData.type"
        color="#EC4A08"

      ></dxi-series>
      <dxo-legend [visible]="false"></dxo-legend>
      <dxo-tooltip [enabled]="true" [contentTemplate]="'tooltip'">
      </dxo-tooltip>
      <div *dxTemplate="let tooltip of 'tooltip'">
        <span> {{ tooltip.point.data.projectType }}</span
        ><span> {{objectType}} Count: </span
        ><span>
          {{ tooltip.point.data.projectTypeCount }}
        </span>
      </div>
    </dx-chart>
  </div>
</crem-card>
