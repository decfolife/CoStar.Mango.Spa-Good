<div *ngIf="loader$ | async">
  <crem-loader></crem-loader>
</div>
<p>
  If the Team Manager is not sharing rights, none of the members in the new
  template will share rights.
</p>
<div class="new-template-input">
  <crem-input
    [id]="'saveTasksAsTemplate'"
    [inputType]="'text'"
    [(value)]="value"
    [disallowNegative]="true"
    [required]="true"
    [placeholder]="'Enter Name for New Template'"
    (valueChange)="valueChange()"
  >
  </crem-input>
</div>
