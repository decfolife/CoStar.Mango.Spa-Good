<crem-loader *ngIf="!projectSettingsRetrieved"></crem-loader>
<crem-modal
  *ngIf="projectSettingsRetrieved"
  [modalTitle]="taskName"
  [closeIconVisible]="closeButton"
  [primaryFooterButtonText]="action"
  [closeOrCancelButtonText]="cancel"
  [primaryFooterButtonEnabledDisabled]="footerButtonDisabled"
  (primaryButtonAction)="actionButton()"
>
  <div modalContent class="body-content">
    <textarea
      class="notes"
      placeholder="Enter note..."
      [(ngModel)]="taskNote"
      (ngModelChange)="onNotesTextChange($event)"
      [required]="projectTaskNotesRequired"
    ></textarea>
  </div>
</crem-modal>
