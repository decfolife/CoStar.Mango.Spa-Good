# To be used by Mango-SPA Only if not using IIS or .NET web server to serve the app

worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
  '$status $body_bytes_sent "$http_referer" '
  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;

  sendfile on;

  keepalive_timeout 65;

  # Enable Gzip compression
  gzip on;

  gzip_vary on;
  gzip_buffers 128 4k;

  # Compression level (1-9)
  gzip_comp_level 9;

  # Don't compress anything under 256 bytes
  gzip_min_length 256;

  # Compress output of these MIME-types
  gzip_types
  application/atom+xml
  application/javascript
  application/json
  application/rss+xml
  application/vnd.ms-fontobject
  application/x-font-ttf
  application/x-font-opentype
  application/x-font-truetype
  application/x-javascript
  application/x-web-app-manifest+json
  application/xhtml+xml
  application/xml
  font/eot
  font/opentype
  font/otf
  image/svg+xml
  image/x-icon
  image/vnd.microsoft.icon
  text/css
  text/plain
  text/javascript
  text/x-component;

  # Disable gzip for bad browsers
  gzip_disable "MSIE [1-6]\.(?!.*SV1)";

  server {
    listen 8000;
    listen [::]:8000;
    server_name localhost;

    location / {
      root /usr/share/nginx/html;
      index index.html index.htm;
      try_files $uri $uri/ /index.html;
    }

    # Headers to prevent Cross-site scripting (XSS) attacks
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Should only be turned on in upper environments
    # Enable HSTS with a max-age of 31536000 seconds (1 year) - this is being done from the NGINX ingress in k8s.
    # No need to enable this here.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    sub_filter_once off;
    sub_filter random-csp-nonce $request_id;

    # Official one to use, multi-line is deprecated https://datatracker.ietf.org/doc/html/rfc7230#section-3.2.4
    # IMPORTANT: Please update Middleware\SecurityHeadersMiddleware.cs as well
    add_header Content-Security-Policy "default-src 'self'; font-src 'self' fonts.googleapis.com fonts.gstatic.com; script-src 'self' *.costar.com *.glancecdn.net *.googleapis.com *.costarremanager.com:*/ *.pendo.costarremanager.com app.pendo.io cdn.pendo.io pendo-static-5398454967468032.storage.googleapis.com data.pendo.io 'nonce-$request_id'; style-src 'self' fonts.googleapis.com *.costarremanager.com:*/ maps.googleapis.com *.storage.googleapis.com app.pendo.io pendo-io-static.storage.googleapis.com pendo-static-5398454967468032.storage.googleapis.com 'nonce-$request_id'; img-src 'self' data: *.costarremanager.com:*/ *.corp.virtualpremise.com:*/ data.pendo.costarremanager.com maps.googleapis.com maps.gstatic.com cdn.pendo.io data.pendo.io pendo-static-5398454967468032.storage.googleapis.com app.pendo.io data: img.youtube.com; connect-src 'self' *.costarremanager.com:*/ *.corp.virtualpremise.com:*/ api.feedback.us.pendo.io api.feedback.eu.pendo.io *.crem.aws.dshrp.com/ maps.googleapis.com *.pendo.costarremanager.com data.pendo.io pendo-static-5398454967468032.storage.googleapis.com app.pendo.io; frame-src 'self' costarremanager.com costarmanager.com portal.feedback.us.pendo.io portal.feedback.eu.pendo.io app.pendo.io portal.pendo.io player.vimeo.com; worker-src 'self' blob:; frame-ancestors 'self'; manifest-src 'self'; media-src 'self'; object-src 'self' *.costarremanager.com:*/; base-uri 'self';" always;
 }
}

