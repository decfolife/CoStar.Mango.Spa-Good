  web:
    image: nginx:latest
    container_name: mango-app
    ports:
      - 4200:8000
    volumes:
      - ./Client/config/nginx-spa.conf:/etc/nginx/nginx.conf:ro
      - ./Client/dist/apps/mango:/usr/share/nginx/html
    restart: always

  redis:
    image: redis:6.2-alpine
    container_name: mango-spa-redis
    user: root
    volumes:
        - redis_data:/var/lib/redis/data
    ports:
        - '6379:6379'
    restart: "no"

volumes:
  redis_data:
  
